<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | GKK Interns - Code. Build. Deploy.</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        /* status preview styles moved to inline JS */

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Quick Feedback Buttons */
        .quick-feedback-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--c-border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8rem;
            color: var(--c-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .quick-feedback-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--c-primary);
            color: var(--c-primary);
            transform: translateY(-1px);
        }

        /* Modal Footer Actions */
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* Submission Details Modal override */
        .swal2-popup {
            background: var(--c-bg-card) !important;
            border: 1px solid var(--c-border) !important;
            color: var(--c-text-primary) !important;
        }

        .swal2-title {
            color: var(--c-text-primary) !important;
        }

        .swal2-html-container {
            color: var(--c-text-secondary) !important;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"
            style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Submissions</h1>
                </div>
                <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                    <button class="btn btn-secondary btn-sm" onclick="refreshCurrentPage()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page-body">
                <!-- Submissions Tab Bar -->
                <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--c-border);">
                    <button class="admin-tab active" onclick="switchAdminTab('team')" id="adminTeamTabBtn"
                        style="padding: 0.75rem 1rem; background: none; border: none; color: var(--c-primary); font-weight: 600; cursor: pointer; border-bottom: 2px solid var(--c-primary); margin-bottom: -1px; transition: all 0.2s;">
                        <i class="fas fa-tasks" style="margin-right: 6px;"></i> Assigned Projects
                    </button>
                    <button class="admin-tab" onclick="switchAdminTab('custom')" id="adminCustomTabBtn"
                        style="padding: 0.75rem 1rem; background: none; border: none; color: var(--c-text-muted); font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s;">
                        <i class="fas fa-rocket" style="margin-right: 6px;"></i> Custom Projects
                    </button>
                </div>

                <!-- TAB 1: Assigned Projects -->
                <div id="adminTeamTab">
                    <div class="card">
                        <div class="card-header" style="border-bottom: 1px solid var(--c-border); padding: 20px 24px;">
                            <h3 style="font-weight: 600; font-size: 1.1rem;">Recent Submissions</h3>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Project</th>
                                        <th>Intern</th>
                                        <th>Link</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="submissionsTable">
                                    <!-- JS Injected -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- TAB 2: Custom Projects -->
                <div id="adminCustomTab" style="display: none;">
                    <div class="card">
                        <div class="card-header"
                            style="border-bottom: 1px solid var(--c-border); padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;">
                            <h3 style="font-weight: 600; font-size: 1.1rem;">Interns' Custom Projects</h3>
                            <button class="btn btn-secondary btn-sm" onclick="loadCustomProjects()"
                                title="Refresh Custom Projects">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                        <div class="table-container">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Project Details</th>
                                        <th>Intern Info</th>
                                        <th>Links</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="customSubmissionsTable">
                                    <tr>
                                        <td colspan="5"
                                            style="text-align: center; padding: 2rem; color: var(--c-text-muted);">
                                            <i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Loading
                                            custom projects...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal (Standard) -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Review Submission</h3>
                <button class="modal-close" onclick="closeModal('reviewModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div id="statusPreview"
                    style="padding: 12px 16px; border-radius: 8px; margin-bottom: 4px; display: none; font-size: 0.9rem;">
                    <div id="statusPreviewText"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Review Feedback</label>
                    <textarea id="reviewNotes" class="form-textarea" rows="5"
                        placeholder="Add your feedback for the intern..." style="min-height: 120px;"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label"
                        style="font-size: 0.8rem; color: var(--c-text-muted); margin-bottom: 8px;">Quick
                        Templates</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Great work! Your submission meets all requirements.')">? Great
                            Work</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Please improve the UI/UX design and responsiveness.')">?? UI
                            Improvements</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Code quality needs improvement. Please refactor and add comments.')">??
                            Code Quality</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Missing required features. Please review the project requirements.')">??
                            Missing Features</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Fix bugs and test thoroughly before resubmitting.')">?? Fix
                            Bugs</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('reviewModal')">Cancel</button>
                <div style="flex:1"></div>
                <button class="btn" onclick="submitReview('changes_requested')" title="Request Changes"
                    style="background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); color: #fbbf24;">
                    <i class="fas fa-edit"></i> Changes
                </button>
                <button class="btn" onclick="submitReview('rejected')" title="Reject Submission"
                    style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171;">
                    <i class="fas fa-times"></i> Reject
                </button>
                <button class="btn btn-success" onclick="submitReview('approved')" title="Approve Submission">
                    <i class="fas fa-check"></i> Approve
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        let currentSubmissionId = null;

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }

        document.getElementById('sidebarOverlay')?.addEventListener('click', toggleSidebar);

        async function init() {
            if (!await ensureAdminAuth()) return;
            const session = getAdminSession();
            
            const tbody = document.getElementById('submissionsTable');
            if (tbody && typeof SkeletonUI !== 'undefined') {
                tbody.innerHTML = SkeletonUI.generateTableRows(5, 6);
            }

            await loadSubmissions();
            await loadCustomProjects();
        }

        async function loadSubmissions() {
            try {
                const { data: subs, error } = await supabaseClient
                    .from('project_submissions')
                    .select('*, projects(title)')
                    .order('submitted_at', { ascending: false });

                if (error) throw error;
                if (!subs || !subs.length) {
                    if (document.getElementById('submissionsTable')) 
                        document.getElementById('submissionsTable').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color: var(--c-text-muted);">No submissions found.</td></tr>';
                    return;
                }

                const { data: profiles } = await supabaseClient.rpc('get_all_profile_emails');
                const profileMap = {};
                if (profiles) profiles.forEach(p => profileMap[p.id] = p);

                window.allSubmissions = subs;

                if (document.getElementById('submissionsTable')) {
                    document.getElementById('submissionsTable').innerHTML = subs.map(sub => {
                        const profile = profileMap[sub.submitted_by] || {};
                        const hasFeedback = sub.feedback ? 'title="Has feedback"' : '';
                        return `
                        <tr>
                            <td style="font-weight:500;">
                                ${sub.projects?.title || 'Unknown Project'}
                                ${sub.live_url ? `<a href="${sub.live_url.startsWith('http') ? sub.live_url : 'https://' + sub.live_url}" target="_blank" style="font-size:0.75rem; display:block; color:var(--c-primary);"><i class="fas fa-globe"></i> Live Demo</a>` : ''}
                            </td>
                            <td>
                                <div style="font-weight:500;">${profile.full_name || 'Unknown User'}</div>
                                <div style="font-size:0.8rem; color:var(--c-text-muted);">${profile.email || 'No Email'}</div>
                            </td>
                            <td>
                                ${sub.github_url ? `<a href="${sub.github_url.startsWith('http') ? sub.github_url : 'https://' + sub.github_url}" target="_blank" style="color:var(--c-text-primary); text-decoration:underline; display:flex; align-items:center; gap:5px;"><i class="fab fa-github"></i> View Code</a>` : '<span style="color:var(--c-text-muted);">No Link</span>'}
                            </td>
                            <td style="font-size:0.85rem; color:var(--c-text-secondary);">${new Date(sub.submitted_at || sub.created_at).toLocaleDateString()}</td>
                            <td>
                                <span class="badge badge-${getStatusColor(sub.status)}" ${hasFeedback}>${formatStatus(sub.status)}</span>
                                ${sub.feedback ? '<i class="fas fa-comment-dots" style="margin-left: 6px; color: var(--c-primary); font-size: 0.75rem;"></i>' : ''}
                            </td>
                            <td>
                                <div style="display: flex; gap: 6px; align-items: center;">
                                    <button class="btn btn-secondary btn-sm" onclick="showSubmissionInfo('${sub.id}')" title="View Details" style="color: var(--c-primary); height:32px; width:32px; padding:0; display:flex; align-items:center; justify-content:center;"><i class="fas fa-info-circle"></i></button>
                                    <button class="btn ${sub.status === 'approved' ? 'btn-secondary' : 'btn-primary'} btn-sm" onclick="openReviewModal('${sub.id}')" style="height:32px;">${sub.status === 'approved' ? 'Edit' : 'Review'}</button>
                                </div>
                            </td>
                        </tr>`;
                    }).join('');
                }
            } catch (e) { console.error('Load error:', e); }
        }

        function formatStatus(s) {
            const map = { 'changes_requested': 'Changes Requested', 'under_review': 'Under Review' };
            return map[s] || (s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Pending');
        }

        function getStatusColor(s) {
            if (s === 'approved') return 'success';
            if (s === 'rejected') return 'error';
            if (s === 'under_review') return 'info';
            return 'warning';
        }

        function insertFeedback(text) {
            const textarea = document.getElementById('reviewNotes');
            textarea.value = textarea.value ? textarea.value + '\n' + text : text;
            textarea.focus();
        }

        function openReviewModal(id) {
            currentSubmissionId = id;
            const sub = window.allSubmissions?.find(s => s.id === id);
            document.getElementById('reviewNotes').value = sub?.feedback || '';
            document.getElementById('reviewModal').classList.add('open');
        }

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        async function submitReview(status) {
            const notes = document.getElementById('reviewNotes').value;
            try {
                const sub = window.allSubmissions?.find(s => s.id === currentSubmissionId);
                const { error } = await supabaseClient.from('project_submissions').update({
                    status: status, feedback: notes, reviewed_at: new Date().toISOString()
                }).eq('id', currentSubmissionId);
                if (error) throw error;

                if (sub?.project_id) {
                    await supabaseClient.from('projects').update({ status: status }).eq('id', sub.project_id);
                }

                Swal.fire({ icon: 'success', title: 'Updated', timer: 1000, showConfirmButton: false });
                closeModal('reviewModal');
                loadSubmissions();
            } catch (e) { Swal.fire('Error', 'Update failed', 'error'); }
        }

        async function showSubmissionInfo(id) {
            const sub = window.allSubmissions?.find(s => s.id === id);
            if (!sub) return;
            try {
                const { data: project } = await supabaseClient.from('projects').select('*, teams(*)').eq('id', sub.project_id).single();
                const { data: allProfs } = await supabaseClient.rpc('get_all_profile_emails');
                const submitter = allProfs?.find(p => p.id === sub.submitted_by);
                
                Swal.fire({
                    title: `<i class="fas fa-info-circle" style="margin-right:8px; color:var(--c-primary);"></i> Project Info`,
                    html: `<div style="text-align:left; font-size:0.9rem;">
                        <div style="margin-bottom:12px; font-weight:600; font-size:1.1rem;">${project.title}</div>
                        <div style="margin-bottom:12px; color:var(--c-text-muted);">${project.description || 'No description'}</div>
                        <div style="padding:10px; background:rgba(0,0,0,0.2); border-radius:8px; margin-bottom:12px;">
                            <strong>Team:</strong> ${project.teams?.name || 'Individual'}<br>
                            <strong>Intern:</strong> ${submitter?.full_name || 'Unknown'}
                        </div>
                        <div style="display:flex; gap:10px;">
                            ${sub.github_url ? `<a href="${sub.github_url}" target="_blank" style="color:var(--c-primary);"><i class="fab fa-github"></i> Repository</a>` : ''}
                            ${sub.live_url ? `<a href="${sub.live_url}" target="_blank" style="color:var(--c-primary);"><i class="fas fa-globe"></i> Live Demo</a>` : ''}
                        </div>
                    </div>`,
                    showConfirmButton: false, showCloseButton: true,
                    customClass: { container: 'admin-swal-container', popup: 'admin-swal-popup' }
                });
            } catch(e) { console.error(e); }
        }

        // ---- Custom Projects ----
        function switchAdminTab(tab) {
            const isTeam = tab === 'team';
            document.getElementById('adminTeamTab').style.display = isTeam ? '' : 'none';
            document.getElementById('adminCustomTab').style.display = isTeam ? 'none' : '';
            document.getElementById('adminTeamTabBtn').className = `admin-tab ${isTeam ? 'active' : ''}`;
            document.getElementById('adminCustomTabBtn').className = `admin-tab ${!isTeam ? 'active' : ''}`;
            if (!isTeam) loadCustomProjects();
        }

        async function loadCustomProjects() {
            const tbody = document.getElementById('customSubmissionsTable');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
            try {
                const { data: subs } = await supabaseClient.from('custom_project_submissions').select('*').order('created_at', { ascending: false });
                const { data: profiles } = await supabaseClient.rpc('get_all_profile_emails');
                const profileMap = {};
                if (profiles) profiles.forEach(p => profileMap[p.id] = p);
                window.allCustomSubmissions = subs;
                window.allProfilesMap = profileMap;

                tbody.innerHTML = subs.map(sub => {
                    const profile = profileMap[sub.intern_id] || {};
                    return `<tr>
                        <td>
                            <div style="font-weight:600; color:var(--c-text-primary);">${sub.title}</div>
                            <div style="font-size:0.8rem; color:var(--c-text-muted); max-width:250px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${sub.description}</div>
                        </td>
                        <td>
                            <div style="font-weight:500; font-size:0.85rem;">${profile.full_name || 'Intern'}</div>
                            <div style="font-size:0.75rem; color:var(--c-text-muted);">${profile.email || ''}</div>
                        </td>
                        <td>
                            <div style="display:flex; gap:8px;">
                                <a href="${sub.deployed_url}" target="_blank" style="color:#10b981;"><i class="fas fa-globe"></i></a>
                                ${sub.github_url ? `<a href="${sub.github_url}" target="_blank" style="color:var(--c-text-secondary);"><i class="fab fa-github"></i></a>` : ''}
                            </div>
                        </td>
                        <td><span class="badge badge-${getStatusColor(sub.status)}">${formatStatus(sub.status)}</span></td>
                        <td>
                            <div style="display:flex; gap:6px;">
                                <button class="btn btn-secondary btn-sm" onclick="showCustomProjectDetail('${sub.id}')"><i class="fas fa-eye"></i></button>
                                <button class="btn btn-sm" onclick="deleteCustomProject('${sub.id}')" style="background:rgba(239,68,68,0.1); color:#f87171;"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');
            } catch(e) { tbody.innerHTML = '<tr><td colspan="5">Error loading projects</td></tr>'; }
        }

        function showCustomProjectDetail(id) {
            const sub = window.allCustomSubmissions?.find(s => s.id === id);
            if (!sub) return;
            const profile = window.allProfilesMap?.[sub.intern_id] || {};
            const avatarInitials = (profile.full_name || '?').charAt(0).toUpperCase();

            Swal.fire({
                title: `<i class="fas fa-rocket" style="margin-right:12px; color:var(--c-primary);"></i> Custom Project`,
                html: `<div style="text-align:left;">
                    <div style="font-size:1.2rem; font-weight:700; color:var(--c-text-primary); margin-bottom:15px;">${sub.title}</div>
                    <div style="display:flex; align-items:center; gap:12px; background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; margin-bottom:20px;">
                        <div style="width:40px; height:40px; border-radius:50%; background:var(--c-primary); color:white; display:flex; align-items:center; justify-content:center; font-weight:700;">${avatarInitials}</div>
                        <div>
                            <div style="font-weight:600;">${profile.full_name || 'Intern'}</div>
                            <div style="font-size:0.8rem; color:var(--c-text-muted);">${profile.email || ''}</div>
                        </div>
                    </div>
                    <div style="margin-bottom:20px;">
                        <div style="font-size:0.75rem; text-transform:uppercase; color:var(--c-text-muted); margin-bottom:8px;">Description</div>
                        <div style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; line-height:1.6; font-size:0.95rem; white-space:pre-wrap;">${sub.description}</div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <a href="${sub.deployed_url}" target="_blank" style="flex:1; background:#10b981; color:white; text-align:center; padding:12px; border-radius:8px; text-decoration:none; font-weight:600;"><i class="fas fa-globe"></i> Live Link</a>
                        ${sub.github_url ? `<a href="${sub.github_url}" target="_blank" style="flex:1; background:#334155; color:white; text-align:center; padding:12px; border-radius:8px; text-decoration:none; font-weight:600;"><i class="fab fa-github"></i> Repository</a>` : ''}
                    </div>
                    <div style="margin-top:15px; padding-top:15px; border-top:1px solid rgba(255,255,255,0.05); display:flex; gap:10px;">
                        ${sub.status !== 'approved' ? `<button class="btn btn-primary" style="flex:1; background:#10b981; border:none;" onclick="updateCustomProjectStatus('${sub.id}', 'approved')">Approve</button>` : ''}
                        ${sub.status !== 'rejected' ? `<button class="btn btn-primary" style="flex:1; background:#ef4444; border:none;" onclick="updateCustomProjectStatus('${sub.id}', 'rejected')">Reject</button>` : ''}
                    </div>
                </div>`,
                width: '550px', showConfirmButton: false, showCloseButton: true,
                customClass: { container: 'admin-swal-container', popup: 'admin-swal-popup' }
            });
        }

        async function updateCustomProjectStatus(id, status) {
            const confirmColor = status === 'approved' ? '#10b981' : '#ef4444';
            const { value: notes, isConfirmed } = await Swal.fire({
                title: `${status === 'approved' ? 'Approve' : 'Reject'} Project?`,
                html: `<div style="text-align:left;">
                    <p style="margin-bottom:15px;">Marking this project as <strong>${status}</strong>.</p>
                    <textarea id="adminNotes" placeholder="Admin notes (optional)" style="width:100%; min-height:100px; background:rgba(0,0,0,0.1); border:1px solid var(--c-border); border-radius:8px; padding:10px; color:var(--c-text-primary);"></textarea>
                </div>`,
                showCancelButton: true, confirmButtonColor: confirmColor,
                preConfirm: () => document.getElementById('adminNotes').value,
                customClass: { container: 'admin-swal-container', popup: 'admin-swal-popup' }
            });

            if (isConfirmed) {
                const { error } = await supabaseClient.from('custom_project_submissions').update({ status, admin_notes: notes }).eq('id', id);
                if (!error) {
                    Swal.fire({ icon: 'success', title: 'Updated', timer: 1000, showConfirmButton: false });
                    loadCustomProjects();
                }
            }
        }

        async function deleteCustomProject(id) {
            const { isConfirmed } = await Swal.fire({
                title: 'Delete Project?', text: 'This cannot be undone.', icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ef4444',
                customClass: { container: 'admin-swal-container', popup: 'admin-swal-popup' }
            });
            if (isConfirmed) {
                await supabaseClient.from('custom_project_submissions').delete().eq('id', id);
                loadCustomProjects();
            }
        }

        init();
    </script>
