<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Links | GKK Interns Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 2px;
            bottom: 2px;
            background: #94a3b8;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch input:checked+.toggle-slider {
            background: rgba(16, 185, 129, 0.2);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .toggle-switch input:checked+.toggle-slider::before {
            transform: translateX(20px);
            background: #10b981;
        }

        .target-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .target-badge.all {
            background: rgba(16, 185, 129, 0.1);
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .target-badge.batch {
            background: rgba(245, 158, 11, 0.1);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .target-badge.intern {
            background: rgba(99, 102, 241, 0.1);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .target-options {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .target-option {
            flex: 1;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--c-border);
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            color: var(--c-text-secondary);
        }

        .target-option:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .target-option.selected {
            border-color: var(--c-primary);
            background: rgba(99, 102, 241, 0.08);
            color: var(--c-primary);
        }

        .target-option i {
            display: block;
            font-size: 1.25rem;
            margin-bottom: 6px;
        }

        .target-option span {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .url-cell {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .url-cell a {
            color: var(--c-primary);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .url-cell a:hover {
            text-decoration: underline;
        }

        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
        }

        .stat-card .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--c-text-primary);
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--c-text-muted);
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .stats-row {
                flex-direction: column;
                gap: 10px;
            }

            .target-options {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <div class="sidebar-overlay" id="sidebarOverlay"
            style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Report Submission Links</h1>
                </div>
                <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.reload()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-primary" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> Add Link
                    </button>
                </div>
            </header>

            <div class="page-body">
                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-value" id="statTotal">-</div>
                        <div class="stat-label">Total Links</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statActive" style="color: #10b981;">-</div>
                        <div class="stat-label">Active Links</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="statDisabled" style="color: #ef4444;">-</div>
                        <div class="stat-label">Disabled Links</div>
                    </div>
                </div>

                <!-- Table Card -->
                <div class="card">
                    <div class="card-header"
                        style="border-bottom: 1px solid var(--c-border); padding: 20px 24px; display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="font-weight: 600; font-size: 1.1rem;">
                            <i class="fas fa-file-pdf" style="color: var(--c-primary); margin-right: 8px;"></i>
                            Manage Report Links
                        </h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Form URL</th>
                                    <th>Target</th>
                                    <th>Status</th>
                                    <th>Created</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="linksTable">
                                <tr>
                                    <td colspan="6"
                                        style="text-align: center; padding: 2rem; color: var(--c-text-muted);">
                                        <i class="fas fa-spinner fa-spin" style="margin-right: 8px;"></i> Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="linkModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Report Link</h3>
                <button class="modal-close" onclick="closeModal('linkModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px;">
                <div class="form-group">
                    <label class="form-label">Title <span style="color: #ef4444;">*</span></label>
                    <input type="text" id="linkTitle" class="form-input" placeholder="e.g. Week 1 Project Report">
                </div>
                <div class="form-group">
                    <label class="form-label">Description <span
                            style="color: var(--c-text-muted); font-weight: 400;">(optional)</span></label>
                    <textarea id="linkDescription" class="form-textarea" rows="2"
                        placeholder="Brief description of what to submit..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Google Form URL <span style="color: #ef4444;">*</span></label>
                    <input type="url" id="linkUrl" class="form-input"
                        placeholder="https://docs.google.com/forms/d/e/...">
                </div>
                <div class="form-group">
                    <label class="form-label">Target Audience</label>
                    <div class="target-options">
                        <div class="target-option selected" onclick="selectTarget('all')" id="targetAll">
                            <i class="fas fa-globe"></i>
                            <span>All Interns</span>
                        </div>
                        <div class="target-option" onclick="selectTarget('batch')" id="targetBatch">
                            <i class="fas fa-layer-group"></i>
                            <span>Specific Batch</span>
                        </div>
                        <div class="target-option" onclick="selectTarget('intern')" id="targetIntern">
                            <i class="fas fa-user"></i>
                            <span>Specific Intern</span>
                        </div>
                    </div>
                </div>
                <!-- Batch Selector (hidden by default) -->
                <div class="form-group" id="batchSelectorGroup" style="display: none;">
                    <label class="form-label">Select Batch</label>
                    <select id="batchSelector" class="form-input">
                        <option value="">Loading batches...</option>
                    </select>
                </div>
                <!-- Intern Selector (hidden by default) -->
                <div class="form-group" id="internSelectorGroup" style="display: none;">
                    <label class="form-label">Select Intern</label>
                    <select id="internSelector" class="form-input">
                        <option value="">Loading interns...</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; padding: 16px 24px 20px;">
                <button class="btn btn-secondary" onclick="closeModal('linkModal')">Cancel</button>
                <button class="btn btn-primary" id="saveBtn" onclick="saveLink()">
                    <i class="fas fa-save"></i> Save Link
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        let allLinks = [];
        let editingId = null;
        let selectedTarget = 'all';
        let batchesCache = [];
        let internsCache = [];

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }

        document.getElementById('sidebarOverlay').addEventListener('click', () => toggleSidebar());

        async function init() {
            if (!await ensureAdminAuth()) return;
            await loadLinks();
            // Pre-load batches and interns for modal
            loadBatches();
            loadInterns();
        }

        async function loadLinks() {
            try {
                const { data, error } = await supabaseClient
                    .from('report_submission_links')
                    .select('*, batches(name)')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allLinks = data || [];

                // Update stats
                document.getElementById('statTotal').textContent = allLinks.length;
                document.getElementById('statActive').textContent = allLinks.filter(l => l.is_enabled).length;
                document.getElementById('statDisabled').textContent = allLinks.filter(l => !l.is_enabled).length;

                // Fetch intern names for intern-targeted links
                const internIds = allLinks.filter(l => l.target_intern_id).map(l => l.target_intern_id);
                let internMap = {};
                if (internIds.length > 0) {
                    const { data: profiles } = await supabaseClient.rpc('get_all_profile_emails');
                    if (profiles) profiles.forEach(p => internMap[p.id] = p);
                }

                renderTable(internMap);
            } catch (e) {
                console.error('Error loading links:', e);
                document.getElementById('linksTable').innerHTML =
                    '<tr><td colspan="6" style="text-align:center; padding:2rem; color:#ef4444;"><i class="fas fa-exclamation-triangle"></i> Error loading links</td></tr>';
            }
        }

        function renderTable(internMap = {}) {
            const tbody = document.getElementById('linksTable');

            if (allLinks.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="6" style="text-align:center; padding:3rem; color: var(--c-text-muted);">
                        <i class="fas fa-file-circle-plus" style="font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.4;"></i>
                        <div style="font-size: 1rem; font-weight: 500; margin-bottom: 4px;">No report links yet</div>
                        <div style="font-size: 0.85rem;">Click "Add Link" to create your first report submission link.</div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = allLinks.map(link => {
                let targetHtml = '';
                if (link.target_type === 'all') {
                    targetHtml = '<span class="target-badge all"><i class="fas fa-globe"></i> All Interns</span>';
                } else if (link.target_type === 'batch') {
                    const batchName = link.batches?.name || 'Unknown Batch';
                    targetHtml = `<span class="target-badge batch"><i class="fas fa-layer-group"></i> ${batchName}</span>`;
                } else if (link.target_type === 'intern') {
                    const intern = internMap[link.target_intern_id];
                    const internName = intern?.full_name || 'Unknown Intern';
                    targetHtml = `<span class="target-badge intern"><i class="fas fa-user"></i> ${internName}</span>`;
                }

                return `
                <tr>
                    <td>
                        <div style="font-weight: 600; color: var(--c-text-primary); margin-bottom: 2px;">${link.title}</div>
                        ${link.description ? `<div style="font-size: 0.8rem; color: var(--c-text-muted); max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${link.description}</div>` : ''}
                    </td>
                    <td class="url-cell">
                        <a href="${link.form_url}" target="_blank" title="${link.form_url}">
                            <i class="fas fa-external-link-alt" style="margin-right: 4px; font-size: 0.7rem;"></i>
                            ${link.form_url.length > 40 ? link.form_url.substring(0, 40) + '...' : link.form_url}
                        </a>
                    </td>
                    <td>${targetHtml}</td>
                    <td>
                        <label class="toggle-switch" title="${link.is_enabled ? 'Click to disable' : 'Click to enable'}">
                            <input type="checkbox" ${link.is_enabled ? 'checked' : ''} onchange="toggleLink('${link.id}', this.checked)">
                            <span class="toggle-slider"></span>
                        </label>
                    </td>
                    <td style="font-size: 0.85rem; color: var(--c-text-secondary);">
                        ${new Date(link.created_at).toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' })}
                    </td>
                    <td>
                        <div style="display: flex; gap: 6px;">
                            <button class="btn btn-secondary btn-sm" onclick="openEditModal('${link.id}')" title="Edit">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="btn btn-sm" onclick="deleteLink('${link.id}')" title="Delete"
                                style="background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171;">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        async function toggleLink(id, enabled) {
            try {
                const { error } = await supabaseClient
                    .from('report_submission_links')
                    .update({ is_enabled: enabled, updated_at: new Date().toISOString() })
                    .eq('id', id);

                if (error) throw error;

                // Update local cache
                const link = allLinks.find(l => l.id === id);
                if (link) link.is_enabled = enabled;
                document.getElementById('statActive').textContent = allLinks.filter(l => l.is_enabled).length;
                document.getElementById('statDisabled').textContent = allLinks.filter(l => !l.is_enabled).length;

                Swal.fire({
                    icon: 'success',
                    title: enabled ? 'Link Enabled' : 'Link Disabled',
                    text: enabled ? 'Interns can now see this link.' : 'This link is now hidden from interns.',
                    timer: 1500,
                    showConfirmButton: false
                });
            } catch (e) {
                console.error('Error toggling link:', e);
                Swal.fire('Error', 'Failed to update link status', 'error');
                loadLinks(); // Revert UI
            }
        }

        async function deleteLink(id) {
            const result = await Swal.fire({
                title: 'Delete this link?',
                text: 'This action cannot be undone.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Yes, delete it',
                cancelButtonText: 'Cancel'
            });

            if (!result.isConfirmed) return;

            try {
                const { error } = await supabaseClient
                    .from('report_submission_links')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                Swal.fire({ icon: 'success', title: 'Deleted', timer: 1200, showConfirmButton: false });
                loadLinks();
            } catch (e) {
                console.error('Error deleting link:', e);
                Swal.fire('Error', 'Failed to delete link', 'error');
            }
        }

        // ──── Modal Functions ────

        async function loadBatches() {
            try {
                const { data, error } = await supabaseClient
                    .from('batches')
                    .select('id, name')
                    .order('name');
                if (error) throw error;
                batchesCache = data || [];
                const sel = document.getElementById('batchSelector');
                sel.innerHTML = '<option value="">Select a batch...</option>' +
                    batchesCache.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            } catch (e) {
                console.error('Error loading batches:', e);
            }
        }

        async function loadInterns() {
            try {
                const { data, error } = await supabaseClient.rpc('get_all_profile_emails');
                if (error) throw error;
                internsCache = (data || []).filter(p => p.full_name);
                internsCache.sort((a, b) => (a.full_name || '').localeCompare(b.full_name || ''));
                const sel = document.getElementById('internSelector');
                sel.innerHTML = '<option value="">Select an intern...</option>' +
                    internsCache.map(i => `<option value="${i.id}">${i.full_name} (${i.email || 'No email'})</option>`).join('');
            } catch (e) {
                console.error('Error loading interns:', e);
            }
        }

        function selectTarget(type) {
            selectedTarget = type;
            document.querySelectorAll('.target-option').forEach(el => el.classList.remove('selected'));
            document.getElementById('target' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('selected');

            document.getElementById('batchSelectorGroup').style.display = type === 'batch' ? '' : 'none';
            document.getElementById('internSelectorGroup').style.display = type === 'intern' ? '' : 'none';
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = 'Add Report Link';
            document.getElementById('linkTitle').value = '';
            document.getElementById('linkDescription').value = '';
            document.getElementById('linkUrl').value = '';
            selectTarget('all');
            document.getElementById('batchSelector').value = '';
            document.getElementById('internSelector').value = '';
            document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Save Link';
            document.getElementById('linkModal').classList.add('open');
        }

        function openEditModal(id) {
            const link = allLinks.find(l => l.id === id);
            if (!link) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = 'Edit Report Link';
            document.getElementById('linkTitle').value = link.title;
            document.getElementById('linkDescription').value = link.description || '';
            document.getElementById('linkUrl').value = link.form_url;
            selectTarget(link.target_type);

            if (link.target_type === 'batch' && link.target_batch_id) {
                document.getElementById('batchSelector').value = link.target_batch_id;
            }
            if (link.target_type === 'intern' && link.target_intern_id) {
                document.getElementById('internSelector').value = link.target_intern_id;
            }

            document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> Update Link';
            document.getElementById('linkModal').classList.add('open');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        async function saveLink() {
            const title = document.getElementById('linkTitle').value.trim();
            const description = document.getElementById('linkDescription').value.trim();
            const formUrl = document.getElementById('linkUrl').value.trim();

            if (!title || !formUrl) {
                Swal.fire('Missing Fields', 'Title and Google Form URL are required.', 'warning');
                return;
            }

            // Validate URL
            try {
                new URL(formUrl);
            } catch {
                Swal.fire('Invalid URL', 'Please enter a valid URL.', 'warning');
                return;
            }

            let targetBatchId = null;
            let targetInternId = null;

            if (selectedTarget === 'batch') {
                targetBatchId = document.getElementById('batchSelector').value;
                if (!targetBatchId) {
                    Swal.fire('Select Batch', 'Please select a batch.', 'warning');
                    return;
                }
            } else if (selectedTarget === 'intern') {
                targetInternId = document.getElementById('internSelector').value;
                if (!targetInternId) {
                    Swal.fire('Select Intern', 'Please select an intern.', 'warning');
                    return;
                }
            }

            const saveBtn = document.getElementById('saveBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            saveBtn.disabled = true;

            try {
                const payload = {
                    title,
                    description: description || null,
                    form_url: formUrl,
                    target_type: selectedTarget,
                    target_batch_id: targetBatchId,
                    target_intern_id: targetInternId,
                    updated_at: new Date().toISOString()
                };

                if (editingId) {
                    // Update
                    const { error } = await supabaseClient
                        .from('report_submission_links')
                        .update(payload)
                        .eq('id', editingId);
                    if (error) throw error;
                } else {
                    // Insert
                    payload.is_enabled = true;
                    payload.created_at = new Date().toISOString();
                    const { error } = await supabaseClient
                        .from('report_submission_links')
                        .insert(payload);
                    if (error) throw error;
                }

                Swal.fire({
                    icon: 'success',
                    title: editingId ? 'Link Updated!' : 'Link Created!',
                    timer: 1500,
                    showConfirmButton: false
                });

                closeModal('linkModal');
                loadLinks();
            } catch (e) {
                console.error('Error saving link:', e);
                Swal.fire('Error', 'Failed to save link: ' + e.message, 'error');
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        }

        // Initialize
        init();
    </script>
</body>

</html>
