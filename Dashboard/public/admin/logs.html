<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Activity Logs | GKK Interns - Code. Build. Deploy.</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display: flex; align-items: center; gap: 16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Activity Logs</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="loadLogs()" title="Refresh Logs">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </header>

            <div class="page-body">
                <div class="card-premium">
                    <div class="card-header">
                        <h3 class="card-title">Recent Activity</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Admin</th>
                                    <th>Action</th>
                                    <th>Details</th>
                                    <th>Device/IP</th>
                                </tr>
                            </thead>
                            <tbody id="logsTableBody">
                                <tr>
                                    <td colspan="5" style="text-align: center; padding: 2rem;">Loading logs...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="../js/admin-identity.js"></script> <!-- Identity Check -->
    <script src="../js/main-page-btn.js"></script>

    <script>
        // Sidebar Mobile Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            sidebar.classList.contains('open') ? overlay.style.display = 'block' : overlay.style.display = 'none';
        }
        document.getElementById('sidebarOverlay')?.addEventListener('click', () => toggleSidebar());

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs();
        });

        async function loadLogs() {
            const tbody = document.getElementById('logsTableBody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';

            try {
                const { data, error } = await supabaseClient
                    .from('admin_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 2rem;">No logs found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(log => `
                    <tr>
                        <td style="white-space: nowrap;">${new Date(log.created_at).toLocaleString()}</td>
                        <td style="font-weight: 600; color: var(--c-text-primary);">${log.admin_name || 'Unknown'}</td>
                        <td><span class="badge badge-neutral">${log.action}</span></td>
                        <td style="color: var(--c-text-secondary);">${log.details || '-'}</td>
                        <td style="font-size: 0.75rem; color: var(--c-text-muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${log.user_agent || ''}">
                            ${log.ip_address || ''} <br>
                            ${(log.user_agent || '').split(')')[0] + ')'}
                        </td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error('Error loading logs:', err);
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center; padding: 2rem; color: #ef4444;">Error loading logs: ${err.message}</td></tr>`;
            }
        }
    </script>
    <script src="../js/admin-cursor.js"></script>
</body>

</html>
