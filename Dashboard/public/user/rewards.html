<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rewards | GKK Interns - Code. Build. Deploy.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/user-modern.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <style>
        .rewards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding: 24px;
        }

        .reward-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.95) 100%);
            border-radius: 16px;
            border: 1px solid rgba(245, 158, 11, 0.2);
            border-top: 3px solid var(--c-accent-orange);
            /* Color Pop */
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .reward-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: var(--c-primary);
        }

        .reward-card.redeemed {
            opacity: 0.7;
        }

        .reward-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--c-primary-alpha), var(--c-secondary-alpha));
        }

        .reward-image-placeholder {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--c-primary-alpha), var(--c-secondary-alpha));
            font-size: 64px;
            color: var(--c-primary);
        }

        .reward-content {
            padding: 20px;
        }

        .reward-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--c-text-primary);
            margin-bottom: 8px;
        }

        .reward-description {
            color: var(--c-text-secondary);
            font-size: 0.9rem;
            margin-bottom: 16px;
            line-height: 1.5;
        }

        .reward-coupon-box {
            background: var(--c-bg-app);
            border: 2px dashed var(--c-primary);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        .reward-coupon-label {
            font-size: 0.75rem;
            color: var(--c-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .reward-coupon-code {
            font-family: monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--c-primary);
            letter-spacing: 2px;
        }

        .reward-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--c-border);
        }

        .reward-expiry {
            font-size: 0.85rem;
            color: var(--c-text-tertiary);
        }

        .reward-expiry i {
            margin-right: 6px;
        }

        .reward-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--c-success);
        }

        .reward-message {
            background: var(--c-primary-alpha);
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            font-size: 0.9rem;
            color: var(--c-text-secondary);
        }

        .reward-message i {
            color: var(--c-primary);
            margin-right: 8px;
        }

        .reward-assigned {
            font-size: 0.8rem;
            color: var(--c-text-tertiary);
            margin-top: 8px;
        }

        .btn-copy-code {
            background: var(--c-primary);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 12px auto 0;
        }

        .btn-copy-code:hover {
            background: var(--c-primary-dark);
            transform: scale(1.02);
        }

        .redeemed-badge {
            background: var(--c-success-alpha);
            color: var(--c-success);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--c-text-secondary);
        }

        .empty-state i {
            font-size: 64px;
            color: var(--c-border);
            margin-bottom: 24px;
        }

        .empty-state h3 {
            color: var(--c-text-primary);
            margin-bottom: 12px;
        }

        .page-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            border-bottom: 1px solid var(--c-border);
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--c-text-primary);
        }

        .page-subtitle {
            color: var(--c-text-secondary);
            margin-top: 4px;
        }

        .stats-row {
            display: flex;
            gap: 16px;
        }

        .stat-badge {
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--c-primary);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--c-text-tertiary);
            text-transform: uppercase;
        }

        /* App Layout */
        .app-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: var(--c-bg-card, #1e293b);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--c-border, #334155);
        }

        .sidebar-header {
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--c-text-primary, #f8fafc);
        }

        .logo span {
            color: var(--c-primary, #10b981);
        }

        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--c-text-secondary, #94a3b8);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--c-primary, #10b981);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 1rem;
            border-top: 1px solid var(--c-border, #334155);
        }

        .btn-logout {
            width: 100%;
            background: transparent;
            border: 1px solid var(--c-border, #334155);
            color: var(--c-text-secondary, #94a3b8);
            padding: 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .main-content {
            background: var(--c-bg-app, #0f172a);
            overflow-y: auto;
        }

        /* Mobile Menu Toggle */
        .mobile-menu-toggle {
            display: none;
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 1001;
            width: 44px;
            height: 44px;
            background: var(--c-bg-card, #1e293b);
            border: 1px solid var(--c-border, #334155);
            border-radius: 8px;
            cursor: pointer;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .mobile-menu-toggle span {
            width: 20px;
            height: 2px;
            background: var(--c-text-primary, #f8fafc);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .mobile-menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .mobile-menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .mobile-menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .mobile-overlay.active {
            display: block;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: flex;
            }

            .app-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                width: 280px;
                height: 100vh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                padding-top: 4rem;
            }

            .page-header-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                padding: 1rem;
                padding-left: 4.5rem;
            }

            .stats-row {
                width: 100%;
            }

            .stat-badge {
                flex: 1;
                padding: 10px 12px;
            }

            .stat-value {
                font-size: 1.25rem;
            }

            .rewards-container {
                grid-template-columns: 1fr;
                padding: 1rem;
            }

            .page-title {
                font-size: 1.25rem;
            }
        }

        @media (max-width: 480px) {
            .page-header-content {
                padding: 0.75rem;
                padding-left: 4rem;
            }

            .page-title {
                font-size: 1.1rem;
            }

            .page-subtitle {
                font-size: 0.8rem;
            }

            .stat-badge {
                padding: 8px 10px;
            }

            .stat-value {
                font-size: 1.1rem;
            }

            .stat-label {
                font-size: 0.7rem;
            }

            .reward-card {
                border-radius: 12px;
            }

            .reward-image,
            .reward-image-placeholder {
                height: 140px;
            }

            .reward-content {
                padding: 16px;
            }

            .reward-title {
                font-size: 1.1rem;
            }

            .reward-coupon-code {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>
    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileMenu()"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">GKK <span>Intern</span></h1>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="rewards.html" class="nav-link active"><i class="fas fa-gift"></i> My Rewards</a>
            </nav>
            <div class="sidebar-footer">
                <button onclick="logout()" class="btn btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content theme-orange">
            <div class="page-header-content">
                <div>
                    <h1 class="page-title"><i class="fas fa-gift"
                            style="color: var(--c-primary); margin-right: 12px;"></i>My Rewards</h1>
                    <p class="page-subtitle">Rewards earned for your excellent work</p>
                </div>
                <div class="stat-badge">
                    <div class="stat-value" id="availableRewards">0</div>
                    <div class="stat-label">Available</div>
                </div>
            </div>
    </div>

    <div id="rewardsContainer" class="rewards-container">
        <!-- Skeleton will be injected if needed -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <i class="fas fa-gift"></i>
            <h3>No Rewards Yet</h3>
            <p>Keep up the great work! Rewards will appear here when you earn them.</p>
        </div>
    </div>
    </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        let currentUser = null;

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = session.user;

            // Skeleton check - Only if empty state is hidden/default
            const container = document.getElementById('rewardsContainer');
            if (container && typeof SkeletonUI !== 'undefined') {
                container.innerHTML = SkeletonUI.generateCards(3); // Start with skeletons
                // We'll append empty state later if needed, or clear container
            }

            loadMyRewards();
        }

        async function loadMyRewards() {
            try {
                const { data: assignments, error } = await supabase
                    .from('reward_assignments')
                    .select(`
                        *,
                        rewards:reward_id (*)
                    `)
                    .eq('user_id', currentUser.id)
                    .order('assigned_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('rewardsContainer');
                const emptyState = document.getElementById('emptyState');
                const totalRewardsEl = document.getElementById('totalRewards');
                const availableRewardsEl = document.getElementById('availableRewards');

                if (!assignments || assignments.length === 0) {
                    emptyState.style.display = 'block';
                    totalRewardsEl.textContent = '0';
                    availableRewardsEl.textContent = '0';
                    return;
                }

                emptyState.style.display = 'none';
                totalRewardsEl.textContent = assignments.length;
                availableRewardsEl.textContent = assignments.filter(a => !a.redeemed).length;

                container.innerHTML = assignments.map(assignment => {
                    const reward = assignment.rewards;
                    if (!reward) return '';

                    const assignedDate = new Date(assignment.assigned_at).toLocaleDateString('en-IN', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });

                    return `
                        <div class="reward-card ${assignment.redeemed ? 'redeemed' : ''}">
                            ${reward.image_url
                            ? `<img src="${reward.image_url}" alt="${reward.title}" class="reward-image" loading="lazy" onerror="this.outerHTML='<div class=\\'reward-image-placeholder\\'><i class=\\'fas fa-gift\\'></i></div>'">`
                            : '<div class="reward-image-placeholder"><i class="fas fa-gift"></i></div>'
                        }
                            <div class="reward-content">
                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                    <h3 class="reward-title">${reward.title}</h3>
                                    ${assignment.redeemed ? '<span class="redeemed-badge"><i class="fas fa-check"></i> Used</span>' : ''}
                                </div>
                                <p class="reward-description">${reward.description || 'No description provided.'}</p>
                                
                                <div class="reward-coupon-box">
                                    <div class="reward-coupon-label">Coupon Code</div>
                                    <div class="reward-coupon-code">${reward.coupon_code}</div>
                                    <button class="btn-copy-code" onclick="copyCode('${reward.coupon_code}', this)">
                                        <i class="fas fa-copy"></i> Copy Code
                                    </button>
                                </div>
                                
                                ${assignment.message ? `
                                    <div class="reward-message">
                                        <i class="fas fa-comment"></i>${assignment.message}
                                    </div>
                                ` : ''}
                                
                                <div class="reward-meta">
                                    ${reward.expiry_text ? `
                                        <span class="reward-expiry"><i class="fas fa-clock"></i>${reward.expiry_text}</span>
                                    ` : '<span></span>'}
                                    ${reward.value ? `
                                        <span class="reward-value">₹${reward.value}</span>
                                    ` : ''}
                                </div>
                                
                                <div class="reward-assigned">
                                    <i class="fas fa-calendar-alt"></i> Received on ${assignedDate}
                                </div>
                                
                                ${!assignment.redeemed ? `
                                    <button class="btn btn-primary" style="width: 100%; margin-top: 16px;" onclick="markRedeemed('${assignment.id}', this)">
                                        <i class="fas fa-check-circle"></i> Mark as Used
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error('Error loading rewards:', err);
                showToast('Failed to load rewards', 'error');
            }
        }

        async function copyCode(code, btn) {
            try {
                await navigator.clipboard.writeText(code);
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.background = 'var(--c-success)';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                }, 2000);
            } catch (err) {
                showToast('Failed to copy code', 'error');
            }
        }

        async function markRedeemed(assignmentId, btn) {
            try {
                const { error } = await supabase
                    .from('reward_assignments')
                    .update({ redeemed: true })
                    .eq('id', assignmentId);

                if (error) throw error;

                showToast('Reward marked as used!', 'success');
                loadMyRewards();
            } catch (err) {
                console.error('Error marking reward:', err);
                showToast('Failed to update reward', 'error');
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'login.html';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                ${message}
            `;
            toast.style.cssText = `
                position: fixed;
                bottom: 24px;
                right: 24px;
                background: ${type === 'success' ? 'var(--c-success)' : type === 'error' ? 'var(--c-danger)' : 'var(--c-primary)'};
                color: white;
                padding: 16px 24px;
                border-radius: 12px;
                display: flex;
                align-items: center;
                gap: 12px;
                z-index: 10000;
                box-shadow: 0 8px 24px rgba(0,0,0,0.3);
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Mobile Menu Functions
        function toggleMobileMenu() {
            const menuToggle = document.getElementById('mobileMenuToggle');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('mobileOverlay');

            menuToggle.classList.toggle('active');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');

            document.body.style.overflow = sidebar.classList.contains('mobile-open') ? 'hidden' : '';
        }

        function closeMobileMenu() {
            const menuToggle = document.getElementById('mobileMenuToggle');
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('mobileOverlay');

            menuToggle.classList.remove('active');
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close menu on nav link click
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', closeMobileMenu);
        });

        // Initialize
        checkAuth();
    </script>
    <script src="../js/main-page-btn.js"></script>
</body>

</html>
