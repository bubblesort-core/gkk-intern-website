<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin Auth | GKK Interns - Code. Build. Deploy.</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <div class="card bg-secondary text-white p-4" style="max-width: 500px; width: 100%;">
        <h3>Restoring Admin Access</h3>
        <p>Your database record exists, but your <b>Auth User</b> is missing. Use this to re-register.</p>

        <form id="setupForm">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" value="noreplay.gkk26@gmail.com" readonly>
                <small class="text-warning">This must match your database record.</small>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="text" id="password" class="form-control" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="btnRec">Register Admin in Auth</button>
        </form>
        <div id="msg" class="mt-3"></div>
        <a href="login.html" class="d-block mt-3 text-center text-light">Back to Login</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase client
        const SUPABASE_URL = window.location.origin + '/supabase-main';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhqcHN5eHFha3pyaHZ6ZWdlaHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3NTI5NjMsImV4cCI6MjA4NDMyODk2M30.nfBtyd_doPQBkBfzHYtQ2q0yl1vf5y0QZPRrkHCOwAU';

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRec');
            const msg = document.getElementById('msg');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = "Registering...";
            msg.innerHTML = "";

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.user) {
                    msg.innerHTML = `<div class="alert alert-success">User Created! <br> ID: ${data.user.id} <br> Email: ${data.user.email} <br> <b>Please check your email to confirm if required, then try logging in.</b></div>`;
                } else {
                    msg.innerHTML = `<div class="alert alert-warning">Check your email for a confirmation link.</div>`;
                }

            } catch (err) {
                msg.innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Register Admin in Auth";
            }
        });
    </script>
</body>

</html>
