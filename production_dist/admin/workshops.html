<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Management | GKK Interns</title>
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        .workshop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 24px;
        }

        .workshop-card {
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .workshop-card:hover {
            transform: translateY(-4px);
            border-color: #3b82f6;
        }

        .workshop-img {
            height: 160px;
            background: #0f172a;
            position: relative;
        }

        .workshop-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-draft {
            background: rgba(100, 116, 139, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .workshop-content {
            padding: 20px;
            flex: 1;
        }

        .workshop-content h3 {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: var(--c-text-primary);
        }

        .workshop-content p {
            font-size: 0.85rem;
            color: var(--c-text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .workshop-actions {
            padding: 16px 20px;
            border-top: 1px solid var(--c-border);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.1);
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--c-bg-card);
            width: 100%;
            max-width: 600px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--c-border);
            overflow: hidden;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--c-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 24px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--c-text-muted);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--c-border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--c-text-primary);
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.05);
        }

        .image-preview {
            width: 100%;
            height: 150px;
            border-radius: 8px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 8px;
            overflow: hidden;
            border: 1px solid var(--c-border);
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="admin-layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title">Workshop Management</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary btn-sm" onclick="openModal()">
                        <i class="fas fa-plus"></i> New Workshop
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="loadWorkshops()" title="Refresh">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </header>

            <div class="page-body">
                <div id="loader" style="text-align:center; padding: 40px;">
                    <i class="fas fa-circle-notch fa-spin fa-2x"></i>
                    <p>Loading workshops...</p>
                </div>

                <div id="workshopList" class="workshop-grid" style="display:none;"></div>

                <div id="emptyState" style="display:none; text-align:center; padding: 60px 20px; color: var(--c-text-muted);">
                    <i class="fas fa-calendar-times fa-3x" style="margin-bottom: 20px; opacity: 0.3;"></i>
                    <h3>No Workshops Found</h3>
                    <p>Create your first workshop popup for the landing page.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit/Create Modal -->
    <div class="modal" id="workshopModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Workshop</h2>
                <button class="btn btn-icon" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="workshopForm">
                    <input type="hidden" id="workshopId">
                    <div class="form-group">
                        <label>Workshop Title</label>
                        <input type="text" id="title" required placeholder="e.g. Masterclass on UI Design">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" rows="2" placeholder="Brief details about the workshop..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Instructor Name</label>
                            <input type="text" id="instructorName" placeholder="e.g. John Doe">
                        </div>
                        <div class="form-group">
                            <label>Session Date</label>
                            <input type="text" id="sessionDate" placeholder="e.g. Sunday, Oct 24">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Session Time</label>
                            <input type="text" id="sessionTime" placeholder="e.g. 5:00 PM IST">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="isActive">
                                <option value="false">Draft (Hidden)</option>
                                <option value="true">Active (Visible)</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Hero Image URL</label>
                            <input type="url" id="heroImageUrl" placeholder="https://..." oninput="updatePreview()">
                        </div>
                        <div class="form-group">
                            <label>Image Preview</label>
                            <div class="image-preview" id="previewContainer">
                                <span style="opacity:0.3">No Image</span>
                            </div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>CTA Button Text</label>
                            <input type="text" id="ctaText" placeholder="Learn More" value="Learn More">
                        </div>
                        <div class="form-group">
                            <label>CTA Link</label>
                            <input type="url" id="ctaLink" placeholder="https://...">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Banner Timer (Seconds)</label>
                            <input type="number" id="timerDuration" value="5" min="0">
                        </div>
                    </div>
                </form>
            </div>
            <div class="workshop-actions">
                <button class="btn btn-primary" onclick="saveWorkshop()" id="saveBtn">Save Workshop</button>
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Core Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        let allWorkshops = [];

        async function init() {
            // Ensure auth
            const authOk = await ensureAdminAuth();
            if (!authOk) return;

            loadWorkshops();
        }

        async function loadWorkshops() {
            if (document.getElementById('loader')) document.getElementById('loader').style.display = 'block';
            if (document.getElementById('workshopList')) document.getElementById('workshopList').style.display = 'none';
            if (document.getElementById('emptyState')) document.getElementById('emptyState').style.display = 'none';

            try {
                const { data, error } = await supabaseClient
                    .from('workshops')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                allWorkshops = data || [];
                renderWorkshops();
            } catch (err) {
                if (err instanceof TypeError && err.message.includes('null')) return; // SPA detachment safe abort
                console.error('Database Error:', err);
                Swal.fire('Error', 'Failed to load workshops', 'error');
            } finally {
                if (document.getElementById('loader')) document.getElementById('loader').style.display = 'none';
            }
        }

        function renderWorkshops() {
            const listEl = document.getElementById('workshopList');
            if (allWorkshops.length === 0) {
                if (document.getElementById('emptyState')) document.getElementById('emptyState').style.display = 'block';
                return;
            }

            listEl.innerHTML = '';
            allWorkshops.forEach(w => {
                const card = document.createElement('div');
                card.className = 'workshop-card';
                card.innerHTML = `
                    <div class="workshop-img">
                        ${w.hero_image_url ? `<img src="${w.hero_image_url}" alt="">` : '<div style="height:100%; display:flex; align-items:center; justify-content:center; opacity:0.1;"><i class="fas fa-image fa-3x"></i></div>'}
                        <span class="status-badge ${w.is_active ? 'status-active' : 'status-draft'}">${w.is_active ? 'Active' : 'Draft'}</span>
                    </div>
                    <div class="workshop-content">
                        <h3>${w.title}</h3>
                        <p style="margin-bottom:10px;">${w.description ? (w.description.length > 80 ? w.description.substring(0, 80) + '...' : w.description) : 'No description'}</p>
                        ${w.instructor_name ? `<div style="font-size:0.8rem; color:#3b82f6; font-weight:600; margin-bottom:4px;"><i class="fas fa-user-tie"></i> ${w.instructor_name}</div>` : ''}
                        ${w.session_date ? `<div style="font-size:0.75rem; color:var(--c-text-muted);"><i class="fas fa-clock"></i> ${w.session_date}</div>` : ''}
                    </div>
                    <div class="workshop-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editWorkshop('${w.id}')" style="flex:1;"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn btn-icon btn-sm" onclick="deleteWorkshop('${w.id}')" style="color:#ef4444;"><i class="fas fa-trash"></i></a>
                    </div>
                `;
                listEl.appendChild(card);
            });
            listEl.style.display = 'grid';
        }

        function openModal(data = null) {
            const form = document.getElementById('workshopForm');
            form.reset();
            if (document.getElementById('workshopId')) document.getElementById('workshopId').value = '';
            if (document.getElementById('modalTitle')) document.getElementById('modalTitle').textContent = 'New Workshop';
            if (document.getElementById('previewContainer')) document.getElementById('previewContainer').innerHTML = '<span style="opacity:0.3">No Image</span>';

            if (data) {
                if (document.getElementById('workshopId')) document.getElementById('workshopId').value = data.id;
                if (document.getElementById('modalTitle')) document.getElementById('modalTitle').textContent = 'Edit Workshop';
                if (document.getElementById('title')) document.getElementById('title').value = data.title;
                if (document.getElementById('description')) document.getElementById('description').value = data.description || '';
                if (document.getElementById('heroImageUrl')) document.getElementById('heroImageUrl').value = data.hero_image_url || '';
                if (document.getElementById('ctaText')) document.getElementById('ctaText').value = data.cta_text || 'Learn More';
                if (document.getElementById('ctaLink')) document.getElementById('ctaLink').value = data.cta_link || '';
                if (document.getElementById('timerDuration')) document.getElementById('timerDuration').value = data.timer_duration || 5;
                if (document.getElementById('isActive')) document.getElementById('isActive').value = data.is_active.toString();
                if (document.getElementById('instructorName')) document.getElementById('instructorName').value = data.instructor_name || '';
                if (document.getElementById('sessionDate')) document.getElementById('sessionDate').value = data.session_date || '';
                if (document.getElementById('sessionTime')) document.getElementById('sessionTime').value = data.session_time || '';
                updatePreview();
            }

            document.getElementById('workshopModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('workshopModal').classList.remove('active');
        }

        function updatePreview() {
            const url = (document.getElementById('heroImageUrl')?.value || '');
            const container = document.getElementById('previewContainer');
            if (url) {
                container.innerHTML = `<img src="${url}" alt="Preview" onerror="this.src=''; this.parentElement.innerHTML='<span style=\'color:#ef4444\'>Invalid Image URL</span>';">`;
            } else {
                container.innerHTML = '<span style="opacity:0.3">No Image</span>';
            }
        }

        async function saveWorkshop() {
            const id = (document.getElementById('workshopId')?.value || '');
            const title = (document.getElementById('title')?.value || '');
            const description = (document.getElementById('description')?.value || '');
            
            if (!title || !description) {
                return Swal.fire('Error', 'Title and Description are mandatory', 'error');
            }

            const payload = {
                title: title,
                description: description,
                hero_image_url: (document.getElementById('heroImageUrl')?.value || ''),
                cta_text: (document.getElementById('ctaText')?.value || ''),
                cta_link: (document.getElementById('ctaLink')?.value || ''),
                timer_duration: parseInt((document.getElementById('timerDuration')?.value || '')) || 5,
                is_active: (document.getElementById('isActive')?.value || 'false') === 'true',
                instructor_name: (document.getElementById('instructorName')?.value || ''),
                session_date: (document.getElementById('sessionDate')?.value || ''),
                session_time: (document.getElementById('sessionTime')?.value || '')
            };

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Saving...';

            try {
                if (id) {
                    const { error } = await supabaseClient
                        .from('workshops')
                        .update(payload)
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    const { data: { user } } = await supabaseClient.auth.getUser();
                    const { error } = await supabaseClient
                        .from('workshops')
                        .insert([{ ...payload, created_by: user.id }]);
                    if (error) throw error;
                }

                Swal.fire('Success', 'Workshop saved successfully', 'success');
                closeModal();
                loadWorkshops();
            } catch (err) {
                console.error(err);
                Swal.fire('Error', err.message || 'Failed to save workshop', 'error');
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Save Workshop';
            }
        }

        function editWorkshop(id) {
            const w = allWorkshops.find(item => item.id === id);
            if (w) openModal(w);
        }

        async function deleteWorkshop(id) {
            const res = await Swal.fire({
                title: 'Are you sure?',
                text: "This will permanently delete this workshop popup.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Yes, delete it!'
            });

            if (res.isConfirmed) {
                try {
                    const { error } = await supabaseClient.from('workshops').delete().eq('id', id);
                    if (error) throw error;
                    Swal.fire('Deleted', 'Workshop deleted successfully', 'success');
                    loadWorkshops();
                } catch (err) {
                    Swal.fire('Error', 'Failed to delete workshop', 'error');
                }
            }
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) {
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }

        document.getElementById('sidebarOverlay')?.addEventListener('click', toggleSidebar);

        init();
    </script>
    <script src="../js/admin-cursor.js"></script>
</body>

</html>
