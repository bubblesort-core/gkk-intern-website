<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchandise | GKK Interns Admin</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .banner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .banner-card {
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .banner-card.active {
            border-top: 4px solid #10b981;
        }
        
        .banner-card.inactive {
            border-top: 4px solid #4b5563;
        }

        .settings-card {
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .badge-active {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-inactive {
            background: rgba(75, 85, 99, 0.15);
            color: #9ca3af;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display: flex; align-items: center; gap: 16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Merchandise Management</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary btn-sm" onclick="openProductModal()">
                        <i class="fas fa-plus"></i> Add Product
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="loadData()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </header>

            <div class="page-body">
                <div id="loadingIndicator" style="text-align: center; padding: 3rem; color: var(--c-text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 1rem; color: var(--c-primary);"></i>
                    <p>Loading...</p>
                </div>
                
                <div id="contentArea" style="display: none;">
                    <div class="settings-card">
                        <h3 style="margin-top: 0; margin-bottom: 1rem;">Store Settings</h3>
                        <div class="form-row">
                            <div>
                                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--c-text-primary); margin-bottom: 1rem;">
                                    <input type="checkbox" id="storeOpenToggle" style="width: 18px; height: 18px; accent-color: var(--c-primary);">
                                    Store is Open
                                </label>
                            </div>
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Lock Message (Shown when closed)</label>
                            <input type="text" id="lockMessageInput" class="form-input"
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                        <button class="btn btn-primary btn-sm" style="margin-top: 1rem;" onclick="saveSettings()" id="btnSaveSettings">Save Settings</button>
                    </div>

                    <h3 style="margin-top: 2rem; margin-bottom: 1rem;">Products</h3>
                    <div id="noProductsMsg" style="display: none; text-align: center; padding: 3rem; opacity: 0.6; background: var(--c-bg-card); border-radius: 12px; border: 1px solid var(--c-border);">
                        <i class="fas fa-tshirt" style="font-size: 2rem; margin-bottom: 1rem;"></i>
                        <p>No products found. Add your first one!</p>
                    </div>

                    <div class="banner-grid" id="productsGrid">
                        <!-- Products injected here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Form Modal -->
    <div class="modal-overlay" id="productModal" style="display:none;">
        <div class="modal-container" style="max-width: 600px; width: 100%;">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Add Product</h3>
                <button class="modal-close" onclick="closeProductModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" style="max-height: 70vh; overflow-y: auto;">
                <input type="hidden" id="editProductId">
                <div style="display: grid; gap: 1rem;">
                    
                    <div>
                        <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Name *</label>
                        <input type="text" id="prodName" class="form-input" 
                            style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                    </div>
                    
                    <div>
                        <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Slug (URL identifier) *</label>
                        <input type="text" id="prodSlug" class="form-input" 
                            style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                    </div>
                    
                    <div class="form-row">
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Original Price (Compare At)</label>
                            <input type="number" id="prodComparePrice" class="form-input" 
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;"
                                oninput="calculateDiscount()">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">% Discount</label>
                            <input type="number" id="prodDiscountPercent" class="form-input" 
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;"
                                oninput="calculatePriceFromDiscount()">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Selling Price (Discounted) *</label>
                            <input type="number" id="prodPrice" class="form-input" 
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;"
                                oninput="calculateDiscount()">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Expected Delivery Date</label>
                            <input type="text" id="prodExpectedDelivery" class="form-input" placeholder="e.g. 5-7 Business Days or 23 June"
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                    </div>

                    <div class="form-row">
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Delivery Charge (₹)</label>
                            <input type="number" id="prodDeliveryCharge" class="form-input" placeholder="0"
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Delivery Charge Type</label>
                            <select id="prodDeliveryChargeType" class="form-input" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                                <option value="included">Included in Price</option>
                                <option value="extra">Extra / Added to Price</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Stock Count (Blank for Unlimited)</label>
                            <input type="number" id="prodStockCount" class="form-input" placeholder="e.g. 50"
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Stock Refill Note (Shown when 0)</label>
                            <input type="text" id="prodStockRefillNote" class="form-input" placeholder="e.g. Restocking in 2 weeks"
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div>
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Payment Gateway</label>
                            <select id="prodPaymentService" class="form-input" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;" onchange="togglePaymentLinkField()">
                                <option value="razorpay">Razorpay (Native)</option>
                                <option value="custom_link">Custom Link / Juspay (External URL)</option>
                            </select>
                        </div>
                        <div id="paymentLinkContainer" style="display: none;">
                            <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">External Payment Link</label>
                            <input type="text" id="prodPaymentLink" class="form-input" placeholder="https://..." 
                                style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                        </div>
                    </div>
                    
                    <div style="margin-top: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                            <label style="color: var(--c-text-secondary); font-size: 0.85rem; margin: 0;">Product Images</label>
                            <button type="button" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 2px 8px; border-radius: 4px;" onclick="addImageInput()">
                                <i class="fas fa-plus"></i> Add URL
                            </button>
                        </div>
                        <div id="imagesContainer" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px;"></div>
                        
                        <div style="display: flex; gap: 8px; align-items: center; background: rgba(255,255,255,0.02); padding: 8px; border-radius: 6px; border: 1px dashed var(--c-border);">
                            <span style="color: var(--c-text-muted); font-size: 0.85rem;">Upload & Add:</span>
                            <input type="file" id="prodImageFile" accept="image/*" style="font-size: 0.85rem; color: var(--c-text-secondary);">
                            <button id="btnUploadImage" class="btn btn-secondary btn-sm" onclick="uploadImageFile()" type="button">Upload</button>
                        </div>
                    </div>
                    
                    <div>
                        <label style="display: block; margin-bottom: 4px; color: var(--c-text-secondary); font-size: 0.85rem;">Description</label>
                        <textarea id="prodDesc" rows="3" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white; resize: vertical;"></textarea>
                    </div>

                    <div style="margin-top: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                            <label style="color: var(--c-text-secondary); font-size: 0.85rem; margin: 0;">Highlights (Bullet Points)</label>
                            <button type="button" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 2px 8px; border-radius: 4px;" onclick="addFeatureInput()">
                                <i class="fas fa-plus"></i> Add
                            </button>
                        </div>
                        <div id="featuresContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>

                    <div style="margin-top: 4px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                            <label style="color: var(--c-text-secondary); font-size: 0.85rem; margin: 0;">Custom Details (Title & Subline)</label>
                            <button type="button" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: white; border: none; padding: 2px 8px; border-radius: 4px;" onclick="addCustomFieldInput()">
                                <i class="fas fa-plus"></i> Add
                            </button>
                        </div>
                        <div id="customFieldsContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>

                    <div style="margin-top: 8px;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--c-text-primary);">
                            <input type="checkbox" id="prodActive" style="width: 18px; height: 18px; accent-color: var(--c-primary);" checked>
                            Active
                        </label>
                    </div>

                </div>
            </div>
            <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center;">
                <button class="btn btn-sm" style="background: transparent; border: 1px solid var(--c-border); color: #94a3b8; font-size: 0.85rem; padding: 6px 12px; border-radius: 6px;" onclick="saveProductPreference()" type="button" title="Save current description, highlights, and custom fields as default for new products">
                    <i class="fas fa-save"></i> Save Preference
                </button>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" onclick="closeProductModal()" id="btnCancel">Cancel</button>
                    <button class="btn btn-primary" onclick="saveProduct()" id="btnSaveProd">Save Product</button>
                </div>
            </div>
        </div>
    </div>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="../js/main-page-btn.js"></script>

    <script>
        // Sidebar Mobile Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            if (sidebar.classList.contains('open')) overlay.style.display = 'block';
            else overlay.style.display = 'none';
        }
        document.getElementById('sidebarOverlay')?.addEventListener('click', () => toggleSidebar());

        let allProducts = [];
        let currentSettings = null;

        async function init() {
            if (!await ensureAdminAuth()) return;
            loadData();
        }

        async function loadData() {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('contentArea').style.display = 'none';

            try {
                // Load Settings
                const { data: settingsData, error: settingsError } = await supabaseClient
                    .from('merchandise_settings')
                    .select('*')
                    .eq('id', 1)
                    .single();
                
                if (settingsError && settingsError.code !== 'PGRST116') throw settingsError;
                
                if (settingsData) {
                    currentSettings = settingsData;
                    document.getElementById('storeOpenToggle').checked = settingsData.is_store_open;
                    document.getElementById('lockMessageInput').value = settingsData.lock_message || '';
                }

                // Load Products
                const { data: productsData, error: productsError } = await supabaseClient
                    .from('merchandise_products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (productsError) throw productsError;
                allProducts = productsData || [];
                renderProducts();

                document.getElementById('contentArea').style.display = 'block';
            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'Failed to load merchandise data.', 'error');
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        async function saveSettings() {
            const toggle = document.getElementById('storeOpenToggle');
            const isOpen = toggle ? toggle.checked : true;
            const lockInput = document.getElementById('lockMessageInput');
            const lockMsg = lockInput ? lockInput.value.trim() : '';
            
            const btn = document.getElementById('btnSaveSettings');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                const payload = {
                    is_store_open: isOpen,
                    lock_message: lockMsg
                };

                const { error } = await supabaseClient
                    .from('merchandise_settings')
                    .upsert({ id: 1, ...payload });

                if (error) throw error;
                Swal.fire({icon: 'success', title: 'Settings Saved', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff'});
            } catch (err) {
                Swal.fire({icon: 'error', title: 'Error', text: err.message, background: '#1e293b', color: '#fff'});
            } finally {
                btn.innerHTML = 'Save Settings';
                btn.disabled = false;
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            if (allProducts.length === 0) {
                document.getElementById('noProductsMsg').style.display = 'block';
                return;
            }
            document.getElementById('noProductsMsg').style.display = 'none';

            let html = '';
            allProducts.forEach(p => {
                const img = (p.images && p.images.length > 0) ? p.images[0] : 'https://via.placeholder.com/400x400?text=No+Image';
                const statusBadge = p.is_active ? 
                    '<span style="background: rgba(16,185,129,0.1); color: #10b981; padding: 2px 8px; border-radius: 1rem; font-size: 0.75rem; font-weight: bold;">ACTIVE</span>' :
                    '<span style="background: rgba(239,68,68,0.1); color: #ef4444; padding: 2px 8px; border-radius: 1rem; font-size: 0.75rem; font-weight: bold;">DRAFT</span>';

                html += `
                    <div class="banner-card ${p.is_active ? 'active' : 'inactive'}">
                        <img src="${escapeHtml(img)}" alt="${escapeHtml(p.name)}" style="width:100%; height:200px; object-fit:cover; background:#fff; border-radius:8px; margin-bottom:12px;" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.5rem;">
                            <div>
                                <h4 style="margin: 0; font-size: 1.1rem;">${escapeHtml(p.name)}</h4>
                                <div style="font-size: 0.8rem; color: var(--c-text-muted); margin-top: 2px;">${escapeHtml(p.slug)}</div>
                            </div>
                            ${statusBadge}
                        </div>
                        <div style="display: flex; align-items: baseline; gap: 8px; margin-bottom: 1rem;">
                            <span style="font-size: 1.2rem; font-weight: bold; color: var(--c-primary);">₹${p.price}</span>
                            ${p.compare_at_price ? `<span style="font-size: 0.9rem; color: var(--c-text-muted); text-decoration: line-through;">₹${p.compare_at_price}</span>` : ''}
                        </div>
                        <div style="display: flex; gap: 0.5rem; margin-top: auto;">
                            <button class="btn btn-secondary btn-sm" style="flex: 1;" onclick="editProduct('${p.id}')"><i class="fas fa-edit"></i> Edit</button>
                            <button class="btn btn-secondary btn-sm" style="background: rgba(239,68,68,0.1); color: #ef4444; border-color: rgba(239,68,68,0.2);" onclick="deleteProduct('${p.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        function addFeatureInput(val = '') {
            const container = document.getElementById('featuresContainer');
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.gap = '8px';
            div.innerHTML = `
                <input type="text" class="form-input feature-input" value="${val}" placeholder="E.g. 100% Premium Cotton" style="flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                <button type="button" onclick="this.parentElement.remove()" style="background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 0 10px; cursor: pointer; transition: 0.2s;"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        function addCustomFieldInput(label = '', val = '') {
            const container = document.getElementById('customFieldsContainer');
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.gap = '8px';
            div.innerHTML = `
                <input type="text" class="form-input cf-label" value="${label}" placeholder="Title (e.g. Fit)" style="width: 100px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                <input type="text" class="form-input cf-val" value="${val}" placeholder="Value (e.g. Regular Fit)" style="flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                <button type="button" onclick="this.parentElement.remove()" style="background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 0 10px; cursor: pointer; transition: 0.2s;"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        function getFeaturesData() {
            return Array.from(document.querySelectorAll('.feature-input')).map(input => input.value.trim()).filter(v => v);
        }

        function getCustomFieldsData() {
            return Array.from(document.querySelectorAll('#customFieldsContainer > div')).map(div => {
                const label = div.querySelector('.cf-label').value.trim();
                const val = div.querySelector('.cf-val').value.trim();
                if (label || val) return { label, value: val };
                return null;
            }).filter(v => v);
        }

        function addImageInput(val = '') {
            const container = document.getElementById('imagesContainer');
            const div = document.createElement('div');
            div.style.display = 'flex';
            div.style.gap = '8px';
            div.innerHTML = `
                <input type="url" class="form-input image-input" value="${val}" placeholder="Image URL (https://...)" style="flex: 1; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--c-border); background: rgba(0,0,0,0.2); color: white;">
                <button type="button" onclick="this.parentElement.remove()" style="background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 0 10px; cursor: pointer; transition: 0.2s;"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        function getImagesData() {
            return Array.from(document.querySelectorAll('.image-input')).map(input => input.value.trim()).filter(v => v);
        }

        function saveProductPreference() {
            const pref = {
                desc: document.getElementById('prodDesc').value.trim(),
                paymentService: document.getElementById('prodPaymentService').value,
                features: getFeaturesData(),
                custom_fields: getCustomFieldsData(),
                images: getImagesData(),
                is_active: document.getElementById('prodActive').checked,
                stock_count: document.getElementById('prodStockCount').value,
                stock_refill_note: document.getElementById('prodStockRefillNote').value,
                expected_delivery: document.getElementById('prodExpectedDelivery').value,
                delivery_charge: document.getElementById('prodDeliveryCharge').value,
                delivery_charge_type: document.getElementById('prodDeliveryChargeType').value
            };
            localStorage.setItem('merch_product_pref', JSON.stringify(pref));
            Swal.fire({icon: 'success', title: 'Preferences Saved!', text: 'New products will use this template.', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff' });
        }

        function togglePaymentLinkField() {
            const service = document.getElementById('prodPaymentService').value;
            const linkContainer = document.getElementById('paymentLinkContainer');
            if (service === 'custom_link') {
                linkContainer.style.display = 'block';
            } else {
                linkContainer.style.display = 'none';
            }
        }

        async function uploadImageFile() {
            const fileInput = document.getElementById('prodImageFile');
            const file = fileInput.files[0];
            if (!file) return Swal.fire('No File', 'Please select a file to upload.', 'warning');
            
            const btn = document.getElementById('btnUploadImage');
            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';
            btn.disabled = true;

            try {
                const fileExt = file.name.split('.').pop();
                const fileName = `merch_${Math.random().toString(36).substring(2, 15)}_${Date.now()}.${fileExt}`;
                
                // Ensure bucket exists in user's supabase project
                const { data, error } = await supabaseClient.storage.from('merchandise').upload(fileName, file);
                if (error) {
                    if (error.message.includes('Bucket not found') || error.message.includes('bucket not found')) {
                        throw new Error("The 'merchandise' storage bucket does not exist. Please create a public bucket named 'merchandise' in your Supabase dashboard.");
                    }
                    throw error;
                }

                const { data: publicUrlData } = supabaseClient.storage.from('merchandise').getPublicUrl(fileName);
                
                addImageInput(publicUrlData.publicUrl);
                Swal.fire({icon: 'success', title: 'Uploaded & Added!', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff' });
            } catch (err) {
                Swal.fire({icon: 'error', title: 'Upload Failed', text: err.message, background: '#1e293b', color: '#fff'});
            } finally {
                btn.innerHTML = origText;
                btn.disabled = false;
                fileInput.value = ''; // clear file input
            }
        }

        function openProductModal() {
            document.getElementById('modalTitle').textContent = 'Add Product';
            document.getElementById('editProductId').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodSlug').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodComparePrice').value = '';
            document.getElementById('prodDiscountPercent').value = '';
            document.getElementById('prodExpectedDelivery').value = '';
            document.getElementById('prodDeliveryCharge').value = '';
            document.getElementById('prodDeliveryChargeType').value = 'included';
            document.getElementById('prodDesc').value = '';
            document.getElementById('prodStockCount').value = '';
            document.getElementById('prodStockRefillNote').value = '';
            document.getElementById('imagesContainer').innerHTML = '';
            document.getElementById('prodPaymentService').value = 'razorpay';
            document.getElementById('prodPaymentLink').value = '';
            document.getElementById('prodActive').checked = true;
            togglePaymentLinkField();
            
            document.getElementById('featuresContainer').innerHTML = '';
            document.getElementById('customFieldsContainer').innerHTML = '';

            // Restore preferences if saved
            const prefStr = localStorage.getItem('merch_product_pref');
            if (prefStr) {
                try {
                    const pref = JSON.parse(prefStr);
                    if (pref.features && pref.features.length) pref.features.forEach(f => addFeatureInput(f));
                    else addFeatureInput();
                    
                    if (pref.custom_fields && pref.custom_fields.length) pref.custom_fields.forEach(cf => addCustomFieldInput(cf.label, cf.value));
                    else addCustomFieldInput();

                    if (pref.images && pref.images.length) pref.images.forEach(img => addImageInput(img));
                    else addImageInput();

                    if (pref.desc) document.getElementById('prodDesc').value = pref.desc;
                    if (pref.paymentService) {
                        document.getElementById('prodPaymentService').value = pref.paymentService;
                        togglePaymentLinkField();
                    }
                    if (pref.stock_count !== undefined) document.getElementById('prodStockCount').value = pref.stock_count;
                    if (pref.stock_refill_note !== undefined) document.getElementById('prodStockRefillNote').value = pref.stock_refill_note;
                    if (pref.expected_delivery !== undefined) document.getElementById('prodExpectedDelivery').value = pref.expected_delivery;
                    if (pref.delivery_charge !== undefined) document.getElementById('prodDeliveryCharge').value = pref.delivery_charge;
                    if (pref.delivery_charge_type !== undefined) document.getElementById('prodDeliveryChargeType').value = pref.delivery_charge_type;
                    if (pref.is_active !== undefined) document.getElementById('prodActive').checked = pref.is_active;
                } catch(e) {
                    addFeatureInput();
                    addCustomFieldInput();
                    addImageInput();
                }
            } else {
                addFeatureInput();
                addCustomFieldInput();
                addImageInput();
            }
            
            const modal = document.getElementById('productModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('open'), 10);
        }

        function editProduct(id) {
            const p = allProducts.find(x => x.id === id);
            if (!p) return;

            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('editProductId').value = p.id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodSlug').value = p.slug;
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodComparePrice').value = p.compare_at_price || '';
            document.getElementById('prodExpectedDelivery').value = p.expected_delivery || '';
            document.getElementById('prodDeliveryCharge').value = p.delivery_charge || '';
            document.getElementById('prodDeliveryChargeType').value = p.delivery_charge_type || 'included';
            document.getElementById('prodDesc').value = p.description || '';
            document.getElementById('prodStockCount').value = (p.stock_count !== null && p.stock_count !== undefined) ? p.stock_count : '';
            document.getElementById('prodStockRefillNote').value = p.stock_refill_note || '';
            document.getElementById('prodPaymentService').value = p.payment_service || 'razorpay';
            document.getElementById('prodPaymentLink').value = p.payment_link || '';
            document.getElementById('prodActive').checked = p.is_active;
            togglePaymentLinkField();

            document.getElementById('imagesContainer').innerHTML = '';
            document.getElementById('featuresContainer').innerHTML = '';
            document.getElementById('customFieldsContainer').innerHTML = '';
            
            if (p.features && p.features.length) {
                p.features.forEach(f => addFeatureInput(f));
            } else {
                addFeatureInput();
            }
            
            if (p.custom_fields && p.custom_fields.length) {
                p.custom_fields.forEach(cf => addCustomFieldInput(cf.label, cf.value));
            } else {
                addCustomFieldInput();
            }

            if (p.images && p.images.length) {
                p.images.forEach(img => addImageInput(img));
            } else {
                addImageInput();
            }

            calculateDiscount();

            const modal = document.getElementById('productModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('open'), 10);
        }

        function closeProductModal() {
            const modal = document.getElementById('productModal');
            modal.classList.remove('open');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        async function clearMerchandiseCache() {
            try {
                await supabaseClient.functions.invoke('get-merchandise-products', {
                    body: { clear_cache: true }
                });
                console.log('Product cache cleared successfully.');
            } catch(e) {
                console.error('Failed to clear product cache:', e);
            }
        }

        async function saveProduct() {
            const id = document.getElementById('editProductId').value;
            const name = document.getElementById('prodName').value.trim();
            const slug = document.getElementById('prodSlug').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const comparePrice = document.getElementById('prodComparePrice').value ? parseFloat(document.getElementById('prodComparePrice').value) : null;
            const expectedDelivery = document.getElementById('prodExpectedDelivery').value.trim();
            const deliveryChargeVal = document.getElementById('prodDeliveryCharge').value;
            const deliveryCharge = deliveryChargeVal === '' ? 0 : parseFloat(deliveryChargeVal);
            const deliveryChargeType = document.getElementById('prodDeliveryChargeType').value;
            const desc = document.getElementById('prodDesc').value;
            const stockCountVal = document.getElementById('prodStockCount').value;
            const stockCount = stockCountVal === '' ? null : parseInt(stockCountVal, 10);
            const stockRefillNote = document.getElementById('prodStockRefillNote').value;
            const images = getImagesData();
            const paymentService = document.getElementById('prodPaymentService').value;
            const paymentLink = document.getElementById('prodPaymentLink').value.trim();
            const isActive = document.getElementById('prodActive').checked;
            
            if (!name || !slug || isNaN(price)) {
                Swal.fire({
                    icon: 'error',
                    title: 'Missing Fields',
                    text: 'Name, Slug, and Price are required!',
                    background: '#1e293b', color: '#fff'
                });
                return;
            }

            const payload = {
                name: name,
                slug: slug,
                price: price,
                compare_at_price: comparePrice,
                expected_delivery: expectedDelivery,
                delivery_charge: deliveryCharge,
                delivery_charge_type: deliveryChargeType,
                description: desc,
                images: images,
                features: getFeaturesData(),
                custom_fields: getCustomFieldsData(),
                payment_service: paymentService,
                payment_link: paymentService === 'custom_link' ? paymentLink : null,
                is_active: isActive,
                stock_count: stockCount,
                stock_refill_note: stockRefillNote
            };

            const btnSave = document.getElementById('btnSaveProd');
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            btnSave.disabled = true;

            try {
                if (id) {
                    const { error } = await supabaseClient.from('merchandise_products').update(payload).eq('id', id);
                    if (error) throw error;
                    Swal.fire({icon: 'success', title: 'Updated!', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff' });
                } else {
                    const { error } = await supabaseClient.from('merchandise_products').insert([payload]);
                    if (error) throw error;
                    Swal.fire({icon: 'success', title: 'Created!', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff' });
                }
                
                // Clear the edge function cache so changes reflect instantly
                await clearMerchandiseCache();
                
                closeProductModal();
                loadData();
            } catch (err) {
                Swal.fire({icon: 'error', title: 'Error', text: err.message, background: '#1e293b', color: '#fff'});
            } finally {
                btnSave.innerHTML = originalText;
                btnSave.disabled = false;
            }
        }

        async function deleteProduct(id) {
            const res = await Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#3b82f6',
                confirmButtonText: 'Yes, delete it!',
                background: '#1e293b', color: '#fff'
            });

            if (res.isConfirmed) {
                try {
                    const { error } = await supabaseClient.from('merchandise_products').delete().eq('id', id);
                    if (error) throw error;
                    Swal.fire({icon: 'success', title: 'Deleted!', toast: true, position:'top-end', showConfirmButton:false, timer:2000, background:'#1e293b', color: '#fff' });
                    
                    // Clear the edge function cache so changes reflect instantly
                    await clearMerchandiseCache();
                    
                    loadData();
                } catch (err) {
                    Swal.fire({icon: 'error', title: 'Error', text: err.message, background: '#1e293b', color: '#fff'});
                }
            }
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
         }

        function calculateDiscount() {
            const price = parseFloat(document.getElementById('prodPrice').value);
            const compareAt = parseFloat(document.getElementById('prodComparePrice').value);
            
            if (!isNaN(price) && !isNaN(compareAt) && compareAt > 0) {
                const discount = ((compareAt - price) / compareAt) * 100;
                document.getElementById('prodDiscountPercent').value = discount > 0 ? Math.round(discount) : 0;
            } else {
                document.getElementById('prodDiscountPercent').value = '';
            }
        }

        function calculatePriceFromDiscount() {
            const compareAt = parseFloat(document.getElementById('prodComparePrice').value);
            const discount = parseFloat(document.getElementById('prodDiscountPercent').value);
            
            if (!isNaN(compareAt) && !isNaN(discount) && compareAt > 0) {
                const price = compareAt - (compareAt * (discount / 100));
                document.getElementById('prodPrice').value = price > 0 ? Math.round(price) : 0;
            } else if (!isNaN(discount)) {
                // If they enter discount without compare price, clear price
                document.getElementById('prodPrice').value = '';
            }
        }

        init();
    </script>
    <script src="../js/admin-identity.js"></script>
</body>
