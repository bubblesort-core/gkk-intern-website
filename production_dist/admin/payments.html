<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | GKK Interns - Code. Build. Deploy.</title>

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        /* Summary Stats */
        .payment-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .payment-stat-card {
            background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .payment-stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            transition: transform 0.5s ease;
            transform: translateX(-100%);
        }

        .payment-stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.4);
        }

        .payment-stat-card:hover::before {
            transform: translateX(100%);
        }

        .stat-icon-wrap {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .stat-icon-wrap.total {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.15);
        }

        .stat-icon-wrap.completed {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.15);
        }

        .stat-icon-wrap.pending {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.15);
        }

        .stat-icon-wrap.failed {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.15);
        }

        .stat-info .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--c-text-primary);
            line-height: 1.2;
        }

        .stat-info .stat-label {
            font-size: 0.8rem;
            color: var(--c-text-muted);
            margin-top: 2px;
        }

        .stat-info .stat-amount {
            font-size: 0.8rem;
            font-family: monospace;
            color: var(--c-text-secondary);
            margin-top: 2px;
        }

        /* Filters Container */
        .filters-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--c-border);
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-text-muted);
            font-size: 0.9rem;
        }

        .search-wrapper input {
            padding-left: 36px;
            background: transparent;
            border: none;
            width: 200px;
            transition: width 0.3s;
        }

        .search-wrapper input:focus {
            width: 240px;
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-select {
            background: transparent;
            border: none;
            border-left: 1px solid var(--c-border);
            border-radius: 0;
            padding-left: 12px;
            color: var(--c-text-secondary);
            font-size: 0.9rem;
        }

        .filter-select:focus {
            box-shadow: none;
            color: var(--c-text-primary);
        }

        .filter-select option {
            background: #1e293b;
            color: #e2e8f0;
        }

        /* Phase Badge */
        .phase-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
            border: 1px solid rgba(96, 165, 250, 0.15);
            white-space: nowrap;
        }

        .phase-badge.unknown {
            background: rgba(148, 163, 184, 0.1);
            color: #94a3b8;
            border-color: rgba(148, 163, 184, 0.15);
        }

        /* Amount Styling */
        .amount-positive {
            color: #34d399;
            font-weight: 600;
        }

        .amount-negative {
            color: #f87171;
            font-weight: 600;
        }

        /* Payment Method Badge */
        .method-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.04);
            color: var(--c-text-muted);
            border: 1px solid var(--c-border);
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .payment-stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }

            .payment-stat-card {
                padding: 14px 16px;
                gap: 12px;
            }

            .stat-icon-wrap {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .stat-info .stat-number {
                font-size: 1.2rem;
            }

            .filters-container {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-select {
                border-left: none;
                border-top: 1px solid var(--c-border);
                padding-left: 0;
                padding-top: 8px;
            }
        }
    </style>
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Payments & Transactions</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="refreshCurrentPage()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-primary" onclick="exportTransactions()">
                        <i class="fas fa-download"></i> Export CSV
                    </button>
                </div>
            </header>

            <div class="page-body">
                <!-- Summary Stats -->
                <div class="payment-stats">
                    <div class="payment-stat-card">
                        <div class="stat-icon-wrap total"><i class="fas fa-receipt"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" id="statTotal">-</div>
                            <div class="stat-label">Total Payments</div>
                            <div class="stat-amount" id="statTotalAmount">-</div>
                        </div>
                    </div>
                    <div class="payment-stat-card">
                        <div class="stat-icon-wrap completed"><i class="fas fa-check-circle"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" id="statCompleted" style="color: #34d399;">-</div>
                            <div class="stat-label">Completed</div>
                            <div class="stat-amount" id="statCompletedAmount">-</div>
                        </div>
                    </div>
                    <div class="payment-stat-card">
                        <div class="stat-icon-wrap pending"><i class="fas fa-clock"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" id="statPending" style="color: #fbbf24;">-</div>
                            <div class="stat-label">Pending</div>
                            <div class="stat-amount" id="statPendingAmount">-</div>
                        </div>
                    </div>
                    <div class="payment-stat-card">
                        <div class="stat-icon-wrap failed"><i class="fas fa-times-circle"></i></div>
                        <div class="stat-info">
                            <div class="stat-number" id="statFailed" style="color: #f87171;">-</div>
                            <div class="stat-label">Failed</div>
                            <div class="stat-amount" id="statFailedAmount">-</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header"
                        style="display:flex; justify-content:space-between; align-items:center; padding: 20px 24px; flex-wrap: wrap; gap: 12px;">
                        <h3 class="card-title" style="font-size:1.1rem;">Transaction History</h3>

                        <div class="filters-container">
                            <div class="search-wrapper">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" class="form-input"
                                    placeholder="Search by name, email, ID...">
                            </div>
                            <select id="statusFilter" class="form-select filter-select">
                                <option value="all">All Status</option>
                                <option value="completed">Completed</option>
                                <option value="captured">Captured</option>
                                <option value="pending">Pending</option>
                                <option value="failed">Failed</option>
                            </select>
                            <select id="phaseFilter" class="form-select filter-select">
                                <option value="all">All Phases</option>
                            </select>
                            <div class="search-wrapper"
                                style="border-left: 1px solid var(--c-border); padding-left: 12px; display: flex; align-items: center; gap: 8px;">
                                <i class="fas fa-calculator" style="position: static; font-size: 0.8rem; color: var(--c-text-muted);"></i>
                                <input type="number" id="feeCutPercent" class="form-input" value="2" step="0.1" min="0" max="100"
                                    style="width: 50px; padding: 4px 6px; height: 28px; font-size: 0.85rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--c-border); border-radius: 4px; color: var(--c-text-primary);"
                                    placeholder="%">
                                <span style="font-size: 0.75rem; color: var(--c-text-muted); font-weight: 500;">% Cut</span>
                            </div>
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>User</th>
                                    <th>Phase</th>
                                    <th>Amount</th>
                                    <th>Method</th>
                                    <th>Status</th>
                                    <th>Transaction ID</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTableBody">
                                <!-- Skeleton -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        // Sidebar Mobile Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                sidebarOverlay.style.display = 'block';
            } else {
                sidebarOverlay.style.display = 'none';
            }
        }

        // Close sidebar when clicking overlay
        document.getElementById('sidebarOverlay')?.addEventListener('click', () => {
            toggleSidebar();
        });

        let allPayments = [];
        let phases = new Set();

        async function init() {
            if (!await ensureAdminAuth()) return;

            // Skeleton
            const tbody = document.getElementById('paymentsTableBody');
            if (tbody && typeof SkeletonUI !== 'undefined') tbody.innerHTML = SkeletonUI.generateTableRows(5, 7);

            await loadPayments();

            document.getElementById('searchInput')?.addEventListener('input', filter);
            document.getElementById('statusFilter')?.addEventListener('change', filter);
            document.getElementById('phaseFilter')?.addEventListener('change', filter);
            document.getElementById('feeCutPercent')?.addEventListener('input', () => { filter(); });
        }

        async function loadPayments() {
            try {
                // 1. Fetch Payments
                let { data: payments, error } = await supabaseClient
                    .from('payments')
                    .select('*, profiles(email, full_name)')
                    .order('created_at', { ascending: false });

                if (error) {
                    const res = await supabaseClient
                        .from('transactions')
                        .select('*, profiles(email, full_name)')
                        .order('created_at', { ascending: false });
                    payments = res.data;
                    if (res.error) throw res.error;
                }

                // 2. Fetch Profiles Securely via RPC
                const { data: profiles, error: profError } = await supabaseClient.rpc('get_all_profile_emails');
                if (profError) console.error("RPC Error:", profError);

                // 3. Fetch Applications to get batch_number (Phase) per user
                const { data: applications, error: appError } = await supabaseClient
                    .from('applications')
                    .select('id, email, batch_number, full_name')
                    .order('created_at', { ascending: false });

                if (appError) console.error("Applications fetch error:", appError);

                // Build lookup maps
                const appByUserId = {};
                const appByEmail = {};
                const appById = {};
                (applications || []).forEach(app => {
                    // removed user_id lookup
                    if (app.email) appByEmail[app.email.toLowerCase()] = app;
                    if (app.id) appById[app.id] = app;
                });

                // 4. Merge Data — enrich payments with profile + phase
                allPayments = (payments || []).map(p => {
                    let profileData = p.profiles;

                    if (!profileData && profiles) {
                        let found = profiles.find(x => x.id === p.user_id);
                        if (!found && p.customer_email) {
                            found = profiles.find(x => x.email && x.email.toLowerCase() === p.customer_email.toLowerCase());
                        }
                        if (found) {
                            profileData = { email: found.email, full_name: found.full_name };
                        }
                    }

                    // Find phase from applications
                    let phase = null;
                    if (p.application_id && appById[p.application_id]) {
                        phase = appById[p.application_id].batch_number;
                    }
                    if (!phase && p.user_id && appByUserId[p.user_id]) {
                        phase = appByUserId[p.user_id].batch_number;
                    }
                    if (!phase) {
                        const email = (p.customer_email || profileData?.email || '').toLowerCase();
                        if (email && appByEmail[email]) {
                            phase = appByEmail[email].batch_number;
                        }
                    }

                    if (phase) phases.add(phase);

                    return { ...p, profiles: profileData, phase: phase };
                });

                // Build phase filter options
                const phaseSelect = document.getElementById('phaseFilter');
                // Clear existing options except "All"
                phaseSelect.innerHTML = '<option value="all">All Phases</option>';
                const sortedPhases = [...phases].sort();
                sortedPhases.forEach(ph => {
                    const opt = document.createElement('option');
                    opt.value = ph;
                    opt.textContent = ph;
                    phaseSelect.appendChild(opt);
                });

                updateStats(allPayments);
                render(allPayments);
            } catch (e) {
                console.error(e);
                if (document.getElementById('paymentsTableBody')) document.getElementById('paymentsTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px; color: var(--c-text-muted);"><i class="fas fa-exclamation-triangle" style="font-size: 1.5rem; display: block; margin-bottom: 8px;"></i>No records found.</td></tr>';
            }
        }

        function updateStats(list) {
            const cut = parseFloat(document.getElementById('feeCutPercent')?.value || 0);

            const completed = list.filter(p => {
                const s = (p.status || '').toLowerCase();
                return s === 'completed' || s === 'captured' || s === 'success';
            });
            const pending = list.filter(p => (p.status || '').toLowerCase() === 'pending');
            const failed = list.filter(p => (p.status || '').toLowerCase() === 'failed');

            const sumAmount = arr => arr.reduce((sum, p) => sum + (p.amount || 0), 0);

            const fmt = v => v.toLocaleString('en-IN', { minimumFractionDigits: 2 });

            const totalGross = sumAmount(list);
            const totalFee = totalGross * (cut / 100);
            const totalNet = totalGross - totalFee;

            const completedGross = sumAmount(completed);
            const completedFee = completedGross * (cut / 100);
            const completedNet = completedGross - completedFee;

            const pendingGross = sumAmount(pending);
            const pendingFee = pendingGross * (cut / 100);
            const pendingNet = pendingGross - pendingFee;

            const failedGross = sumAmount(failed);

            if (document.getElementById('statTotal')) document.getElementById('statTotal').textContent = list.length;
            if (document.getElementById('statTotalAmount')) {
                document.getElementById('statTotalAmount').innerHTML = `<span style="font-size:0.85rem;">₹${fmt(totalGross)}</span>
                    <span style="font-size:0.7rem; color: #f87171; display:block; opacity: 0.85;">− Fee (${cut}%): ₹${fmt(totalFee)}</span>
                    <span style="font-size:0.7rem; color: #60a5fa; display:block; opacity: 0.9; font-weight:600;">= Net: ₹${fmt(totalNet)}</span>`;
            }

            if (document.getElementById('statCompleted')) document.getElementById('statCompleted').textContent = completed.length;
            if (document.getElementById('statCompletedAmount')) {
                document.getElementById('statCompletedAmount').innerHTML = `<span style="font-size:0.85rem;">₹${fmt(completedGross)}</span>
                    <span style="font-size:0.7rem; color: #f87171; display:block; opacity: 0.85;">− Fee (${cut}%): ₹${fmt(completedFee)}</span>
                    <span style="font-size:0.7rem; color: #34d399; display:block; opacity: 0.9; font-weight:600;">= Net: ₹${fmt(completedNet)}</span>`;
            }

            if (document.getElementById('statPending')) document.getElementById('statPending').textContent = pending.length;
            if (document.getElementById('statPendingAmount')) {
                document.getElementById('statPendingAmount').innerHTML = `<span style="font-size:0.85rem;">₹${fmt(pendingGross)}</span>
                    <span style="font-size:0.7rem; color: #f87171; display:block; opacity: 0.85;">− Fee (${cut}%): ₹${fmt(pendingFee)}</span>
                    <span style="font-size:0.7rem; color: #fbbf24; display:block; opacity: 0.9; font-weight:600;">= Net: ₹${fmt(pendingNet)}</span>`;
            }

            if (document.getElementById('statFailed')) document.getElementById('statFailed').textContent = failed.length;
            if (document.getElementById('statFailedAmount')) {
                document.getElementById('statFailedAmount').textContent = `₹${fmt(failedGross)}`;
            }
        }

        function render(list) {
            const tbody = document.getElementById('paymentsTableBody');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 40px; color: var(--c-text-muted);">No records found.</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(p => {
                const dateStr = new Date(p.created_at).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });
                const timeStr = new Date(p.created_at).toLocaleTimeString('en-IN', {
                    hour: '2-digit', minute: '2-digit'
                });

                const phaseBadge = p.phase
                    ? `<span class="phase-badge"><i class="fas fa-layer-group" style="font-size:0.65rem;"></i> ${p.phase}</span>`
                    : `<span class="phase-badge unknown">—</span>`;

                const method = p.payment_method || '';
                const methodIcon = method === 'upi' ? 'fa-mobile-alt' : method === 'card' ? 'fa-credit-card' : method === 'netbanking' ? 'fa-university' : method === 'wallet' ? 'fa-wallet' : 'fa-money-bill';
                const methodBadge = method
                    ? `<span class="method-badge"><i class="fas ${methodIcon}" style="font-size:0.6rem;"></i> ${method}</span>`
                    : `<span style="color:var(--c-text-muted); font-size:0.8rem;">—</span>`;

                return `
                <tr>
                    <td>
                        <div style="font-size:0.9rem; color:var(--c-text-primary);">${dateStr}</div>
                        <div style="font-size:0.75rem; color:var(--c-text-muted);">${timeStr}</div>
                    </td>
                    <td>
                        <div style="font-weight:500;">${p.customer_name || p.profiles?.full_name || 'Unknown'}</div>
                        <div style="font-size:0.8rem; color:var(--c-text-muted);">${p.customer_email || p.profiles?.email || 'No Email'}</div>
                    </td>
                    <td>${phaseBadge}</td>
                    <td style="font-family:monospace; font-weight:600; color: #34d399;">₹${(p.amount || 0).toFixed(2)}</td>
                    <td>${methodBadge}</td>
                    <td><span class="badge badge-${getStatusColor(p.status)}">${capitalizeStatus(p.status)}</span></td>
                    <td style="font-family:monospace; font-size:0.8rem; color:var(--c-text-secondary);" title="${p.razorpay_payment_id || p.id}">${truncateId(p.razorpay_payment_id || p.id)}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="spaNavigate('applications.html?search=' + encodeURIComponent('${p.customer_email || p.profiles?.email || ''}'))" title="View in Applications" style="background:var(--c-bg-card); border:1px solid var(--c-border); padding:4px 8px;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </td>
                    </tr>
            `;
            }).join('');
        }

        function getStatusColor(s) {
            if (!s) return 'neutral';
            s = s.toLowerCase();
            if (s === 'completed' || s === 'success' || s === 'captured') return 'success';
            if (s === 'failed') return 'error';
            return 'warning';
        }

        function capitalizeStatus(s) {
            if (!s) return 'Pending';
            return s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
        }

        function truncateId(id) {
            if (!id) return '—';
            if (id.length > 20) return id.substring(0, 18) + '…';
            return id;
        }

        function filter() {
            const term = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const status = (document.getElementById('statusFilter')?.value || '');
            const phase = (document.getElementById('phaseFilter')?.value || '');

            const filtered = allPayments.filter(p => {
                const s = (p.status || '').toLowerCase();
                const matchStatus = status === 'all' || s === status;
                const matchPhase = phase === 'all' || (p.phase || '') === phase;

                const matchTerm = !term ||
                    (p.customer_name || '').toLowerCase().includes(term) ||
                    (p.profiles?.full_name || '').toLowerCase().includes(term) ||
                    (p.customer_email || '').toLowerCase().includes(term) ||
                    (p.profiles?.email || '').toLowerCase().includes(term) ||
                    (p.razorpay_payment_id || '').toLowerCase().includes(term) ||
                    (p.id || '').toLowerCase().includes(term) ||
                    (p.phase || '').toLowerCase().includes(term);

                return matchStatus && matchPhase && matchTerm;
            });

            updateStats(filtered);
            render(filtered);
        }

        function exportTransactions() {
            if (!allPayments || allPayments.length === 0) {
                alert('No transactions to export.');
                return;
            }

            const headers = ['Date', 'Transaction ID', 'User', 'Email', 'Phase', 'Amount (₹)', 'Method', 'Status'];
            const csvRows = [headers.join(',')];

            allPayments.forEach(p => {
                const row = [
                    new Date(p.created_at).toISOString().split('T')[0],
                    p.razorpay_payment_id || p.id,
                    `"${(p.customer_name || p.profiles?.full_name || 'Unknown').replace(/"/g, '""')}"`,
                    `"${(p.customer_email || p.profiles?.email || 'No Email').replace(/"/g, '""')}"`,
                    `"${(p.phase || 'N/A').replace(/"/g, '""')}"`,
                    (p.amount || 0).toFixed(2),
                    p.payment_method || 'N/A',
                    p.status || 'Pending'
                ];
                csvRows.push(row.join(','));
            });

            const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `gkk_payments_export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>

    <script src="../js/admin-identity.js"></script> <!-- Identity Check -->
</body>

</html>
