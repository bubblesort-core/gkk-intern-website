    <!-- Flatpickr (Custom Date/Time Picker) -->

    <style>
        /* Page Specific Styles */

        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-width: 220px;
        }

        .skill-tag {
            font-size: 0.7rem;
            background: rgba(148, 163, 184, 0.1);
            color: var(--c-text-secondary);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        /* Modal footer with multiple buttons */
        #applicationActions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: flex-end;
        }

        /* Modal tweaks */
        .modal-body {
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
            /* avoid scrollbar overlap */
        }

        /* Custom Scrollbar for modal */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }

        .modal-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .modal-body::-webkit-scrollbar-thumb {
            background: var(--c-border);
            border-radius: 4px;
        }

        .modal-body::-webkit-scrollbar-thumb:hover {
            background: var(--c-text-muted);
        }

        tr.application-row {
            cursor: pointer;
            transition: background 0.15s ease;
        }

        tr.application-row:hover {
            background-color: rgba(59, 130, 246, 0.05) !important;
        }

        tr.application-row:hover td {
            background: transparent;
            /* Override default hover if needed */
        }

        /* Inline Edit Styles */
        .editable-field-container {
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            position: relative;
        }

        .edit-btn {
            opacity: 1;
            background: rgba(59, 130, 246, 0.1);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* Edit btn behavior is now always visible */

        .edit-btn:hover {
            background: #3b82f6;
            color: white;
        }

        .inline-edit-input {
            background: #0f172a;
            border: 1px solid #3b82f6;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .inline-edit-actions {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .save-btn {
            background: #10b981;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* Filter Enhancements */
        .filters-bar {
            padding: 20px;
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            position: relative;
            overflow: visible;
        }

        .filter-capsule {
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 4px;
            display: flex;
            align-items: center;
            gap: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filter-capsule:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: rgba(15, 23, 42, 0.5);
        }

        .filter-select, .filter-date {
            background: transparent;
            border: none;
            color: #e2e8f0;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 12px;
            cursor: pointer;
            outline: none;
            transition: background 0.2s;
            border-radius: 8px;
        }

        .filter-select:hover, .filter-date:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-date {
            width: 120px;
            text-align: center;
        }

        .filter-search-box {
            position: relative;
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 2px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .filter-search-box:focus-within {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.5);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .filter-search-input {
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
        }

        .filter-search-box i {
            color: #64748b;
            font-size: 0.85rem;
        }

        .clear-filters-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-filters-btn:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Custom Flatpickr tweaks */
        .flatpickr-calendar {
            background: #1e293b !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .flatpickr-day.selected { background: #3b82f6 !important; border-color: #3b82f6 !important; }
        .flatpickr-day:hover { background: rgba(59, 130, 246, 0.1) !important; }
        .flatpickr-current-month, .flatpickr-weekday { color: #e2e8f0 !important; }
    </style>
</head>

<body>

        <!-- Main Content -->

            <div class="page-body">

                    <!-- Refine Group -->

                        <div class="filter-capsule">
                            <select id="dateFilterMode" class="filter-select">
                                <option value="created_at">📅 Applied</option>
                                <option value="preferred_interview_date">🎥 Interview</option>

                            <input type="text" id="startDate" class="filter-date" title="Start Date" placeholder="Start Date">

                            <select id="colorFilter" class="filter-select" onchange="renderApplications()">
                                <option value="">🎨 Markers</option>
                                <option value="none">No Marker</option>
                                <option value="green">🟢 Interviewed</option>
                                <option value="yellow">🟡 Reschedule</option>
                                <option value="red">🔴 No Answer</option>

                            <span style="width:1px; height:18px; background:rgba(255,255,255,0.1); margin:0 4px;"></span>

                            <select id="batchFilter" class="filter-select" onchange="renderApplications()">

                <!-- Table -->

                                <!-- Skeleton injected via JS -->
                            </tbody>
                        </table>
                    </div>
                    <div
                        style="padding: 16px; border-top: 1px solid var(--c-border); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.85rem; color: var(--c-text-muted);" id="pageInfo">Showing 0

                            <button class="btn btn-secondary btn-sm" id="prevPageBtn" onclick="changePage(-1)"
                                disabled>Prev</button>

    <!-- View Application Modal -->
    <div class="modal-overlay" id="viewApplicationModal">
        <div class="modal-container" style="max-width: 900px; width: 95%;">
            <div class="modal-header">
                <h3 class="modal-title">Application Details</h3>
                <button class="modal-close" onclick="closeModal('viewApplicationModal')"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="applicationDetails">
                <!-- Dynamic Content -->
            </div>
            <div class="modal-footer" id="applicationActions">
                <!-- Dynamic Actions -->
            </div>
        </div>
    </div>

    <!-- Approval Modal (Removed - replaced by SweetAlert) -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/admin-router.js"></script>
    <script src="../js/admin-identity.js"></script> <!-- Identity Check -->
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        let allApplications = [];
        let allProfiles = new Set(); // Store registered emails
        let currentFilter = 'all';
        let currentPage = 1;
        const PAGE_SIZE = 10;
        let currentApplication = null;
        let pendingApprovalId = null;
        let availableTimeSlots = [];
        const DEFAULT_DIRECT_MAIL_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9RK4LFMYblIWeQGdQDJpvepjC4FJ22UqkwmQusFxxJF3qSMQDB8JEV1rSJP6GALc/exec';

        // --- Inline Editing Functions ---

        // --- Date/Time Formatting Helpers ---
        function toFriendlyDate(isoDate) {
            if (!isoDate) return '-';
            try {
                const parts = isoDate.split('-');
                if (parts.length !== 3) return isoDate;
                const d = new Date(parts[0], parts[1] - 1, parts[2]);
                if (isNaN(d.getTime())) return isoDate;
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch (e) { return isoDate; }
        }

        function toISODate(friendlyDate) {
            if (!friendlyDate || friendlyDate === '-' || friendlyDate === 'N/A') return '';
            try {
                const d = new Date(friendlyDate);
                if (isNaN(d.getTime())) return '';
                return d.toISOString().split('T')[0];
            } catch (e) { return ''; }
        }

        function toFriendlyTime(isoTime) {
            if (!isoTime) return '-';
            try {
                let [hours, minutes] = isoTime.split(':');
                hours = parseInt(hours, 10);
                const modifier = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                return `${hours.toString().padStart(2, '0')}:${minutes} ${modifier}`;
            } catch (e) { return isoTime; }
        }

        function toISOTime(friendlyTime) {
            if (!friendlyTime || friendlyTime === '-' || friendlyTime === 'N/A') return '';
            try {
                const parts = friendlyTime.split(' ');
                if (parts.length < 2) return friendlyTime; // might be military if already stored wrong
                const modifier = parts[parts.length - 1].toUpperCase();
                let timeParts = parts[0].split(':');
                let hours = parseInt(timeParts[0], 10);
                let minutes = timeParts[1];
                if (modifier === 'PM' && hours < 12) hours += 12;
                if (modifier === 'AM' && hours === 12) hours = 0;
                return `${hours.toString().padStart(2, '0')}:${minutes}`;
            } catch (e) { return ''; }
        }

        function clearAllFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            document.getElementById('batchFilter').value = '';
            document.getElementById('colorFilter').value = '';
            document.getElementById('timeSlotFilter').value = '';
            renderApplications();
            
            Swal.fire({
                toast: true, position: 'top-end', icon: 'success', title: 'Filters Reset',
                showConfirmButton: false, timer: 2000, background: '#1a1f2e', color: '#e2e8f0'
            });
        }

        // --- Date/Time Formatting Helpers ---
        function toFriendlyDate(isoDate) {
            if (!isoDate) return '-';
            try {
                const parts = isoDate.split('-');
                if (parts.length !== 3) return isoDate;
                const d = new Date(parts[0], parts[1] - 1, parts[2]);
                if (isNaN(d.getTime())) return isoDate;
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            } catch (e) { return isoDate; }
        }

        function toISODate(friendlyDate) {
            if (!friendlyDate || friendlyDate === '-' || friendlyDate === 'N/A') return '';
            try {
                const d = new Date(friendlyDate);
                if (isNaN(d.getTime())) return '';
                return d.toISOString().split('T')[0];
            } catch (e) { return ''; }
        }

        function toFriendlyTime(isoTime) {
            if (!isoTime) return '-';
            try {
                let [hours, minutes] = isoTime.split(':');
                hours = parseInt(hours, 10);
                const modifier = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;
                return `${hours.toString().padStart(2, '0')}:${minutes} ${modifier}`;
            } catch (e) { return isoTime; }
        }

        function toISOTime(friendlyTime) {
            if (!friendlyTime || friendlyTime === '-' || friendlyTime === 'N/A') return '';
            try {
                const parts = friendlyTime.split(' ');
                if (parts.length < 2) return friendlyTime;
                const modifier = parts[parts.length - 1].toUpperCase();
                let timeParts = parts[0].split(':');
                let hours = parseInt(timeParts[0], 10);
                let minutes = timeParts[1];
                if (modifier === 'PM' && hours < 12) hours += 12;
                if (modifier === 'AM' && hours === 12) hours = 0;
                return `${hours.toString().padStart(2, '0')}:${minutes}`;
            } catch (e) { return ''; }
        }

        function editField(field, type = 'text') {
            const container = document.getElementById(`field-container-${field}`);
            const display = document.getElementById(`display-${field}`);
            const currentVal = (display.dataset.value || display.textContent.trim()).replace('Phase: ', '');
            
            let inputHtml = '';
            if (type === 'textarea') {
                inputHtml = `<textarea id="input-${field}" class="inline-edit-input" style="min-height:100px;">${currentVal}</textarea>`;
            } else if (type === 'date' || type === 'time') {
                const initialVal = type === 'date' ? toISODate(currentVal) : toISOTime(currentVal);
                inputHtml = `<input type="text" id="input-${field}" class="inline-edit-input" value="${initialVal}" placeholder="Select ${type}" style="cursor:pointer; background:rgba(255,255,255,0.02)">`;
            } else {
                inputHtml = `<input type="${type}" id="input-${field}" class="inline-edit-input" value="${currentVal === '-' ? '' : currentVal}">`;
            }

            container.innerHTML = `
                <div style="display:flex; width:100%; align-items:center;">
                    ${inputHtml}
                    <div class="inline-edit-actions">
                        <button class="save-btn" onclick="saveField('${field}', '${type}')" title="Save"><i class="fas fa-check"></i></button>
                        <button class="cancel-btn" onclick="cancelEdit('${field}')" title="Cancel"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            `;

            if (type === 'date') {
                flatpickr(`#input-${field}`, { dateFormat: "Y-m-d", theme: "dark" });
            } else if (type === 'time') {
                flatpickr(`#input-${field}`, { enableTime: true, noCalendar: true, dateFormat: "H:i", time_24hr: true, theme: "dark" });
            }

            setTimeout(() => {
                const input = document.getElementById(`input-${field}`);
                if (input) input.focus();
            }, 10);
        }

        function cancelEdit(field) {
            // Re-render the specific section or just re-open the modal?
            // Re-viewing is easiest to ensure consistency
            if (currentApplication) {
                viewApplication(currentApplication.id);
            }
        }

        async function saveField(field, type) {
            if (!currentApplication) return;
            
            const input = document.getElementById(`input-${field}`);
            let newVal = input.value.trim();

            let updateValue = newVal;
            if (field === 'skills') {
                updateValue = newVal.split(',').map(s => s.trim()).filter(Boolean);
            } else if (type === 'date' && newVal) {
                updateValue = toFriendlyDate(newVal);
            } else if (type === 'time' && newVal) {
                updateValue = toFriendlyTime(newVal);
            } else if (field === 'sex' || field === 'discovery_source') {
                updateValue = newVal.charAt(0).toUpperCase() + newVal.slice(1).toLowerCase();
            }

            // Confirmation
            const result = await Swal.fire({
                title: 'Confirm Change',
                html: `Update <b>${field.replace(/_/g, ' ')}</b> to: <br><br><div style="background:rgba(59,130,246,0.1); padding:10px; border-radius:8px; border:1px solid rgba(59,130,246,0.2); font-weight:600;">${updateValue}</div>`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Yes, Save',
                cancelButtonText: 'Cancel',
                background: '#1a1f2e',
                color: '#e2e8f0',
                confirmButtonColor: '#10b981'
            });

            if (!result.isConfirmed) return;

            try {
                // Update database
                const { error } = await supabaseClient
                    .from('applications')
                    .update({ [field]: updateValue })
                    .eq('id', currentApplication.id);

                if (error) throw error;

                // Sync local state
                currentApplication[field] = updateValue;
                const idx = allApplications.findIndex(a => a.id === currentApplication.id);
                if (idx !== -1) allApplications[idx][field] = updateValue;

                Swal.fire({
                    icon: 'success',
                    title: 'Field Updated',
                    timer: 1500,
                    showConfirmButton: false,
                    background: '#1a1f2e',
                    color: '#e2e8f0'
                });

                // Re-render
                viewApplication(currentApplication.id);
                renderApplications(); // Update table too
            } catch (err) {
                console.error('Error updating field:', err);
                Swal.fire('Error', 'Failed to update field', 'error');
            }
        }

        async function sendMeetingLink(id) {
            const app = allApplications.find(a => a.id === id);
            if (!app) return;

            // Load history from localStorage
            let linkHistory = JSON.parse(localStorage.getItem('gkk_meeting_links') || '[]');
            
            // Create datalist HTML for suggestions

        async function loadApplications() {
            try {
                // Fetch Applications
                const { data: apps, error: appError } = await supabaseClient
                    .from('applications')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (appError) throw appError;

                // Fetch Profiles (Using RPC to bypass RLS)
                const { data: profs, error: profError } = await supabaseClient
                    .rpc('get_all_profile_emails');

                if (profError) {
                    console.error('Error fetching profiles:', profError);
                }

                if (!profError && profs) {
                    // RPC returns array of objects like [{email: '...'}, ...]
                    allProfiles = new Set(profs.map(p => p.email ? p.email.toLowerCase() : ''));
                }

                // Fetch Settings for Time Slots
                const { data: settings } = await supabaseClient
                    .from('form_settings')
                    .select('time_slots')
                    .limit(1)
                    .single();

                if (settings && settings.time_slots) {
                    availableTimeSlots = settings.time_slots.sort();
                    populateTimeSlots();
                }

                allApplications = apps || [];

                // Fetch lock status for all applications
                if (allApplications.length > 0) {
                    const emails = allApplications.map(a => a.email).filter(Boolean);
                    if (emails.length > 0) {
                        const { data: locks } = await supabaseClient
                            .from('access_controls')
                            .select('target_email, is_locked')
                            .eq('page_identifier', '/payment')
                            .eq('is_locked', true)
                            .in('target_email', emails);
                        
                        if (locks) {
                            const lockedEmails = new Set(locks.map(l => l.target_email));
                            allApplications = allApplications.map(a => ({
                                ...a,
                                is_payment_locked: lockedEmails.has(a.email)
                            }));
                        }
                    }
                }

                // Populate Phase Filter options uniquely
                populateBatchFilter();

                renderApplications();
            } catch (error) { console.error(error); }
        }

        function populateBatchFilter() {
            const select = document.getElementById('batchFilter');
            const batches = new Set(allApplications.map(a => a.batch_number).filter(b => !!b));

            // Re-render options preserving the default "All Phases"
            const currentFilter = select.value;
            select.innerHTML = '<option value="">📦 All Phases</option>';

            [...batches].sort().forEach(batch => {
                select.innerHTML += `<option value="${batch}">${batch}</option>`;
            });
            select.value = currentFilter;
        }

        function populateTimeSlots() {
            const select = document.getElementById('timeSlotFilter');
            if (!select) return;
            select.innerHTML = '<option value="">🕒 Any Time</option>';
            availableTimeSlots.forEach(time => {
                // Convert 24h to 12h
                const [h, m] = time.split(':');
                const hour = parseInt(h);
                const suffix = hour >= 12 ? 'PM' : 'AM';
                const hour12 = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
                const label = `${hour12}:${m} ${suffix}`;

                select.innerHTML += `<option value="${time}">${label}</option>`;
            });
        }

        function parseTime(t) {
            if (!t) return null;
            t = t.trim().toLowerCase();
            const isPM = t.includes('pm');
            const isAM = t.includes('am');
            let clean = t.replace(/[a-z\s]/g, '');
            const parts = clean.split(':');
            if (parts.length < 2) return null;
            let h = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10);

            if (isPM && h < 12) h += 12;
            if (isAM && h === 12) h = 0;
            return h * 60 + m;
        }

        function formatTime12h(t) {
            if (!t) return '';
            const mins = parseTime(t);
            if (mins === null) return t;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${m.toString().padStart(2, '0')} ${ampm}`;
        }

        let currentFilteredApps = [];

        function renderApplications() {
            const tbody = document.getElementById('applicationsTable');
            const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const startDate = (document.getElementById('startDate')?.value || '');
            const endDate = (document.getElementById('endDate')?.value || '');
            const dateMode = (document.getElementById('dateFilterMode')?.value || '');
            const timeSlot = (document.getElementById('timeSlotFilter')?.value || '');

            // Update Header for Date Column
            const dateHeader = document.querySelector('th:nth-child(6)');
            if (dateHeader) {
                dateHeader.textContent = dateMode === 'preferred_interview_date' ? 'Interview' : 'Applied On';
            }

            let filtered = allApplications;

            // Phase Filter
            const batchVal = (document.getElementById('batchFilter')?.value || '');
            if (batchVal) {
                filtered = filtered.filter(a => a.batch_number === batchVal);
            }
            
            // Color Filter
            const colorVal = (document.getElementById('colorFilter')?.value || '');
            if (colorVal) {
                if (colorVal === 'none') {
                    filtered = filtered.filter(a => !a.marker_color);
                } else {
                    filtered = filtered.filter(a => a.marker_color === colorVal);
                }
            }

            // Status Filter
            if (currentFilter !== 'all') filtered = filtered.filter(a => a.status === currentFilter);

            // Search Filter
            if (search) filtered = filtered.filter(a => a.full_name.toLowerCase().includes(search) || a.email.toLowerCase().includes(search));

            // Date Range Filter
            if (startDate) {
                const start = new Date(startDate);
                start.setHours(0, 0, 0, 0);
                filtered = filtered.filter(a => {
                    const targetDate = a[dateMode];
                    if (!targetDate) return false;
                    return new Date(targetDate) >= start;
                });
            }
            if (endDate) {
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                filtered = filtered.filter(a => {
                    const targetDate = a[dateMode];
                    if (!targetDate) return false;
                    return new Date(targetDate) <= end;
                });
            }

            // Universal Time Check
            if (timeSlot) {
                const filterMins = parseTime(timeSlot);
                filtered = filtered.filter(a => {
                    const rowMins = parseTime(a.preferred_interview_time);
                    console.log(`App Filter: ${timeSlot} (${filterMins}), Row: ${a.preferred_interview_time} (${rowMins})`);
                    return filterMins !== null && rowMins === filterMins;
                });
            }

            // Capture filtered list for export
            currentFilteredApps = filtered;

            const totalFiltered = filtered.length;
            const totalPages = Math.max(1, Math.ceil(totalFiltered / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const startIdx = (currentPage - 1) * PAGE_SIZE;
            const endIdx = Math.min(startIdx + PAGE_SIZE, totalFiltered);
            const pageItems = filtered.slice(startIdx, endIdx);

            // Update count display
            const pageInfo = document.getElementById('pageInfo');
            if (pageInfo) {
                pageInfo.textContent = `Showing ${startIdx + 1}–${endIdx} of ${totalFiltered} entries${totalFiltered !== allApplications.length ? ` (${allApplications.length} total)` : ''}`;
            }

            // Update pagination buttons
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
            if (document.getElementById('pageNumbers')) document.getElementById('pageNumbers').textContent = `Page ${currentPage} of ${totalPages}`;

            // Update filter tab counts (based on overall list, not current date filter for now, or should it?)
            // Let's keep counts reflective of current filters to be useful
            // Actually, usually tab counts show TOTAL for that status. Let's keep standard behavior.
            document.querySelectorAll('.filter-tab').forEach(tab => {
                const status = tab.dataset.status;
                if (status === 'all') {
                    tab.textContent = `All (${allApplications.length})`;
                } else {
                    const count = allApplications.filter(a => a.status === status).length;
                    const label = status === 'interview_ready' ? 'Interview Ready' : status.charAt(0).toUpperCase() + status.slice(1);
                    tab.textContent = `${label} (${count})`;
                }
            });

            if (totalFiltered === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:2rem; color:var(--c-text-muted);">No applications found.</td></tr>';
                return;
            }

            tbody.innerHTML = pageItems.map((app, index) => {
                const globalIndex = startIdx + index;

                // Account Label Logic
                const hasAccount = allProfiles.has(app.email.toLowerCase());
                let accountLabel = '';
                if (app.status === 'approved') {
                    if (hasAccount) {
                        accountLabel = '<span class="badge badge-success" style="font-size:0.7rem; margin-top:4px;"><i class="fas fa-check-circle"></i> Account Created</span>';
                    } else {
                        accountLabel = '<span class="badge badge-error" style="font-size:0.7rem; margin-top:4px;"><i class="fas fa-exclamation-circle"></i> No Account</span>';
                    }
                }

                let statusBadge = '';
                switch (app.status) {
                    case 'approved': statusBadge = '<span class="status-badge status-approved"><i class="fas fa-check-circle"></i> Approved</span>'; break;
                    case 'rejected': statusBadge = '<span class="status-badge status-rejected"><i class="fas fa-times-circle"></i> Rejected</span>'; break;
                    default: statusBadge = '<span class="status-badge status-pending"><i class="fas fa-clock"></i> Pending</span>';
                }

                const batchBadge = app.batch_number ?
                    `<span class="badge" style="background:rgba(59,130,246,0.1); color:#60a5fa; font-size:0.7rem; margin-top:4px; margin-bottom:4px; padding:2px 8px; border:1px solid rgba(59,130,246,0.3);"><i class="fas fa-layer-group"></i> ${app.batch_number}</span>` : '';

                let dateDisplay = new Date(app.created_at).toLocaleDateString();
                let timeDisplay = '';
                if (dateMode === 'preferred_interview_date') {
                    if (app.preferred_interview_date) {
                        dateDisplay = new Date(app.preferred_interview_date).toLocaleDateString();
                        if (app.preferred_interview_time) {
                            timeDisplay = `<div style="font-size:0.75rem; color:var(--c-text-muted); margin-top:2px;">${formatTime12h(app.preferred_interview_time)}</div>`;
                        }
                    } else {
                        dateDisplay = '-';
                    }
                }

                const markerColors = {
                    'green': '#22c55e',
                    'yellow': '#facc15',
                    'red': '#ef4444',
                    'sky': '#38bdf8',
                    'grey': '#9ca3af'
                };
                const markerLabels = {
                    'green': 'Successfully Interviewed',
                    'yellow': 'Reschedule',
                    'red': 'Not Interviewed / No Answer',
                    'sky': 'Approved, Account Not Created',
                    'grey': 'Account Created, Not Paid'
                };
                const markColor = app.marker_color && markerColors[app.marker_color] ? markerColors[app.marker_color] : 'transparent';
                const markBorder = app.marker_color ? markColor : 'rgba(255,255,255,0.2)';
                const markTitle = app.marker_color && markerLabels[app.marker_color] ? markerLabels[app.marker_color] : 'Click to add marker';

                return `
                <tr class="application-row" style="background:${app.marker_color ? markColor + '10' : 'transparent'}; box-shadow:${app.marker_color ? 'inset 4px 0 0 ' + markColor : 'none'}; transition:all 0.2s;">
                    <td style="text-align:center; font-weight:600; color:var(--c-text-muted); font-size:0.85rem;">${globalIndex + 1}</td>
                    <td style="text-align:center;">
                        <svg onclick="openColorMenu(event, '${app.id}')" width="22" height="22" viewBox="0 0 24 24" fill="${markColor === 'transparent' ? 'none' : markColor}" stroke="${markBorder}" stroke-width="2.5" stroke-linejoin="round" style="cursor:pointer; filter:${app.marker_color ? 'drop-shadow(0 0 6px '+markColor+'80)' : 'none'}; transition:all 0.2s; margin:0 auto; display:block;" onmouseover="this.style.transform='scale(1.25)'" onmouseout="this.style.transform='scale(1)'" title="${markTitle}">
                            <polygon points="12,3 22,20 2,20" />
                        </svg>
                    </td>
                    <td onclick="viewApplication('${app.id}')">
                        <div style="font-weight:600;">${app.full_name}</div>
                        <div style="font-size:0.8rem; color:var(--c-text-secondary);">${app.college || ''}</div>
                    </td>
                    <td onclick="viewApplication('${app.id}')">
                        <div style="font-size:0.9rem;">${app.email}</div>
                        <div style="font-size:0.8rem; color:var(--c-text-muted);">${app.phone || ''}</div>
                    </td>
                    <td onclick="viewApplication('${app.id}')">
                        <div class="skills-list">
                            ${(app.skills || []).slice(0, 3).map(s => `<span class="skill-tag">${s}</span>`).join('')}
                            ${(app.skills || []).length > 3 ? `<span class="skill-tag">+${app.skills.length - 3}</span>` : ''}
                        </div>
                    </td>
                    <td onclick="viewApplication('${app.id}')">
                        <span class="badge badge-${getStatusBadge(app.status)}">${app.status}</span>
                        <div style="display:flex; flex-direction:column; align-items:flex-start;">
                           ${batchBadge}
                           ${accountLabel}
                        </div>
                    </td>
                    <td onclick="viewApplication('${app.id}')" style="font-size:0.85rem; color:var(--c-text-secondary);">
                        <div style="font-weight:500;">${dateDisplay}</div>
                         ${timeDisplay}
                    </td>
                    <td>
                        <div style="display:flex; gap:8px;">
                            <button class="btn btn-secondary btn-sm" onclick="viewApplication('${app.id}')">Review</button>
                            ${app.is_payment_locked ? 
                              `<button class="btn btn-success btn-sm" onclick="unlockTrainingFee('${app.id}')" title="Unlock Payment" style="color:#10b981; border-color:rgba(16,185,129,0.3);"><i class="fas fa-unlock"></i></button>` :
                              `<button class="btn btn-warning btn-sm" onclick="lockTrainingFee('${app.id}')" title="Lock Training Fee" style="color:#f59e0b; border-color:rgba(245,158,11,0.3);"><i class="fas fa-lock"></i></button>`
                            }
                            <button class="btn btn-secondary btn-sm" onclick="deleteApplication('${app.id}')" title="Delete" style="color:var(--c-error); border-color:var(--c-border);"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        function formatTime12(time) {
            if (!time) return '';
            const [h, m] = time.split(':');
            const hour = parseInt(h);
            const suffix = hour >= 12 ? 'PM' : 'AM';
            const hour12 = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
            return `${hour12}:${m} ${suffix}`;
        }

        function changePage(delta) {
            currentPage += delta;
            renderApplications();
        }

        function getStatusBadge(s) {
            if (s === 'pending') return 'warning';
            if (s === 'shortlisted') return 'info';
            if (s === 'interview_ready') return 'warning';
            if (s === 'approved') return 'success';
            if (s === 'rejected') return 'error';
            return 'neutral';
        }

        function setupFilters() {
            document.querySelectorAll('.filter-tab').forEach(t => {
                t.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(x => x.classList.remove('active'));
                    t.classList.add('active');
                    currentFilter = t.dataset.status;

        async function fetchPaymentDetails(email) {
            if (!email) {
                if (document.getElementById('paymentDetailsPlaceholder')) document.getElementById('paymentDetailsPlaceholder').innerHTML = '<div style="color:var(--c-text-muted); padding:16px; text-align:center;">No email to check payment.</div>';
                return;
            }
            try {
                const { data, error } = await supabaseClient.from('payments').select('*').eq('customer_email', email).order('created_at', {ascending: false}).limit(1);
                const placeholder = document.getElementById('paymentDetailsPlaceholder');
                if (!placeholder) return;
                
                if (data && data.length > 0) {
                    const p = data[0];
                    const netAmount = Math.floor(p.amount * 0.98); // 2% gateway fee assumption
                    const isPaid = p.status === 'paid' || p.status === 'captured';
                    
                    placeholder.innerHTML = `
                        <h4 style="font-size:0.85rem; font-weight:600; margin-bottom:10px; color:var(--c-text-secondary); text-transform:uppercase; letter-spacing:0.5px;"><i class="fas fa-rupee-sign"></i> Payment Info</h4>
                        <div style="background:var(--c-bg-secondary); padding:16px; border-radius:12px; margin-bottom:24px; border:1px solid var(--c-border); display:flex; align-items:center; gap:20px;">
                            <div style="width:40px; height:40px; background:${isPaid?'rgba(16,185,129,0.1)':'rgba(245,158,11,0.1)'}; color:${isPaid?'#10b981':'#f59e0b'}; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.2rem; border:1px solid ${isPaid?'rgba(16,185,129,0.3)':'rgba(245,158,11,0.3)'};"><i class="fas ${isPaid?'fa-check-circle':'fa-clock'}"></i></div>
                            <div style="flex:1">
                                <div style="font-size:0.85rem; color:var(--c-text-primary); display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                                    <span><strong>Status:</strong> <span class="badge ${isPaid ? 'badge-success' : 'badge-warning'}" style="font-size:0.7rem;">${p.status.toUpperCase()}</span></span>
                                    <span><strong>Amount:</strong> &#8377;${p.amount} <small style="color:var(--c-text-muted)">(Net: &#8377;${netAmount})</small></span>
                                    <span><strong>Ref:</strong> ${p.payment_id || p.order_id || p.id || 'N/A'}</span>
                                    <span><strong>Date:</strong> ${new Date(p.created_at).toLocaleDateString()}</span>

                }

                // --- Send Approval Email ---
                try {
                    const { data: mailData, error: mailError } = await supabaseClient.functions.invoke('send-decision-email', {
                        body: {
                            email: app.email,
                            name: app.full_name,
                            type: 'approved'
                        }
                    });

                    if (mailError) {
                        console.error('Email function error:', mailError);
                        Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 4000 }).fire({
                            icon: 'warning',
                            title: `Approved, but email failed: ${mailError.message || 'Error'}`
                        });
                    } else if (mailData && mailData.success === false) {
                        console.error('Email returned error:', mailData);
                        Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 4000 }).fire({
                            icon: 'warning',
                            title: `Approved, but email failed: ${mailData.error || 'Unknown error'}`
                        });
                    } else {
                        Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 }).fire({
                            icon: 'success',
                            title: 'Approved & Email Sent'
                        });
                    }
                } catch (emailErr) {
                    console.error('Email invocation error:', emailErr);
                    Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 4000 }).fire({
                        icon: 'warning',
                        title: 'Approved, but email service unavailable'
                    });
                }

                await loadApplications();

            } catch (err) {
                console.error('Approval error:', err);
                Swal.fire({
                    title: 'Error',
                    text: 'Failed to approve application',
                    icon: 'error',
                    background: '#1a1f2e',
                    color: '#e2e8f0'
                });
            }
        }

        async function saveRemark(id) {
            const remark = (document.getElementById('remarkInput')?.value || '');
            const btn = document.querySelector('button[onclick^="saveRemark"]');
            const originalText = btn.innerHTML;

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('applications')
                    .update({ remark: remark })
                    .eq('id', id);

                if (error) throw error;

                // Update local state
                const app = allApplications.find(a => a.id === id);
                if (app) app.remark = remark;

                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3000 });
                Toast.fire({ icon: 'success', title: 'Remark saved' });

            } catch (err) {
                console.error('Error saving remark:', err);
                Swal.fire('Error', 'Failed to save remark', 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function exportApplications() { /* Export logic same as before */ alert('Export triggered'); }

        // Init Logic
        async function init() {
            if (!await ensureAdminAuth()) return;
            const session = getAdminSession();

            // Show Skeleton immediately
            const tbody = document.getElementById('applicationsTable');
            if (tbody && typeof SkeletonUI !== 'undefined') {
                tbody.innerHTML = SkeletonUI.generateTableRows(5, 7);
            }

            // Check URL Params for Search
            const urlParams = new URLSearchParams(window.location.search);
            const search = urlParams.get('search');
            const autoOpen = urlParams.get('autoOpen') === 'true';

            if (search) {
                const el = document.getElementById('searchInput'); 
                if(el) el.value = search;
            }

            setupFilters();
            await loadApplications();

            // Init Flatpickr for filter bar
            flatpickr("#startDate", { theme: "dark", dateFormat: "Y-m-d" });
            flatpickr("#endDate", { theme: "dark", dateFormat: "Y-m-d" });

            // Auto-open logic
            if (search && autoOpen && allApplications.length > 0) {
                // Find matching app after load
                const searchLower = search.toLowerCase();
                const match = allApplications.find(a => 
                    (a.email && a.email.toLowerCase() === searchLower) || 
                    (a.full_name && a.full_name.toLowerCase() === searchLower)
                );
                if (match) {
                    viewApplication(match.id);
                }
            }
        }
        init();
    </script>

    <script>
        function openExportModal() {
            // 1. Get current count
            const count = currentFilteredApps.length;
            if (document.getElementById('exportCount')) document.getElementById('exportCount').textContent = count;

            // 2. Build filters list
            const list = document.getElementById('exportFiltersList');
            list.innerHTML = '';

            const status = document.querySelector('.filter-tab.active').dataset.status;
            const search = (document.getElementById('searchInput')?.value || '');
            const dateMode = (document.getElementById('dateFilterMode')?.value || '');
            const startDate = (document.getElementById('startDate')?.value || '');
            const endDate = (document.getElementById('endDate')?.value || '');
            const timeSlot = (document.getElementById('timeSlotFilter')?.value || '');

            const addFilterItem = (label, value) => {
                list.innerHTML += `<li style="margin-bottom: 4px;"><i class="fas fa-check" style="color: var(--c-primary); margin-right: 8px; font-size: 0.8rem;"></i> <strong>${label}:</strong> ${value}</li>`;
            };

            addFilterItem('Status', status === 'all' ? 'All Applications' : status.charAt(0).toUpperCase() + status.slice(1));

            if (search) addFilterItem('Search', `"${search}"`);

            if (startDate || endDate) {
                const modeLabel = dateMode === 'interview_date' ? 'Interview Date' : 'Application Date';
                const start = startDate ? new Date(startDate).toLocaleDateString() : 'Start';
                const end = endDate ? new Date(endDate).toLocaleDateString() : 'Now';
                addFilterItem(modeLabel, `${start} - ${end}`);
            }

            if (timeSlot) {
                addFilterItem('Interview Time', timeSlot);
            }

            // 3. Show Modal
            const modal = document.getElementById('exportModal');
            modal.style.display = 'flex';
            // slight delay to allow display flex to apply before opacity transition if handled by css class
            setTimeout(() => modal.classList.add('open'), 10);
        }

        function closeExportModal() {
            const modal = document.getElementById('exportModal');
            modal.classList.remove('open');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function confirmExport() {
            if (!currentFilteredApps || currentFilteredApps.length === 0) {
                alert('No data to export.');
                return;
            }

            // Generate CSV
            const headers = [
                'ID', 'Full Name', 'Email', 'Phone', 'WhatsApp', 
                'Age', 'Sex', 'State', 'City', 'College', 'Graduation Year',
                'LinkedIn', 'GitHub', 'Portfolio', 'Discovery Source',
                'Interests', 'Skills', 'CV Link', 'Status', 'Phase',
                'Applied Date', 'Interview Date', 'Interview Time', 
                'Marker', 'Remark'
            ];
            const csvRows = [headers.join(',')];

            currentFilteredApps.forEach(app => {
                const escapeCsv = (val) => {
                    if (val === null || val === undefined) return '""';
                    const str = String(val).replace(/"/g, '""');
                    return `"${str}"`;
                };

                const escapePhone = (val) => {
                    if (!val) return '""';
                    // Using ="..." forces Excel to treat the cell as text, avoiding scientific notation and ######## display
                    return `="` + String(val).replace(/"/g, '""') + `"`;
                };

                const row = [
                    escapeCsv(app.id),
                    escapeCsv(app.full_name),
                    escapeCsv(app.email),
                    escapePhone(app.phone),
                    escapePhone(app.whatsapp_number),
                    escapeCsv(app.age),
                    escapeCsv(app.sex),
                    escapeCsv(app.state),
                    escapeCsv(app.city),
                    escapeCsv(app.college),
                    escapeCsv(app.graduation_year),
                    escapeCsv(app.linkedin_url),
                    escapeCsv(app.github_url),
                    escapeCsv(app.portfolio_url),
                    escapeCsv(app.discovery_source),
                    escapeCsv((app.interests || []).join('; ')),
                    escapeCsv((app.skills || []).join('; ')),
                    escapeCsv(app.cv_url),
                    escapeCsv(app.status),
                    escapeCsv(app.batch_number),
                    escapeCsv(app.created_at ? new Date(app.created_at).toISOString().split('T')[0] : ''),
                    escapeCsv(app.preferred_interview_date),
                    escapeCsv(app.preferred_interview_time),
                    escapeCsv(app.marker_color),
                    escapeCsv(app.remark)
                ];
                csvRows.push(row.join(','));
            });

            const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            const filename = `applications_export_${new Date().toISOString().split('T')[0]}.csv`;
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            closeExportModal();
        }
    </script>

            <button onclick="changeMarkerColor('grey')" style="background:transparent; border:none; color:#9ca3af; display:flex; align-items:center; gap:10px; padding:8px 10px; cursor:pointer; border-radius:8px; width:100%; transition:all 0.2s; font-size:0.85rem;" onmouseover="this.style.background='rgba(156,163,175,0.1)'" onmouseout="this.style.background='transparent'"><svg width="18" height="18" viewBox="0 0 24 24" fill="#9ca3af" stroke="#9ca3af" stroke-width="2" stroke-linejoin="round" style="flex-shrink:0;"><polygon points="12,3 22,20 2,20"/></svg><span style="display:flex; flex-direction:column; line-height:1.3;"><span style="font-weight:600;">Unpaid</span><span style="font-size:0.7rem; color:#d1d5db; opacity:0.8;">Account created, not paid</span></span></button>
            <div style="height:1px; background:var(--c-border); margin:4px 0;"></div>
            <button onclick="changeMarkerColor(null)" style="background:transparent; border:none; color:var(--c-text-muted); display:flex; align-items:center; gap:10px; padding:8px 10px; cursor:pointer; border-radius:8px; width:100%; transition:all 0.2s; font-size:0.85rem;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background='transparent'"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" style="flex-shrink:0;"><polygon points="12,3 22,20 2,20"/></svg> Clear Marker</button>
        </div>
    </div>
    <script>
        let activeMarkerAppId = null;
        
        function openColorMenu(event, appId) {
            event.stopPropagation();
            activeMarkerAppId = appId;
            const menu = document.getElementById('colorMarkerMenu');
            if (!menu) return;
            menu.style.display = 'block';
            
            // Constrain menu to viewport
            const rect = menu.getBoundingClientRect();
            let x = event.clientX - (rect.width / 2);
            let y = event.clientY + 15;
            
            if (x + rect.width > window.innerWidth) x = window.innerWidth - rect.width - 20;
            if (x < 0) x = 20;
            if (y + rect.height > window.innerHeight) y = event.clientY - rect.height - 15;
            
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
        }
        
        async function changeMarkerColor(color) {
            if (document.getElementById('colorMarkerMenu')) document.getElementById('colorMarkerMenu').style.display = 'none';
            if (!activeMarkerAppId) return;
            
            const appId = activeMarkerAppId;
            activeMarkerAppId = null;
            
            try {
                const { error } = await supabaseClient.from('applications').update({ marker_color: color }).eq('id', appId);
                if (error) throw error;
                
                // Update local array and re-render
                const app = allApplications.find(a => a.id === appId);
                if (app) app.marker_color = color;
                renderApplications();
                
            } catch (err) {
                console.error("Failed to update marker:", err);
                Swal.fire({ title: 'Error', text: 'Failed to update color marker.', icon: 'error', background: '#1a1f2e', color: '#e2e8f0' });
            }
        }
        
        // Close menu when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('colorMarkerMenu');
            if (menu && menu.style.display === 'block' && !menu.contains(e.target) && !e.target.closest('td')) {
                menu.style.display = 'none';
            }
        });
    </script>
