[build]
  # Publish the pre-built static files only - NO BUILD STEP
  publish = "production_dist"
  # Explicit no-op command to prevent any framework build
  command = "echo 'Static deployment - no build required'"
  # Ignore any package.json scripts
  ignore = "exit 0"

[build.environment]
  # Prevent Node.js build detection
  NODE_VERSION = "20"
  # Disable automatic dependency installation
  NPM_FLAGS = "--ignore-scripts"
  # Disable secrets scanner to allow build to succeed (secrets removed from current git tree)
  SECRETS_SCAN_ENABLED = "false"

[context.production]
  command = "echo 'Production: Static files only'"

[context.deploy-preview]
  command = "echo 'Preview: Static files only'"

[context.branch-deploy]
  command = "echo 'Branch: Static files only'"

[dev]
  framework = "#static"

# Supabase Proxies
[[redirects]]
  from = "/supabase-main/*"
  to = "https://hjpsyxqakzrhvzegehtm.supabase.co/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/supabase-chat/*"
  to = "https://mwnpwuxrbaousgwgoyco.supabase.co/:splat"
