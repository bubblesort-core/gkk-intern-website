name: internmobileapp
description: "GKK Intern Mobile App"
publish_to: 'none'

version: 1.3.0+19

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  webview_flutter: ^4.13.1
  url_launcher: ^6.3.2
  supabase_flutter: ^2.12.0
  google_fonts: ^8.0.2
  shared_preferences: ^2.5.4
  flutter_secure_storage: ^10.0.0

  # Image Picker for profile photo upload
  image_picker: ^1.1.2

  # Firebase Cloud Messaging (for admin custom push notifications)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.10
  firebase_remote_config: ^5.5.0

  package_info_plus: ^9.0.0
  dio: ^5.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1

  # Local Notifications (show FCM messages when app is in foreground)
  flutter_local_notifications: ^18.0.1

  # Fluidity & Polish
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  skeletonizer: ^2.1.3
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/www/
    - assets/gkk-intern-logo.png
