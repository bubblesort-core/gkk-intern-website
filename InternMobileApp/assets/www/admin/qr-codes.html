<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Codes | GKK-Hire Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        .qr-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .qr-status-active {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }

        .qr-status-none {
            background: rgba(100, 116, 139, 0.1);
            color: #94a3b8;
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .qr-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .qr-actions .btn {
            padding: 5px 12px;
            font-size: 0.8rem;
            border-radius: 8px;
        }

        .qr-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 30px;
        }

        .qr-preview-container canvas,
        .qr-preview-container img {
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .qr-intern-info {
            text-align: center;
        }

        .qr-intern-info h3 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .qr-intern-info p {
            color: var(--c-text-muted);
            font-size: 0.9rem;
        }

        /* ID Card Upload Area */
        .id-card-upload-area {
            border: 2px dashed var(--c-border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.02);
        }

        .id-card-upload-area:hover {
            border-color: var(--c-primary);
            background: rgba(16, 185, 129, 0.05);
        }

        .id-card-upload-area.has-image {
            border-style: solid;
            border-color: var(--c-primary);
            padding: 10px;
        }

        .id-card-upload-area img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
        }

        .id-card-upload-area .upload-icon {
            font-size: 2.5rem;
            color: var(--c-text-muted);
            margin-bottom: 12px;
        }

        /* Hidden QR container for generation */
        #hiddenQrContainer {
            position: fixed;
            left: -9999px;
            top: -9999px;
        }

        tr.qr-row {
            transition: background 0.15s ease;
        }

        tr.qr-row:hover {
            background-color: rgba(59, 130, 246, 0.05) !important;
        }
    </style>
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display: flex; align-items: center; gap: 16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">QR Code Management</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.reload()" title="Refresh">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </header>

            <div class="page-body">
                <!-- Stats Row -->
                <div
                    style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 28px;">
                    <div class="stat-card">
                        <div class="stat-content">
                            <div class="stat-value" id="totalInterns">-</div>
                            <div class="stat-label">Active Interns</div>
                        </div>
                        <div class="stat-icon-premium icon-blue"><i class="fas fa-users"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-content">
                            <div class="stat-value" id="totalQRs">-</div>
                            <div class="stat-label">QR Codes Generated</div>
                        </div>
                        <div class="stat-icon-premium icon-green"><i class="fas fa-qrcode"></i></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-content">
                            <div class="stat-value" id="totalIdCards">-</div>
                            <div class="stat-label">ID Cards Uploaded</div>
                        </div>
                        <div class="stat-icon-premium icon-orange"><i class="fas fa-id-card"></i></div>
                    </div>
                </div>

                <!-- Search -->
                <div style="margin-bottom: 20px;">
                    <input type="text" id="searchInput" class="form-input" placeholder="Search by name or email..."
                        style="max-width: 400px;">
                </div>

                <!-- Table -->
                <div class="card-premium">
                    <div class="card-header">
                        <h3 class="card-title">Intern QR Directory</h3>
                    </div>
                    <div class="table-container" style="border:none; box-shadow:none;">
                        <table>
                            <thead>
                                <tr>
                                    <th style="width:50px;">#</th>
                                    <th>Intern</th>
                                    <th>QR Status</th>
                                    <th>ID Card</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="qrTableBody">
                                <tr>
                                    <td colspan="5"
                                        style="text-align: center; padding: 2rem; color: var(--c-text-muted);">
                                        <i class="fas fa-spinner fa-spin"></i> Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <!-- Pagination -->
                    <div
                        style="padding: 16px; border-top: 1px solid var(--c-border); display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 0.85rem; color: var(--c-text-muted);" id="pageInfo">Loading...</span>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <button class="btn btn-secondary btn-sm" id="prevPageBtn" onclick="changePage(-1)"
                                disabled>Prev</button>
                            <span id="pageNumbers" style="font-size: 0.85rem; color: var(--c-text-secondary);"></span>
                            <button class="btn btn-secondary btn-sm" id="nextPageBtn" onclick="changePage(1)"
                                disabled>Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- QR Preview / Download Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-container" style="max-width: 480px; width: 95%;">
            <div class="modal-header">
                <h3 class="modal-title">QR Code</h3>
                <button class="modal-close" onclick="closeModal('qrModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="qr-preview-container">
                    <div id="qrCodeDisplay"></div>
                    <div class="qr-intern-info">
                        <h3 id="qrInternName"></h3>
                        <p id="qrInternEmail"></p>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="justify-content: center; gap: 12px;">
                <button class="btn btn-primary" onclick="downloadQR()">
                    <i class="fas fa-download"></i> Download PNG
                </button>
                <button class="btn btn-secondary" onclick="openProfilePreview()">
                    <i class="fas fa-external-link-alt"></i> Preview
                </button>
            </div>
        </div>
    </div>

    <!-- ID Card Upload Modal -->
    <div class="modal-overlay" id="idCardModal">
        <div class="modal-container" style="max-width: 550px; width: 95%;">
            <div class="modal-header">
                <h3 class="modal-title">Upload ID Card</h3>
                <button class="modal-close" onclick="closeModal('idCardModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="qr-intern-info" style="margin-bottom: 20px;">
                    <h3 id="idCardInternName"></h3>
                    <p id="idCardInternEmail"></p>
                </div>
                <div class="id-card-upload-area" id="idCardUploadArea"
                    onclick="document.getElementById('idCardFileInput').click()">
                    <div id="idCardPreview">
                        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <div style="font-weight: 600; margin-bottom: 4px;">Click to upload ID Card Image</div>
                        <div style="font-size: 0.85rem; color: var(--c-text-muted);">PNG, JPG, WEBP (Max 5MB)</div>
                    </div>
                </div>
                <input type="file" id="idCardFileInput" accept="image/*" style="display:none;"
                    onchange="handleIdCardSelect(event)">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('idCardModal')">Cancel</button>
                <button class="btn btn-primary" id="uploadIdCardBtn" onclick="uploadIdCard()" disabled>
                    <i class="fas fa-upload"></i> Upload
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden QR generation container -->
    <div id="hiddenQrContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/main-page-btn.js"></script>

    <script>
        // ============================================
        // STATE
        // ============================================
        let allInterns = [];
        let qrTokensMap = {};  // application_id -> token row
        let currentPage = 1;
        const PAGE_SIZE = 10;
        let currentQrToken = null; // for modal
        let currentIdCardIntern = null; // for ID card upload
        let selectedIdCardFile = null;

        // ============================================
        // SIDEBAR TOGGLE
        // ============================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }
        document.getElementById('sidebarOverlay').addEventListener('click', () => toggleSidebar());

        // ============================================
        // MODAL HELPERS
        // ============================================
        function openModal(id) {
            const m = document.getElementById(id);
            m.style.display = 'flex';
            setTimeout(() => m.classList.add('open'), 10);
        }

        function closeModal(id) {
            const m = document.getElementById(id);
            m.classList.remove('open');
            setTimeout(() => m.style.display = 'none', 300);
        }

        // ============================================
        // INIT
        // ============================================
        async function init() {
            const session = getAdminSession();
            if (!session) return window.location.href = 'login.html';
            await loadData();

            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1;
                renderTable();
            });
        }

        // ============================================
        // LOAD DATA
        // ============================================
        async function loadData() {
            try {
                // 1. Fetch applications
                const { data: apps, error: appError } = await supabaseClient
                    .from('applications')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (appError) throw appError;

                // 2. Fetch profiles
                const { data: profiles, error: profError } = await supabaseClient.rpc('get_all_profile_emails');
                if (profError) console.error('Error fetching profiles:', profError);

                // 3. Fetch payments
                const { data: payments, error: payError } = await supabaseClient
                    .from('payments')
                    .select('id, amount, status, user_id, customer_email')
                    .in('status', ['completed', 'captured']);
                if (payError) console.error('Error fetching payments:', payError);

                // 4. Merge & filter to active interns (same logic as active-interns.html)
                const merged = apps.map(app => {
                    const profile = profiles?.find(p => p.email.toLowerCase() === app.email.toLowerCase());
                    let payment = null;
                    if (profile) payment = payments?.find(pay => pay.user_id === profile.id);
                    if (!payment) payment = payments?.find(pay => pay.customer_email && pay.customer_email.toLowerCase() === app.email.toLowerCase());
                    return {
                        ...app,
                        hasAccount: !!profile,
                        isPaid: !!payment
                    };
                });

                allInterns = merged.filter(s => s.status === 'approved' && s.hasAccount && s.isPaid);

                // 5. Fetch existing QR tokens
                const { data: tokens, error: tokError } = await supabaseClient
                    .from('intern_qr_tokens')
                    .select('*')
                    .eq('is_active', true);
                if (tokError) console.error('Error fetching QR tokens:', tokError);

                qrTokensMap = {};
                (tokens || []).forEach(t => {
                    qrTokensMap[t.application_id] = t;
                });

                // Update stats
                document.getElementById('totalInterns').textContent = allInterns.length;
                document.getElementById('totalQRs').textContent = Object.keys(qrTokensMap).length;
                document.getElementById('totalIdCards').textContent = (tokens || []).filter(t => t.id_card_url).length;

                renderTable();
            } catch (err) {
                console.error('Load error:', err);
                document.getElementById('qrTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#ef4444; padding:2rem;">Error: ${err.message}</td></tr>`;
            }
        }

        // ============================================
        // RENDER TABLE
        // ============================================
        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allInterns;
            if (search) {
                filtered = filtered.filter(s => s.full_name.toLowerCase().includes(search) || s.email.toLowerCase().includes(search));
            }

            const total = filtered.length;
            const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
            if (currentPage > totalPages) currentPage = totalPages;
            const startIdx = (currentPage - 1) * PAGE_SIZE;
            const endIdx = Math.min(startIdx + PAGE_SIZE, total);
            const pageItems = filtered.slice(startIdx, endIdx);

            // Pagination
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;
            document.getElementById('pageNumbers').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('pageInfo').textContent = total > 0
                ? `Showing ${startIdx + 1}–${endIdx} of ${total}`
                : 'No interns found';

            const tbody = document.getElementById('qrTableBody');
            if (total === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:2rem; color:var(--c-text-muted);">No active interns found.</td></tr>';
                return;
            }

            tbody.innerHTML = pageItems.map((intern, i) => {
                const globalIdx = startIdx + i;
                const token = qrTokensMap[intern.id];
                const hasQr = !!token;
                const hasIdCard = hasQr && !!token.id_card_url;

                return `
                <tr class="qr-row">
                    <td style="text-align:center; font-weight:600; color:var(--c-text-muted); font-size:0.85rem;">${globalIdx + 1}</td>
                    <td>
                        <div style="font-weight:600; color:var(--c-text-primary);">${intern.full_name}</div>
                        <div style="font-size:0.8rem; color:var(--c-text-muted);">${intern.email}</div>
                    </td>
                    <td>
                        ${hasQr
                        ? '<span class="qr-status-badge qr-status-active"><i class="fas fa-check-circle"></i> Generated</span>'
                        : '<span class="qr-status-badge qr-status-none"><i class="fas fa-minus-circle"></i> Not Generated</span>'}
                    </td>
                    <td>
                        ${hasIdCard
                        ? '<span class="qr-status-badge qr-status-active"><i class="fas fa-image"></i> Uploaded</span>'
                        : '<span class="qr-status-badge qr-status-none"><i class="fas fa-image"></i> None</span>'}
                    </td>
                    <td>
                        <div class="qr-actions">
                            ${hasQr ? `
                                <button class="btn btn-primary" onclick="showQR('${intern.id}')" title="View QR"><i class="fas fa-qrcode"></i></button>
                                <button class="btn btn-secondary" onclick="openIdCardModal('${intern.id}')" title="Upload ID Card"><i class="fas fa-id-card"></i></button>
                                <button class="btn btn-secondary" style="color:var(--c-error); border-color:rgba(239,68,68,0.3);" onclick="revokeToken('${intern.id}')" title="Revoke"><i class="fas fa-ban"></i></button>
                            ` : `
                                <button class="btn btn-primary" onclick="generateQR('${intern.id}')" title="Generate QR">
                                    <i class="fas fa-plus"></i> Generate QR
                                </button>
                            `}
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function changePage(delta) {
            currentPage += delta;
            renderTable();
        }

        // ============================================
        // GENERATE QR TOKEN
        // ============================================
        async function generateQR(applicationId) {
            try {
                // Generate a cryptographically secure 64-char hex token
                const array = new Uint8Array(32);
                crypto.getRandomValues(array);
                const token = Array.from(array, b => b.toString(16).padStart(2, '0')).join('');

                // Store in DB
                const { data, error } = await supabaseClient
                    .from('intern_qr_tokens')
                    .insert([{
                        application_id: applicationId,
                        token: token,
                        is_active: true
                    }])
                    .select()
                    .single();

                if (error) throw error;

                // Update local state
                qrTokensMap[applicationId] = data;

                // Update stats
                document.getElementById('totalQRs').textContent = Object.keys(qrTokensMap).length;

                renderTable();

                // Show the QR modal
                showQR(applicationId);
            } catch (err) {
                console.error('Generate QR error:', err);
                alert('Error generating QR: ' + err.message);
            }
        }

        // ============================================
        // SHOW QR CODE
        // ============================================
        function showQR(applicationId) {
            const token = qrTokensMap[applicationId];
            if (!token) return;

            currentQrToken = token;
            const intern = allInterns.find(s => s.id === applicationId);

            // Build the profile URL (always use production domain so QR works when scanned)
            const profileUrl = `https://gkkintern.in/Dashboard/intern-profile/?token=${token.token}`;

            // Clear previous QR
            const container = document.getElementById('qrCodeDisplay');
            container.innerHTML = '';

            // Generate QR code
            new QRCode(container, {
                text: profileUrl,
                width: 256,
                height: 256,
                colorDark: '#0f172a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('qrInternName').textContent = intern ? intern.full_name : 'Unknown';
            document.getElementById('qrInternEmail').textContent = intern ? intern.email : '';

            openModal('qrModal');
        }

        // ============================================
        // DOWNLOAD QR AS PNG
        // ============================================
        function downloadQR() {
            const container = document.getElementById('qrCodeDisplay');
            const canvas = container.querySelector('canvas');
            if (!canvas) {
                // Fallback: try the img tag
                const img = container.querySelector('img');
                if (img) {
                    const a = document.createElement('a');
                    a.href = img.src;
                    a.download = `intern-qr-${currentQrToken?.token?.substring(0, 8) || 'code'}.png`;
                    a.click();
                }
                return;
            }

            // Create a downloadable version with padding and intern name
            const intern = allInterns.find(s => s.id === currentQrToken.application_id);
            const name = intern ? intern.full_name : 'Intern';

            const padding = 40;
            const labelHeight = 50;
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = canvas.width + padding * 2;
            finalCanvas.height = canvas.height + padding * 2 + labelHeight;
            const ctx = finalCanvas.getContext('2d');

            // Background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            // QR Code
            ctx.drawImage(canvas, padding, padding);

            // Label
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 16px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(name, finalCanvas.width / 2, canvas.height + padding + 30);

            ctx.font = '12px Inter, sans-serif';
            ctx.fillStyle = '#64748b';
            ctx.fillText('GKK-Hire Intern Profile', finalCanvas.width / 2, canvas.height + padding + 48);

            // Download
            const a = document.createElement('a');
            a.href = finalCanvas.toDataURL('image/png');
            a.download = `${name.replace(/\s+/g, '_')}_QR.png`;
            a.click();
        }

        // ============================================
        // PREVIEW PROFILE
        // ============================================
        function openProfilePreview() {
            if (!currentQrToken) return;
            const baseUrl = window.location.origin;
            const url = `${baseUrl}/Dashboard/intern-profile/?token=${currentQrToken.token}`;
            window.open(url, '_blank');
        }

        // ============================================
        // REVOKE TOKEN
        // ============================================
        async function revokeToken(applicationId) {
            if (!confirm('Revoke this QR code? The intern will lose access to their profile page immediately.')) return;

            const token = qrTokensMap[applicationId];
            if (!token) return;

            try {
                const { error } = await supabaseClient
                    .from('intern_qr_tokens')
                    .delete()
                    .eq('id', token.id);

                if (error) throw error;

                delete qrTokensMap[applicationId];
                document.getElementById('totalQRs').textContent = Object.keys(qrTokensMap).length;
                document.getElementById('totalIdCards').textContent = Object.values(qrTokensMap).filter(t => t.id_card_url).length;
                renderTable();
            } catch (err) {
                console.error('Revoke error:', err);
                alert('Error revoking: ' + err.message);
            }
        }

        // ============================================
        // ID CARD UPLOAD
        // ============================================
        function openIdCardModal(applicationId) {
            const intern = allInterns.find(s => s.id === applicationId);
            const token = qrTokensMap[applicationId];
            if (!intern || !token) return;

            currentIdCardIntern = { intern, token };
            selectedIdCardFile = null;

            document.getElementById('idCardInternName').textContent = intern.full_name;
            document.getElementById('idCardInternEmail').textContent = intern.email;
            document.getElementById('uploadIdCardBtn').disabled = true;

            // Show existing ID card if available
            const preview = document.getElementById('idCardPreview');
            const area = document.getElementById('idCardUploadArea');
            if (token.id_card_url) {
                // Append timestamp to avoid cache
                const url = `${token.id_card_url}?t=${new Date().getTime()}`;
                preview.innerHTML = `
                    <div style="position:relative; display:inline-block; width:100%;">
                        <img src="${url}" alt="ID Card" style="max-width:100%; max-height:300px; border-radius:8px; display:block; margin:0 auto;">
                        <div style="position:absolute; inset:0; background:rgba(0,0,0,0.6); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s; border-radius:8px; cursor:pointer;"
                             onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
                            <i class="fas fa-pen" style="font-size:2rem; margin-bottom:8px;"></i>
                            <span style="font-weight:600;">Click to Change ID Card</span>
                        </div>
                    </div>`;
                area.classList.add('has-image');
            } else {
                preview.innerHTML = `
                    <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                    <div style="font-weight: 600; margin-bottom: 4px;">Click to upload ID Card Image</div>
                    <div style="font-size: 0.85rem; color: var(--c-text-muted);">PNG, JPG, WEBP (Max 5MB)</div>`;
                area.classList.remove('has-image');
            }

            document.getElementById('idCardFileInput').value = '';
            openModal('idCardModal');
        }

        function handleIdCardSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                alert('File too large. Max 5MB.');
                return;
            }

            selectedIdCardFile = file;
            document.getElementById('uploadIdCardBtn').disabled = false;

            // Preview
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById('idCardPreview');
                preview.innerHTML = `<img src="${e.target.result}" alt="ID Card Preview" style="max-width:100%; max-height:300px; border-radius:8px;">`;
                document.getElementById('idCardUploadArea').classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        async function uploadIdCard() {
            if (!selectedIdCardFile || !currentIdCardIntern) return;

            const btn = document.getElementById('uploadIdCardBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading...';

            try {
                const token = currentIdCardIntern.token;
                const ext = selectedIdCardFile.name.split('.').pop();
                const filePath = `id-cards/${token.application_id}.${ext}`;

                // Upload to Supabase Storage
                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('intern-id-cards')
                    .upload(filePath, selectedIdCardFile, { upsert: true });

                if (uploadError) throw uploadError;

                // Get public URL
                const { data: urlData } = supabaseClient.storage
                    .from('intern-id-cards')
                    .getPublicUrl(filePath);

                const publicUrl = urlData.publicUrl;

                // Update DB
                const { error: dbError } = await supabaseClient
                    .from('intern_qr_tokens')
                    .update({ id_card_url: publicUrl })
                    .eq('id', token.id);

                if (dbError) throw dbError;

                // Update local state
                qrTokensMap[token.application_id].id_card_url = publicUrl;
                document.getElementById('totalIdCards').textContent = Object.values(qrTokensMap).filter(t => t.id_card_url).length;

                closeModal('idCardModal');
                renderTable();
            } catch (err) {
                console.error('Upload error:', err);
                alert('Upload failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-upload"></i> Upload';
            }
        }

        // ============================================
        // START
        // ============================================
        init();
    </script>
    <script src="../js/admin-identity.js"></script> <!-- Identity Check -->
</body>

</html>
