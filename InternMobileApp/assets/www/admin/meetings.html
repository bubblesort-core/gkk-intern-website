<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Meetings | GKK-Hire Admin</title>

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">

    <style>
        .live-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 1024px) {
            .live-grid {
                grid-template-columns: 2fr 1fr;
            }
        }

        .video-container {
            background: black;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--c-border);
            box-shadow: var(--shadow-card);
            position: relative;
        }

        .chat-container {
            height: 600px;
            display: flex;
            flex-direction: column;
            background: var(--c-bg-card);
            border: 1px solid var(--c-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid var(--c-border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--c-bg-card);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-msg {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.95rem;
            max-width: 85%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--c-border);
            color: var(--c-text-primary);
            position: relative;
        }

        .chat-msg.admin {
            background: rgba(59, 130, 246, 0.1);
            align-self: flex-end;
            border-color: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .chat-msg-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--c-text-muted);
            margin-bottom: 4px;
        }
    </style>
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Live Meetings</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.reload()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <!-- End Button logic could be moved here if active, but kept in body for now -->
                </div>
            </header>

            <div class="page-body">
                <!-- Setup Card -->
                <div class="card" id="setupCard">
                    <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
                        <h3 class="card-title">Meeting Controls</h3>
                        <div class="tabs" style="display:flex; gap:12px;">
                            <button class="btn btn-sm btn-primary active" id="tabInstant"
                                onclick="switchTab('instant')">Instant Live</button>
                            <button class="btn btn-sm btn-secondary" id="tabSchedule"
                                onclick="switchTab('schedule')">Schedule</button>
                        </div>
                    </div>

                    <div class="card-body" style="padding-top:20px;">
                        <!-- Common Fields -->
                        <div class="form-group">
                            <label class="form-label">Topic / Title</label>
                            <input type="text" id="meetingTitle" class="form-input" placeholder="e.g. Weekly Q&A">
                        </div>
                        <!-- Platform Selection -->
                        <div class="row" style="display:flex; gap:16px;">
                            <div class="form-group" style="flex:1;">
                                <label class="form-label">Platform</label>
                                <select id="meetingPlatform" class="form-input" onchange="togglePlatformFields()">
                                    <option value="youtube">YouTube Live / Recording</option>
                                    <option value="google_meet">Google Meet</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1;">
                                <label class="form-label">Join Link / Video URL</label>
                                <input type="text" id="meetingLink" class="form-input"
                                    placeholder="YouTube URL or Google Meet Link">
                            </div>
                        </div>

                        <!-- Target Audience -->
                        <div class="row" style="display:flex; gap:16px;">
                            <div class="form-group" style="flex:1;">
                                <label class="form-label">Audience</label>
                                <select id="targetType" class="form-input" onchange="updateTargetInput()">
                                    <option value="all">All Interns</option>
                                    <option value="batch">Specific Batch</option>
                                    <option value="team">Specific Team</option>
                                    <option value="candidate">Specific Candidate</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex:1; display:none;" id="targetInputContainer">
                                <label class="form-label" id="targetLabel">Select Target</label>
                                <div style="display:flex; gap:8px;">
                                    <select id="targetSelect" class="form-input" style="display:none;">
                                        <!-- Populated dynamically -->
                                    </select>
                                    <input type="text" id="targetSearch" class="form-input"
                                        placeholder="Enter Email or ID" style="display:none;">
                                    <button class="btn btn-secondary" id="openSidebarBtn" style="display:none;"
                                        onclick="toggleInternSidebar()">
                                        <i class="fas fa-plus"></i> Select
                                    </button>
                                </div>
                                <div id="selectedCandidatesChips"
                                    style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;">
                                    <!-- Chips will go here -->
                                </div>
                            </div>
                        </div>

                        <!-- Schedule Specific -->
                        <div id="scheduleFields" style="display:none;">
                            <div class="form-group">
                                <label class="form-label">Schedule For</label>
                                <input type="datetime-local" id="scheduleTime" class="form-input">
                            </div>
                            <button class="btn btn-primary" style="width:100%;" onclick="scheduleMeeting()">
                                <i class="fas fa-calendar-plus"></i> Schedule Meeting
                            </button>
                        </div>

                        <!-- Instant Specific -->
                        <div id="instantFields">
                            <button class="btn btn-primary" style="width:100%;" onclick="startMeeting()">
                                <i class="fas fa-broadcast-tower"></i> Go Live Now
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Scheduled Meetings List -->
                <div class="card" id="scheduledListCard" style="margin-top:24px; display:none;">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-calendar-alt"></i> Upcoming Meetings</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Topic</th>
                                    <th>Scheduled For</th>
                                    <th>Audience</th>
                                    <th style="width:120px; text-align:center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="scheduledTableBody">
                                <!-- Populated via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Active Meeting Layout -->
                <div class="live-grid" id="activeMeetingLayout" style="display:none;">
                    <!-- Video -->
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div id="videoPreview" class="video-container">
                            <div style="color:white; text-align:center;">
                                <i class="fab fa-youtube" style="font-size:3rem; margin-bottom:1rem;"></i>
                                <div>Preview</div>
                            </div>
                        </div>
                        <div
                            style="padding:16px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--c-border);">
                            <div>
                                <span class="badge badge-success">LIVE</span>
                                <span id="currentTopic" style="font-weight:600; margin-left:8px;">Topic</span>
                            </div>
                            <button class="btn btn-secondary" style="color:var(--c-error); border-color:var(--c-error);"
                                onclick="endMeeting()">End Session</button>
                        </div>
                    </div>

                    <!-- Chat -->
                    <div class="card chat-container" style="padding:0;">
                        <div class="card-header" style="padding:16px; border-bottom:1px solid var(--c-border);">
                            <h3 class="card-title">Live Chat</h3>
                        </div>
                        <div id="chatMessages" class="chat-messages">
                            <div style="text-align:center; color:var(--c-text-muted);">Waiting for messages...</div>
                        </div>
                        <div style="padding:16px; border-top:1px solid var(--c-border); display:flex; gap:8px;">
                            <input type="text" id="adminChatInput" class="form-input" placeholder="Type..."
                                onkeypress="if(event.key==='Enter') sendAdminMessage()">
                            <button class="btn btn-primary" onclick="sendAdminMessage()"><i
                                    class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>

                <!-- History -->
                <div class="card" style="margin-top:24px;">
                    <div class="card-header">
                        <h3 class="card-title">History</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Topic</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th style="width:80px; text-align:center;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <!-- Skeleton -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts (Simplified for brevity, preserving logic) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <!-- Sidebar for Intern Selection -->
    <div id="internSidebar"
        style="position:fixed; top:0; right:-400px; width:400px; height:100%; background:var(--c-bg-card, #151521); border-left:1px solid var(--border); box-shadow:-4px 0 20px rgba(0,0,0,0.5); transition:right 0.3s ease; z-index:1000; display:flex; flex-direction:column;">
        <div
            style="padding:16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surface);">
            <h3 style="margin:0; font-size:1.1rem;">Select Active Interns</h3>
            <button class="btn btn-sm btn-secondary" onclick="toggleInternSidebar()"><i
                    class="fas fa-times"></i></button>
        </div>
        <div style="padding:12px; border-bottom:1px solid var(--border);">
            <input type="text" id="sidebarSearch" class="form-input" placeholder="Search by name or email..."
                onkeyup="filterSidebarInterns()">
        </div>
        <div id="sidebarInternList" style="flex:1; overflow-y:auto; padding:12px;">
            <!-- Intern items injected here -->
            <div style="text-align:center; color:var(--text-muted); padding:20px;">Loading...</div>
        </div>
        <div style="padding:16px; border-top:1px solid var(--border); background:var(--surface);">
            <button class="btn btn-primary" style="width:100%;" onclick="confirmInternSelection()">
                Add Selected (<span id="sidebarSelectedCount">0</span>)
            </button>
        </div>
    </div>

    <script>
        // ... (Existing script content) ...

        // Sidebar Mobile Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                sidebarOverlay.style.display = 'block';
            } else {
                sidebarOverlay.style.display = 'none';
            }
        }

        // Close sidebar when clicking overlay
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            toggleSidebar(); // Close it
        });

        let currentMeetingId = null;
        let batches = [];
        let teams = [];
        let allInterns = [];
        let selectedInterns = new Set();

        async function init() {
            const session = getAdminSession();
            if (!session) return window.location.href = 'login.html';

            await Promise.all([
                checkActiveMeeting(),
                loadHistory(),
                loadScheduled(),
                fetchTargetData(),
                fetchActiveInterns()
            ]);

            // Set default date to now + 1 hour
            const now = new Date();
            now.setHours(now.getHours() + 1);
            now.setMinutes(0);
            document.getElementById('scheduleTime').value = now.toISOString().slice(0, 16);
        }

        async function fetchTargetData() {
            try {
                const { data: bData } = await supabaseClient.from('batches').select('id, name').order('name');
                if (bData) batches = bData;

                const { data: tData } = await supabaseClient.from('teams').select('id, name').order('name');
                if (tData) teams = tData;
            } catch (e) {
                console.error('Error fetching target data', e);
            }
        }

        async function fetchActiveInterns() {
            try {
                // Fetch profiles with status 'active' if that column exists, or just all profiles for now as per schema
                const { data } = await supabaseClient.from('profiles').select('id, email, full_name').order('full_name');
                if (data) {
                    allInterns = data;
                    renderSidebarInterns();
                }
            } catch (e) {
                console.error('Error fetching interns', e);
                const list = document.getElementById('sidebarInternList');
                if (list) list.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-error);">Failed to load interns</div>';
            }
        }

        function switchTab(tab) {
            const instantBtn = document.getElementById('tabInstant');
            const scheduleBtn = document.getElementById('tabSchedule');
            const instantFields = document.getElementById('instantFields');
            const scheduleFields = document.getElementById('scheduleFields');
            const scheduledList = document.getElementById('scheduledListCard');

            if (tab === 'instant') {
                instantBtn.classList.add('active');
                scheduleBtn.classList.remove('active');
                instantBtn.classList.remove('btn-secondary');
                instantBtn.classList.add('btn-primary');
                scheduleBtn.classList.add('btn-secondary');
                scheduleBtn.classList.remove('btn-primary');

                instantFields.style.display = 'block';
                scheduleFields.style.display = 'none';
                scheduledList.style.display = 'none';
            } else {
                scheduleBtn.classList.add('active');
                instantBtn.classList.remove('active');
                scheduleBtn.classList.remove('btn-secondary');
                scheduleBtn.classList.add('btn-primary');
                instantBtn.classList.add('btn-secondary');
                instantBtn.classList.remove('btn-primary');

                instantFields.style.display = 'none';
                scheduleFields.style.display = 'block';
                scheduledList.style.display = 'block';
            }
        }

        function updateTargetInput() {
            const type = document.getElementById('targetType').value;
            const container = document.getElementById('targetInputContainer');
            const select = document.getElementById('targetSelect');
            const search = document.getElementById('targetSearch');
            const btn = document.getElementById('openSidebarBtn');
            const label = document.getElementById('targetLabel');
            const chips = document.getElementById('selectedCandidatesChips');

            // Reset
            select.style.display = 'none';
            search.style.display = 'none';
            btn.style.display = 'none';
            chips.innerHTML = '';
            selectedInterns.clear();
            updateSidebarSelection();

            if (type === 'all') {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';

            if (type === 'batch') {
                label.innerText = 'Select Batch';
                select.style.display = 'block';
                select.innerHTML = batches.map(b => `<option value="${b.id}">${b.name}</option>`).join('');
            } else if (type === 'team') {
                label.innerText = 'Select Team';
                select.style.display = 'block';
                select.innerHTML = teams.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            } else if (type === 'candidate') {
                label.innerText = 'Select Candidates';
                btn.style.display = 'block';
            }
        }

        // Sidebar Functions
        function toggleInternSidebar() {
            const sb = document.getElementById('internSidebar');
            const isOpen = sb.style.right === '0px';
            sb.style.right = isOpen ? '-400px' : '0px';
        }

        function renderSidebarInterns() {
            const list = document.getElementById('sidebarInternList');
            const query = document.getElementById('sidebarSearch').value.toLowerCase();

            const filtered = allInterns.filter(i =>
                (i.full_name && i.full_name.toLowerCase().includes(query)) ||
                (i.email && i.email.toLowerCase().includes(query))
            );

            list.innerHTML = filtered.map(i => {
                const isChecked = selectedInterns.has(i.id) ? 'checked' : '';
                return `
                <label style="display:flex; align-items:center; padding:8px; border-bottom:1px solid var(--border); cursor:pointer;">
                    <input type="checkbox" value="${i.id}" ${isChecked} onchange="toggleInternSelection('${i.id}')" style="margin-right:12px;">
                    <div>
                        <div style="font-weight:600; color:var(--text-primary);">${i.full_name || 'No Name'}</div>
                        <div style="font-size:0.8rem; color:var(--text-secondary);">${i.email}</div>
                    </div>
                </label>
            `}).join('');
        }

        function filterSidebarInterns() { renderSidebarInterns(); }

        function toggleInternSelection(id) {
            if (selectedInterns.has(id)) selectedInterns.delete(id);
            else selectedInterns.add(id);
            updateSidebarSelection();
        }

        function updateSidebarSelection() {
            document.getElementById('sidebarSelectedCount').innerText = selectedInterns.size;
            renderSidebarInterns();
        }

        function confirmInternSelection() {
            toggleInternSidebar();
            renderChips();
        }

        function renderChips() {
            const container = document.getElementById('selectedCandidatesChips');
            container.innerHTML = Array.from(selectedInterns).map(id => {
                const u = allInterns.find(i => i.id === id);
                return `
                <div class="badge badge-primary" style="display:flex; align-items:center; gap:6px; padding:6px 10px;">
                    ${u ? u.full_name || u.email : id}
                    <i class="fas fa-times" style="cursor:pointer;" onclick="removeChip('${id}')"></i>
                </div>
                `;
            }).join('');
        }

        function removeChip(id) {
            selectedInterns.delete(id);
            renderChips();
            updateSidebarSelection();
        }

        async function getTargetDetails() {
            const type = document.getElementById('targetType').value;
            let targetIds = [];

            if (type === 'batch' || type === 'team') {
                const val = document.getElementById('targetSelect').value;
                if (!val) throw new Error(`Please select a ${type}`);
                targetIds = [val];
            } else if (type === 'candidate') {
                if (selectedInterns.size === 0) {
                    throw new Error('Please select at least one candidate');
                }
                targetIds = Array.from(selectedInterns);
            }
            return { type, ids: targetIds };
        }

        async function checkActiveMeeting() {
            const { data } = await supabaseClient.from('active_meetings').select('*').eq('is_active', true).maybeSingle();
            if (data) {
                currentMeetingId = data.id;
                showLiveUI(data.title, data.video_url);
                subscribeToChat(data.id);
            }
        }

        function showLiveUI(title, url, platform, joinUrl) {
            document.getElementById('setupCard').style.display = 'none';
            document.getElementById('scheduledListCard').style.display = 'none';
            document.getElementById('activeMeetingLayout').style.display = 'grid';
            document.getElementById('currentTopic').innerText = title;

            const videoContainer = document.getElementById('videoPreview');
            if (platform === 'google_meet') {
                videoContainer.innerHTML = `
                    <div style="color:white; text-align:center; padding:2rem;">
                        <i class="fas fa-video" style="font-size:3rem; margin-bottom:1rem; color:#4285F4;"></i>
                        <div>Google Meet Session Active</div>
                        <a href="${joinUrl}" target="_blank" class="btn btn-primary" style="margin-top:1rem;">Join Meeting</a>
                    </div>
                `;
            } else {
                videoContainer.innerHTML = `<iframe src="${url}?autoplay=0" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>`;
            }
        }

        function togglePlatformFields() {
            const platform = document.getElementById('meetingPlatform').value;
            const linkInput = document.getElementById('meetingLink');

            if (platform === 'youtube') {
                linkInput.placeholder = "https://youtube.com/...";
            } else {
                linkInput.placeholder = "https://meet.google.com/...";
            }
        }

        async function startMeeting(existingId = null, title = null, url = null, targetType = null, targetIds = null, platform = null) {
            if (!existingId) {
                // Starting new instant meeting
                title = document.getElementById('meetingTitle').value;
                url = document.getElementById('meetingLink').value;
                platform = document.getElementById('meetingPlatform').value;
            } else {
                // Starting scheduled meeting
                // url passed might be video_url or join_url depending on what was saved
                // We need to ensure platform is correct
                if (!platform) {
                    // Fallback if not passed (should not happen with fix)
                    platform = url && url.includes('youtube') ? 'youtube' : 'google_meet';
                }
            }

            if (!title || !url) return Swal.fire('Error', 'Missing title or link', 'error');

            let videoUrl = url;
            let joinUrl = null;

            if (platform === 'youtube') {
                const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/))([^"&?\/\s]{11})/);
                const videoId = match ? match[1] : null;
                // Allow non-standard if user insists, but warn? For now strict.
                if (!videoId) return Swal.fire('Error', 'Invalid YouTube URL', 'error');
                videoUrl = `https://www.youtube.com/embed/${videoId}`;
            } else {
                // Google Meet
                joinUrl = url;
                videoUrl = null; // No embed for Meet
            }

            try {
                let target = { type: 'all', ids: [] };

                if (!existingId) {
                    target = await getTargetDetails().catch(e => { Swal.fire('Error', e.message, 'error'); throw e; });
                } else {
                    target = { type: targetType, ids: Array.isArray(targetIds) ? targetIds : (targetIds ? [targetIds] : []) };
                }

                const startBtn = document.querySelector('#setupCard .btn-primary');
                if (startBtn) {
                    startBtn.disabled = true;
                    startBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Going Live...';
                }

                // End old active meetings
                await supabaseClient.from('active_meetings').update({ is_active: false }).eq('is_active', true);

                let mid = existingId;

                if (existingId) {
                    // Activate scheduled meeting
                    await supabaseClient.from('active_meetings').update({
                        is_active: true,
                        started_at: new Date().toISOString(),
                        video_url: videoUrl,
                        join_url: joinUrl // Update just in case
                    }).eq('id', existingId);
                } else {
                    // Create new
                    const { data, error } = await supabaseClient.from('active_meetings').insert([{
                        title,
                        video_url: videoUrl,
                        join_url: joinUrl,
                        platform: platform,
                        is_active: true,
                        started_at: new Date().toISOString(),
                        room_name: 'gkk-' + Date.now(),
                        target_type: target.type,
                        target_ids: target.ids
                    }]).select().single();
                    if (error) throw error;
                    mid = data.id;
                }

                currentMeetingId = mid;
                showLiveUI(title, videoUrl, platform, joinUrl);

                // Only subscribe to chat if it's YouTube (or we build a chat for Meet too? Defaulting to keeping chat active for all)
                subscribeToChat(mid);
                loadHistory();

            } catch (e) {
                console.error(e);
                if (!existingId && e.message !== 'Please select at least one candidate') Swal.fire('Error', 'Failed to start meeting', 'error');
                const startBtn = document.querySelector('#setupCard .btn-primary');
                if (startBtn) {
                    startBtn.disabled = false;
                    startBtn.innerText = 'Go Live Now';
                }
            }
        }

        async function scheduleMeeting() {
            const title = document.getElementById('meetingTitle').value;
            const url = document.getElementById('meetingLink').value;
            const scheduledAt = document.getElementById('scheduleTime').value;
            const platform = document.getElementById('meetingPlatform').value;

            if (!title || !url || !scheduledAt) return Swal.fire('Error', 'Please fill all fields', 'error');

            let videoUrl = null;
            let joinUrl = null;

            if (platform === 'youtube') {
                const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/))([^"&?\/\s]{11})/);
                const videoId = match ? match[1] : null;
                if (!videoId) return Swal.fire('Error', 'Invalid YouTube URL', 'error');
                videoUrl = `https://www.youtube.com/embed/${videoId}`;
            } else {
                joinUrl = url;
            }

            try {
                const target = await getTargetDetails().catch(e => { Swal.fire('Error', e.message, 'error'); throw e; });

                const { error } = await supabaseClient.from('active_meetings').insert([{
                    title,
                    video_url: videoUrl,
                    join_url: joinUrl,
                    platform: platform,
                    is_active: false,
                    scheduled_at: new Date(scheduledAt).toISOString(),
                    room_name: 'gkk-' + Date.now(),
                    target_type: target.type,
                    target_ids: target.ids
                }]);

                if (error) throw error;

                Swal.fire({
                    icon: 'success',
                    title: 'Meeting Scheduled',
                    text: `Scheduled for ${new Date(scheduledAt).toLocaleString()}`,
                    timer: 2000
                });

                loadScheduled();

            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'Failed to schedule meeting', 'error');
            }
        }

        async function loadScheduled() {
            const tbody = document.getElementById('scheduledTableBody');
            if (!tbody) return;

            const { data } = await supabaseClient
                .from('active_meetings')
                .select('*')
                .eq('is_active', false)
                .gt('scheduled_at', new Date().toISOString())
                .order('scheduled_at', { ascending: true });

            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-muted);">No upcoming meetings</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(m => {
                let targetDisplay = 'All Interns';
                let tIds = m.target_ids || (m.target_id ? [m.target_id] : []);

                if (m.target_type === 'batch') targetDisplay = `Batch (${tIds.length})`;
                if (m.target_type === 'team') targetDisplay = `Team (${tIds.length})`;
                if (m.target_type === 'candidate') targetDisplay = `Candidates (${tIds.length})`;

                const safeIds = JSON.stringify(tIds).replace(/"/g, '&quot;');

                const displayUrl = m.platform === 'google_meet' ? m.join_url : m.video_url;
                const safeUrl = displayUrl || '';

                return `
                <tr>
                    <td>
                        <div style="font-weight:600; color:var(--text-primary);">${m.title}</div>
                        <a href="${safeUrl}" target="_blank" style="font-size:0.8rem; color:var(--accent-primary);">View Link</a>
                    </td>
                    <td>${new Date(m.scheduled_at).toLocaleString()}</td>
                    <td><span class="badge badge-purple">${targetDisplay}</span></td>
                    <td style="text-align:center; display:flex; gap:8px; justify-content:center;">
                        <button class="btn btn-sm btn-primary" onclick="startMeeting('${m.id}', '${m.title.replace(/'/g, "\\'")}', '${safeUrl}', '${m.target_type}', ${safeIds}, '${m.platform}')" title="Go Live Now">
                            <i class="fas fa-play"></i>
                        </button>
                        <button class="btn btn-sm btn-secondary" style="color:var(--c-error); border-color:var(--c-error);" onclick="deleteSession('${m.id}', '${m.title.replace(/'/g, "\\'")}')" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        async function endMeeting() {
            if (currentMeetingId) {
                await supabaseClient.from('active_meetings').update({ is_active: false, ended_at: new Date() }).eq('id', currentMeetingId);
                location.reload();
            }
        }

        function subscribeToChat(mid) {
            const list = document.getElementById('chatMessages');
            list.innerHTML = '';

            supabaseClient.channel('public:meeting_messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'meeting_messages', filter: `meeting_id=eq.${mid}` }, payload => {
                    appendMsg(payload.new);
                }).subscribe();
        }

        function appendMsg(msg) {
            const list = document.getElementById('chatMessages');
            if (list.innerHTML.includes('Waiting')) list.innerHTML = '';
            const div = document.createElement('div');
            div.className = `chat-msg ${msg.user_name === 'Admin' ? 'admin' : ''}`;
            div.innerText = `${msg.user_name}: ${msg.message}`;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        async function sendAdminMessage() {
            const txt = document.getElementById('adminChatInput').value;
            if (!txt || !currentMeetingId) return;
            await supabaseClient.from('meeting_messages').insert([{
                meeting_id: currentMeetingId, user_name: 'Admin', message: txt
            }]);
            document.getElementById('adminChatInput').value = '';
        }

        async function loadHistory() {
            const tbody = document.getElementById('historyTableBody');
            if (!tbody) return;

            const { data } = await supabaseClient.from('active_meetings')
                .select('*')
                .order('started_at', { ascending: false })
                .limit(20);

            if (!data || !data.length) { tbody.innerHTML = '<tr><td colspan="4">No history</td></tr>'; return; }

            tbody.innerHTML = data.map(m => `
                <tr id="row-${m.id}">
                    <td>${m.title}</td>
                    <td>${m.started_at ? new Date(m.started_at).toLocaleDateString() : 'Scheduled'}</td>
                    <td><span class="badge badge-${m.is_active ? 'success' : 'neutral'}">${m.is_active ? 'Live' : 'Ended'}</span></td>
                    <td style="text-align:center;">
                        ${m.is_active
                    ? '<span style="color:var(--c-text-muted);">—</span>'
                    : `<button class="btn btn-secondary btn-sm" style="color:var(--c-error); border-color:var(--c-error); padding:4px 10px;" onclick="deleteSession('${m.id}', '${m.title.replace(/'/g, "\\'")}')"><i class="fas fa-trash-alt"></i></button>`
                }
                    </td>
                </tr>
            `).join('');
        }

        async function deleteSession(id, title) {
            const result = await Swal.fire({
                title: 'Delete Session?',
                html: `<p style="margin-bottom:8px;">This will permanently delete <strong>${title}</strong>.</p>`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Delete',
                cancelButtonText: 'Cancel'
            });

            if (!result.isConfirmed) return;

            try {
                await supabaseClient.from('meeting_messages').delete().eq('meeting_id', id);
                const { error } = await supabaseClient.from('active_meetings').delete().eq('id', id);
                if (error) throw error;

                loadHistory();
                loadScheduled();
                Swal.fire({ title: 'Deleted', icon: 'success', timer: 1500, showConfirmButton: false });
            } catch (e) {
                console.error(e);
                Swal.fire('Error', 'Failed to delete session.', 'error');
            }
        }

        init();
    </script>

</body>
