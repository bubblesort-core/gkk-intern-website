<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payments | GKK-Hire Admin</title>

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        .filters-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--c-border);
        }

        .search-wrapper {
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--c-text-muted);
            font-size: 0.9rem;
        }

        .search-wrapper input {
            padding-left: 36px;
            background: transparent;
            border: none;
            width: 200px;
            transition: width 0.3s;
        }

        .search-wrapper input:focus {
            width: 240px;
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-select {
            background: transparent;
            border: none;
            border-left: 1px solid var(--c-border);
            border-radius: 0;
            padding-left: 12px;
            color: var(--c-text-secondary);
            font-size: 0.9rem;
        }

        .filter-select:focus {
            box-shadow: none;
            color: var(--c-text-primary);
        }

        /* Transaction Status Badges */
        .status-badge {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .amount-positive {
            color: #34d399;
            font-weight: 600;
        }

        .amount-negative {
            color: #f87171;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <!-- Mobile Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"
        style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Payments & Transactions</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.reload()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button class="btn btn-primary" onclick="exportTransactions()">
                        <i class="fas fa-download"></i> Export CSV
                    </button>
                </div>
            </header>

            <div class="page-body">
                <div class="card">
                    <div class="card-header"
                        style="display:flex; justify-content:space-between; align-items:center; padding: 20px 24px;">
                        <h3 class="card-title" style="font-size:1.1rem;">Transaction History</h3>

                        <div class="filters-container">
                            <div class="search-wrapper">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchInput" class="form-input"
                                    placeholder="Search transactions...">
                            </div>
                            <select id="statusFilter" class="form-select filter-select">
                                <option value="all">All Status</option>
                                <option value="completed">Completed</option>
                                <option value="pending">Pending</option>
                                <option value="failed">Failed</option>
                            </select>
                        </div>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>User</th>
                                    <th>Description</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                    <th>Transaction ID</th>
                                </tr>
                            </thead>
                            <tbody id="paymentsTableBody">
                                <!-- Skeleton -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        // Sidebar Mobile Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                sidebarOverlay.style.display = 'block';
            } else {
                sidebarOverlay.style.display = 'none';
            }
        }

        // Close sidebar when clicking overlay
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            toggleSidebar(); // Close it
        });

        let allPayments = [];
        async function init() {
            const session = getAdminSession();
            if (!session) return window.location.href = 'login.html';

            // Skeleton
            const tbody = document.getElementById('paymentsTableBody');
            if (tbody && typeof SkeletonUI !== 'undefined') tbody.innerHTML = SkeletonUI.generateTableRows(5, 6);

            await loadPayments();

            document.getElementById('searchInput').addEventListener('input', filter);
            document.getElementById('statusFilter').addEventListener('change', filter);
        }

        async function loadPayments() {
            try {
                // 1. Fetch Payments (Raw)
                // We selecting profiles(...) but it might return null due to RLS.
                let { data: payments, error } = await supabaseClient.from('payments').select('*, profiles(email, full_name)').order('created_at', { ascending: false });

                if (error) { // Fallback to transactions
                    const res = await supabaseClient.from('transactions').select('*, profiles(email, full_name)').order('created_at', { ascending: false });
                    payments = res.data;
                    if (res.error) throw res.error;
                }

                // 2. Fetch Profiles Securely via RPC
                const { data: profiles, error: profError } = await supabaseClient.rpc('get_all_profile_emails');
                if (profError) console.error("RPC Error:", profError);

                // 3. Merge Data
                // If the join returned null profiles, we try to match manually using the RPC data
                allPayments = (payments || []).map(p => {
                    // If join worked, use it. If not, try find by User ID or Email
                    let profileData = p.profiles;

                    if (!profileData && profiles) {
                        // Try finding by ID
                        let found = profiles.find(x => x.id === p.user_id);
                        if (!found && p.customer_email) {
                            // Try finding by Email
                            found = profiles.find(x => x.email && x.email.toLowerCase() === p.customer_email.toLowerCase());
                        }
                        if (found) {
                            profileData = { email: found.email, full_name: found.full_name };
                        }
                    }

                    return { ...p, profiles: profileData };
                });

                render(allPayments);
            } catch (e) {
                console.error(e);
                document.getElementById('paymentsTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">No records found.</td></tr>';
            }
        }

        function render(list) {
            const tbody = document.getElementById('paymentsTableBody');
            if (!list.length) { tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No records found.</td></tr>'; return; }

            tbody.innerHTML = list.map(p => `
                <tr>
                    <td style="color:var(--c-text-secondary); font-size:0.9rem;">${new Date(p.created_at).toLocaleDateString()}</td>
                    <td>
                        <div style="font-weight:500;">${p.customer_name || p.profiles?.full_name || 'Unknown'}</div>
                        <div style="font-size:0.8rem; color:var(--c-text-muted);">${p.customer_email || p.profiles?.email || 'No Email'}</div>
                    </td>
                    <td>Enrollment Fee</td>
                    <td style="font-family:monospace; font-weight:600;">₹${((p.amount || 0) * 0.98).toFixed(2)}</td>
                    <td><span class="badge badge-${getStatusColor(p.status)}">${p.status || 'Pending'}</span></td>
                    <td style="font-family:monospace; font-size:0.85rem; color:var(--c-text-secondary);">${p.razorpay_payment_id || p.id}</td>
                </tr>
            `).join('');
        }

        function getStatusColor(s) {
            if (!s) return 'neutral';
            s = s.toLowerCase();
            return s === 'completed' || s === 'success' ? 'success' : (s === 'failed' ? 'error' : 'warning');
        }

        function filter() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;

            const filtered = allPayments.filter(p => {
                const s = (p.status || '').toLowerCase();
                const matchStatus = status === 'all' || s === status;
                const matchTerm = (p.profiles?.email || '').toLowerCase().includes(term) || (p.id || '').toLowerCase().includes(term);
                return matchStatus && matchTerm;
            });
            render(filtered);
        }

        function exportTransactions() {
            if (!allPayments || allPayments.length === 0) {
                alert('No transactions to export.');
                return;
            }

            const headers = ['Date', 'Transaction ID', 'User', 'Email', 'Description', 'Amount', 'Status'];
            const csvRows = [headers.join(',')];

            allPayments.forEach(p => {
                const row = [
                    new Date(p.created_at).toISOString().split('T')[0],
                    p.razorpay_payment_id || p.id,
                    `"${(p.customer_name || p.profiles?.full_name || 'Unknown').replace(/"/g, '""')}"`,
                    `"${(p.customer_email || p.profiles?.email || 'No Email').replace(/"/g, '""')}"`,
                    'Enrollment Fee',
                    ((p.amount || 0) * 0.98).toFixed(2),
                    p.status || 'Pending'
                ];
                csvRows.push(row.join(','));
            });

            const csvContent = "data:text/csv;charset=utf-8," + csvRows.join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `transactions_export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>

    <script src="../js/admin-identity.js"></script> <!-- Identity Check -->
</body>

</html>
