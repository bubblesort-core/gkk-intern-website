<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submissions | GKK-Hire Admin</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Minimal CSS -->
    <link rel="stylesheet" href="../css/admin-minimal.css">
    <link rel="stylesheet" href="../css/skeleton.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="../assets/favicon.png">
    <style>
        /* status preview styles moved to inline JS */

        .modal-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Quick Feedback Buttons */
        .quick-feedback-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--c-border);
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8rem;
            color: var(--c-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .quick-feedback-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--c-primary);
            color: var(--c-primary);
            transform: translateY(-1px);
        }

        /* Modal Footer Actions */
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* Submission Details Modal override */
        .swal2-popup {
            background: var(--c-bg-card) !important;
            border: 1px solid var(--c-border) !important;
            color: var(--c-text-primary) !important;
        }

        .swal2-title {
            color: var(--c-text-primary) !important;
        }

        .swal2-html-container {
            color: var(--c-text-secondary) !important;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Mobile Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"
            style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:45; display:none;"></div>

        <!-- Sidebar -->
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Injected via admin-sidebar.js -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left" style="display:flex; align-items:center; gap:16px;">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title">Submissions</h1>
                </div>
                <div class="header-actions" style="display: flex; align-items: center; gap: 12px;">
                    <button class="btn btn-secondary btn-sm" onclick="window.location.reload()" title="Refresh Data">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <!-- <button class="btn btn-secondary" onclick="exportSubmissions()">
                        <i class="fas fa-download"></i> Export
                    </button> -->
                </div>
            </header>

            <!-- ... (rest of page body) ... -->
            <div class="page-body">
                <div class="card">
                    <div class="card-header" style="border-bottom: 1px solid var(--c-border); padding: 20px 24px;">
                        <h3 style="font-weight: 600; font-size: 1.1rem;">Recent Submissions</h3>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Project</th>
                                    <th>Intern</th>
                                    <th>Link</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="submissionsTable">
                                <!-- Skeleton injected via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Review Modal -->
    <div class="modal-overlay" id="reviewModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">Review Submission</h3>
                <button class="modal-close" onclick="closeModal('reviewModal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <!-- Status Preview -->
                <div id="statusPreview"
                    style="padding: 12px 16px; border-radius: 8px; margin-bottom: 4px; display: none; font-size: 0.9rem;">
                    <div id="statusPreviewText"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Review Feedback</label>
                    <textarea id="reviewNotes" class="form-textarea" rows="5"
                        placeholder="Add your feedback for the intern..." style="min-height: 120px;"></textarea>
                </div>

                <!-- Quick Feedback Templates -->
                <div class="form-group">
                    <label class="form-label"
                        style="font-size: 0.8rem; color: var(--c-text-muted); margin-bottom: 8px;">Quick
                        Templates</label>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Great work! Your submission meets all requirements.')">✨ Great
                            Work</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Please improve the UI/UX design and responsiveness.')">🎨 UI
                            Improvements</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Code quality needs improvement. Please refactor and add comments.')">💻
                            Code Quality</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Missing required features. Please review the project requirements.')">📋
                            Missing Features</button>
                        <button type="button" class="quick-feedback-btn"
                            onclick="insertFeedback('Fix bugs and test thoroughly before resubmitting.')">🐛 Fix
                            Bugs</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('reviewModal')">Cancel</button>
                <div style="flex:1"></div>
                <button class="btn" onclick="submitReview('changes_requested')" title="Request Changes"
                    style="background-color: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.2); color: #fbbf24;">
                    <i class="fas fa-edit"></i> Changes
                </button>
                <button class="btn" onclick="submitReview('rejected')" title="Reject Submission"
                    style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #f87171;">
                    <i class="fas fa-times"></i> Reject
                </button>
                <button class="btn btn-success" onclick="submitReview('approved')" title="Approve Submission">
                    <i class="fas fa-check"></i> Approve
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script src="../js/main-page-btn.js"></script>
    <script src="../js/skeleton-ui.js"></script>
    <script>
        let currentSubmissionId = null;

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');

            if (sidebar.classList.contains('open')) {
                overlay.style.display = 'block';
            } else {
                overlay.style.display = 'none';
            }
        }

        // Close sidebar when clicking overlay
        document.getElementById('sidebarOverlay').addEventListener('click', () => {
            toggleSidebar(); // Close it
        });

        async function init() {
            const session = getAdminSession();
            if (!session) return window.location.href = 'login.html';

            // Inject Skeleton
            const tbody = document.getElementById('submissionsTable');
            if (tbody && typeof SkeletonUI !== 'undefined') {
                tbody.innerHTML = SkeletonUI.generateTableRows(5, 6);
            }

            await loadSubmissions();
        }

        async function loadSubmissions() {
            // ... (existing loadSubmissions code) ...

            try {
                // 1. Fetch Submissions (no join on profiles to avoid error)
                const { data: subs, error } = await supabaseClient
                    .from('project_submissions')
                    .select('*, projects(title)') // Projects usually has FK, so this might work. If not, we'll need to fetch projects manually too.
                    .order('submitted_at', { ascending: false });

                if (error) throw error;
                if (!subs || !subs.length) {
                    document.getElementById('submissionsTable').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2rem; color: var(--c-text-muted);">No submissions found.</td></tr>';
                    return;
                }

                // 2. Fetch Profiles Securely via RPC
                const { data: profiles, error: profError } = await supabaseClient.rpc('get_all_profile_emails');
                if (profError) console.error("RPC Error:", profError);

                // Map profiles for easy lookup
                const profileMap = {};
                if (profiles) {
                    profiles.forEach(p => profileMap[p.id] = p);
                }

                // 3. Store submissions for later use
                window.allSubmissions = subs;

                // 4. Render
                document.getElementById('submissionsTable').innerHTML = subs.map(sub => {
                    const profile = profileMap[sub.submitted_by] || {};
                    const githubUrl = sub.github_url || '#';
                    const hasFeedback = sub.feedback ? 'title="Has feedback"' : '';

                    return `
                    <tr>
                        <td style="font-weight:500;">
                            ${sub.projects?.title || 'Unknown Project'}
                            ${sub.live_url ? `<a href="${sub.live_url}" target="_blank" style="font-size:0.75rem; display:block; color:var(--c-primary);"><i class="fas fa-globe"></i> Live Demo</a>` : ''}
                        </td>
                        <td>
                            <div style="font-weight:500;">${profile.full_name || 'Unknown User'}</div>
                            <div style="font-size:0.8rem; color:var(--c-text-muted);">${profile.email || 'No Email'}</div>
                        </td>
                        <td>
                            ${sub.github_url ? `
                                <a href="${sub.github_url}" target="_blank" style="color:var(--c-text-primary); text-decoration:underline; display:flex; align-items:center; gap:5px;">
                                    <i class="fab fa-github"></i> View Code
                                </a>
                            ` : '<span style="color:var(--c-text-muted);">No Link</span>'}
                        </td>
                        <td style="font-size:0.85rem; color:var(--c-text-secondary);">${new Date(sub.submitted_at || sub.created_at).toLocaleDateString()}</td>
                        <td>
                            <span class="badge badge-${getStatusColor(sub.status)}" ${hasFeedback}>${formatStatus(sub.status)}</span>
                            ${sub.feedback ? '<i class="fas fa-comment-dots" style="margin-left: 6px; color: var(--c-primary); font-size: 0.75rem;" title="Feedback provided"></i>' : ''}
                        </td>
                        <td>
                            <div style="display: flex; gap: 6px; align-items: center;">
                                <button class="btn btn-secondary btn-sm" onclick="showSubmissionInfo('${sub.id}')" title="View Details" style="color: var(--c-primary);">
                                    <i class="fas fa-info-circle"></i>
                                </button>
                                <button class="btn ${sub.status === 'approved' ? 'btn-secondary' : 'btn-primary'} btn-sm" onclick="openReviewModal('${sub.id}')">
                                    ${sub.status === 'approved' ? 'Edit Review' : 'Review'}
                                </button>
                            </div>
                        </td>
                    </tr>
                `}).join('');
            } catch (e) { console.error('Error loading submissions:', e); }
        }

        function formatStatus(s) {
            if (!s) return 'Pending';
            const statusMap = {
                'pending': 'Pending',
                'submitted': 'Submitted',
                'approved': 'Approved',
                'rejected': 'Rejected',
                'changes_requested': 'Changes Requested',
                'under_review': 'Under Review'
            };
            return statusMap[s] || s.charAt(0).toUpperCase() + s.slice(1).replace('_', ' ');
        }

        function getStatusColor(s) {
            if (s === 'pending' || s === 'submitted') return 'warning';
            if (s === 'approved') return 'success';
            if (s === 'rejected') return 'error';
            if (s === 'changes_requested') return 'warning';
            if (s === 'under_review') return 'info';
            return 'neutral';
        }

        // Insert feedback template
        function insertFeedback(text) {
            const textarea = document.getElementById('reviewNotes');
            if (textarea.value) {
                textarea.value += '\n' + text;
            } else {
                textarea.value = text;
            }
            textarea.focus();
        }

        // Show status preview when hovering over buttons
        function showStatusPreview(status) {
            const preview = document.getElementById('statusPreview');
            const previewText = document.getElementById('statusPreviewText');

            const messages = {
                'approved': '🎉 Intern will see: "Congratulations! Your project has been approved!"',
                'rejected': '❌ Intern will see: "Your submission was rejected. Please review the requirements."',
                'changes_requested': '⚠️ Intern will see: "Changes have been requested. Please review and update your submission."'
            };

            const colors = {
                'approved': { bg: 'rgba(16, 185, 129, 0.1)', border: 'rgba(16, 185, 129, 0.3)', text: '#6ee7b7' },
                'rejected': { bg: 'rgba(239, 68, 68, 0.1)', border: 'rgba(239, 68, 68, 0.3)', text: '#fca5a5' },
                'changes_requested': { bg: 'rgba(245, 158, 11, 0.1)', border: 'rgba(245, 158, 11, 0.3)', text: '#fcd34d' }
            };

            if (messages[status]) {
                previewText.textContent = messages[status];
                preview.style.display = 'block';
                preview.style.background = colors[status].bg;
                preview.style.border = `1px solid ${colors[status].border}`;
                preview.style.color = colors[status].text;
            }
        }

        function openReviewModal(id) {
            currentSubmissionId = id;

            // Load existing feedback if available
            const submission = window.allSubmissions?.find(s => s.id === id);
            document.getElementById('reviewNotes').value = submission?.feedback || '';

            // Update modal title based on current status
            const modalTitle = document.querySelector('#reviewModal .modal-title');
            if (submission?.status === 'approved') {
                modalTitle.textContent = 'Edit Review';
            } else {
                modalTitle.textContent = 'Review Submission';
            }

            // Show current status preview if already reviewed
            if (submission?.status && submission.status !== 'pending' && submission.status !== 'submitted') {
                showStatusPreview(submission.status);
            } else {
                document.getElementById('statusPreview').style.display = 'none';
            }

            document.getElementById('reviewModal').classList.add('open');
        }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }

        async function submitReview(status) {
            const notes = document.getElementById('reviewNotes').value;

            // Show loading state
            const btns = document.querySelectorAll('.modal-footer .btn');
            const originalTexts = [];
            btns.forEach((btn, index) => {
                originalTexts[index] = btn.innerHTML;
                btn.disabled = true;
                if (btn.onclick && btn.onclick.toString().includes(status)) {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
                }
            });

            try {
                // Get the submission to find the project_id
                const submission = window.allSubmissions?.find(s => s.id === currentSubmissionId);

                // Update the submission
                const { error } = await supabaseClient.from('project_submissions').update({
                    status: status,
                    feedback: notes,
                    reviewed_at: new Date().toISOString()
                }).eq('id', currentSubmissionId);

                if (error) throw error;

                // Also update the project status to match
                if (submission?.project_id) {
                    const projectStatusMap = {
                        'approved': 'approved',
                        'rejected': 'rejected',
                        'changes_requested': 'changes_requested'
                    };

                    const { error: projectError } = await supabaseClient.from('projects').update({
                        status: projectStatusMap[status] || status
                    }).eq('id', submission.project_id);

                    if (projectError) {
                        console.warn('Could not update project status:', projectError);
                    }
                }

                // Show success message
                const statusNames = {
                    'approved': 'approved ✓',
                    'rejected': 'rejected',
                    'changes_requested': 'marked for changes'
                };
                Swal.fire({
                    icon: 'success',
                    title: 'Success',
                    text: `Submission ${statusNames[status] || status}!`,
                    timer: 1500,
                    showConfirmButton: false
                });

                closeModal('reviewModal');
                loadSubmissions();
            } catch (e) {
                console.error('Error updating submission:', e);
                Swal.fire('Error', 'Error updating submission. Please try again.', 'error');
            } finally {
                btns.forEach((btn, index) => {
                    btn.disabled = false;
                    btn.innerHTML = originalTexts[index];
                });
            }
        }

        // Show detailed submission info with team details
        async function showSubmissionInfo(submissionId) {
            const submission = window.allSubmissions?.find(s => s.id === submissionId);
            if (!submission) return;

            try {
                // Fetch project with team
                const { data: project, error: projectError } = await supabaseClient
                    .from('projects')
                    .select('*, teams(id, name, max_members, is_active)')
                    .eq('id', submission.project_id)
                    .single();

                if (projectError) throw projectError;

                // Fetch submitter info (Use RPC cache or fetch fresh if needed, but for single item we can try RPC again or just fallback)
                // For simplicity and security, let's use the RPC call again (it's fast) or just find it from window.allProfiles if we stored it?
                // Better: just fetch all safely.
                const { data: allProfs } = await supabaseClient.rpc('get_all_profile_emails');
                const submitter = allProfs ? allProfs.find(p => p.id === submission.submitted_by) : null;

                let teamHtml = '<div style="color:var(--c-text-muted); text-align:center; padding:12px;">No team assigned</div>';

                if (project.teams) {
                    // Fetch team members (Raw)
                    const { data: teamMembersRaw } = await supabaseClient
                        .from('team_members')
                        .select('id, user_id, role') // Select user_id to map manually
                        .eq('team_id', project.teams.id);

                    // Map profiles to team members
                    const teamMembers = (teamMembersRaw || []).map(m => {
                        const prof = allProfs ? allProfs.find(p => p.id === m.user_id) : null;
                        return { ...m, profiles: prof };
                    });

                    const members = teamMembers || [];
                    const leader = members.find(m => m.role === 'Leader');
                    const otherMembers = members.filter(m => m.role !== 'Leader');

                    const buildMemberHtml = (member, isLeader = false) => {
                        const name = member.profiles?.full_name || 'Unknown';
                        const email = member.profiles?.email || '';
                        const initial = name[0]?.toUpperCase() || '?';
                        const avatarUrl = member.profiles?.avatar_url;

                        return `
                            <div style="display:flex; align-items:center; gap:10px; padding:8px 10px; background:var(--c-bg-app); border-radius:6px; margin-bottom:6px; ${isLeader ? 'border-left:3px solid #f59e0b;' : ''}">
                                <div style="width:32px; height:32px; border-radius:50%; background:${isLeader ? 'rgba(245,158,11,0.2)' : 'rgba(99,102,241,0.2)'}; color:${isLeader ? '#fbbf24' : '#a5b4fc'}; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.8rem;">
                                    ${avatarUrl ? `<img src="${avatarUrl}" loading="lazy" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : initial}
                                </div>
                                <div style="flex:1;">
                                    <div style="font-weight:600; font-size:0.9rem; display:flex; align-items:center; gap:6px;">
                                        ${name}
                                        ${isLeader ? '<span style="background:rgba(245,158,11,0.2); color:#fbbf24; padding:1px 6px; border-radius:3px; font-size:0.65rem; font-weight:700;">LEADER</span>' : ''}
                                    </div>
                                    <div style="font-size:0.75rem; color:var(--c-text-muted);">${email}</div>
                                </div>
                            </div>
                        `;
                    };

                    teamHtml = `
                        <div style="margin-bottom:12px;">
                            <div style="font-size:0.8rem; font-weight:600; color:var(--c-text-secondary); margin-bottom:6px;">
                                <i class="fas fa-users" style="margin-right:4px;"></i> ${project.teams.name}
                                <span class="badge badge-${project.teams.is_active !== false ? 'success' : 'neutral'}" style="margin-left:8px; font-size:0.65rem;">${project.teams.is_active !== false ? 'Active' : 'Inactive'}</span>
                            </div>
                        </div>
                        <div style="margin-bottom:8px;">
                            <div style="font-size:0.75rem; color:var(--c-text-muted); margin-bottom:4px;">Team Leader</div>
                            ${leader ? buildMemberHtml(leader, true) : '<div style="color:var(--c-text-muted); font-size:0.85rem; padding:8px;">No leader assigned</div>'}
                        </div>
                        <div>
                            <div style="font-size:0.75rem; color:var(--c-text-muted); margin-bottom:4px;">Members (${otherMembers.length})</div>
                            ${otherMembers.length > 0 ? otherMembers.map(m => buildMemberHtml(m, false)).join('') : '<div style="color:var(--c-text-muted); font-size:0.85rem; padding:8px;">No other members</div>'}
                        </div>
                    `;
                }

                // Submission status
                const statusColor = getStatusColor(submission.status);
                const statusLabel = formatStatus(submission.status);

                // Submitter info
                const submitterName = submitter?.full_name || 'Unknown';
                const submitterEmail = submitter?.email || '';
                const submitterInitial = submitterName[0]?.toUpperCase() || '?';

                Swal.fire({
                    title: `<i class="fas fa-clipboard-check" style="margin-right:8px; color:var(--c-primary);"></i> Submission Details`,
                    html: `
                        <div style="text-align:left;">
                            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--c-border);">
                                <div style="font-size:0.85rem; color:var(--c-text-muted); margin-bottom:4px;">Project</div>
                                <div style="font-weight:600; font-size:1.05rem;">${project.title}</div>
                                <span class="badge badge-${statusColor}" style="margin-top:8px;">${statusLabel}</span>
                            </div>

                            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--c-border);">
                                <div style="font-size:0.85rem; color:var(--c-text-muted); margin-bottom:6px;">Submitted By</div>
                                <div style="display:flex; align-items:center; gap:10px; background:var(--c-bg-app); padding:10px; border-radius:6px;">
                                    <div style="width:36px; height:36px; border-radius:50%; background:rgba(59,130,246,0.2); color:#60a5fa; display:flex; align-items:center; justify-content:center; font-weight:700;">
                                        ${submitter?.avatar_url ? `<img src="${submitter.avatar_url}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">` : submitterInitial}
                                    </div>
                                    <div>
                                        <div style="font-weight:600;">${submitterName}</div>
                                        <div style="font-size:0.8rem; color:var(--c-text-muted);">${submitterEmail}</div>
                                    </div>
                                </div>
                            </div>

                            <div style="margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--c-border);">
                                <div style="font-size:0.85rem; color:var(--c-text-muted); margin-bottom:6px;">Links</div>
                                <div style="display:flex; gap:12px; flex-wrap:wrap;">
                                    ${submission.github_url ? `<a href="${submission.github_url}" target="_blank" style="display:flex; align-items:center; gap:6px; color:var(--c-text-primary);"><i class="fab fa-github"></i> GitHub</a>` : ''}
                                    ${submission.live_url ? `<a href="${submission.live_url}" target="_blank" style="display:flex; align-items:center; gap:6px; color:var(--c-primary);"><i class="fas fa-globe"></i> Live Demo</a>` : ''}
                                    ${!submission.github_url && !submission.live_url ? '<span style="color:var(--c-text-muted);">No links provided</span>' : ''}
                                </div>
                            </div>

                            <div>
                                <div style="font-size:0.85rem; color:var(--c-text-muted); margin-bottom:6px;">Team</div>
                                ${teamHtml}
                            </div>
                        </div>
                    `,
                    width: '500px',
                    showCloseButton: true,
                    showConfirmButton: false
                });

            } catch (err) {
                console.error('Error loading submission info:', err);
                Swal.fire('Error', 'Could not load submission information', 'error');
            }
        }

        init();
    </script>

</body>
